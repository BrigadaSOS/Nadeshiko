    SearchStatsRequest:
      type: object
      description: |
        Stats request. All fields are optional — omit `query` to get filter counts for the full corpus.
      properties:
        query:
          $ref: '#/components/schemas/SearchQuery'
        filters:
          $ref: '#/components/schemas/SearchFilters'
        include:
          type: array
          description: Optional resources to expand in the response `includes` block
          items:
            $ref: '#/components/schemas/IncludeExpansion'
          default: []
    MediaSearchStats:
      type: object
      description: Search hit statistics for a single media
      required:
        - mediaPublicId
        - matchCount
        - episodeHits
      properties:
        mediaPublicId:
          type: string
          description: Media public ID (look up full details in `includes.media` when `include[]=media` is requested)
          pattern: ^[A-Za-z0-9_-]{12}$
          example: V1StGXR8_Z5d
        matchCount:
          type: integer
          description: Number of matching segments found in this media
          minimum: 0
          example: 42
        episodeHits:
          type: array
          description: Episode-level hit counts
          items:
            type: object
            required:
              - episode
              - hitCount
            properties:
              episode:
                type: integer
                description: Episode number
                minimum: 0
                example: 1
              hitCount:
                type: integer
                description: Number of matching segments in this episode
                minimum: 0
                example: 5
          example:
            - episode: 1
              hitCount: 5
            - episode: 2
              hitCount: 8
            - episode: 3
              hitCount: 3
    CategoryCount:
      type: object
      description: Count of entries grouped by media category
      required:
        - category
        - count
      properties:
        category:
          $ref: '#/components/schemas/Category'
        count:
          type: integer
          description: Number of entries in this category
          minimum: 0
          example: 1523
    SearchStatsResponse:
      type: object
      required:
        - media
        - categories
      properties:
        media:
          type: array
          items:
            $ref: '#/components/schemas/MediaSearchStats'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryCount'
        includes:
          type: object
          description: Optional related resources requested via `include[]`
          properties:
            media:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/Media'
              description: Media objects keyed by publicId. Present only when `include[]=media` is requested.
    SearchMultipleQuery:
      type: object
      description: What to search for (multiple words)
      required:
        - words
      properties:
        words:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 100
          description: List of words to search for
          minItems: 1
          maxItems: 100
          example:
            - 彼女
            - 私
        exactMatch:
          type: boolean
          default: false
          description: Require exact phrase matching (disables fuzzy and partial matches)
    SearchMultipleRequest:
      type: object
      required:
        - query
      properties:
        query:
          $ref: '#/components/schemas/SearchMultipleQuery'
        filters:
          $ref: '#/components/schemas/SearchFilters'
        include:
          type: array
          description: Optional resources to expand in the response `includes` block
          items:
            $ref: '#/components/schemas/IncludeExpansion'
          default: []
    WordMatchMedia:
      type: object
      description: Media match count entry
      required:
        - mediaPublicId
        - matchCount
      properties:
        mediaPublicId:
          type: string
          description: Media public ID (look up full details in `includes.media` when `include[]=media` is requested)
          pattern: ^[A-Za-z0-9_-]{12}$
          example: V1StGXR8_Z5d
        matchCount:
          type: integer
          description: Number of times the word appears in this media
          minimum: 0
          example: 234
    WordMatch:
      type: object
      description: Word matching result with occurrences across media
      required:
        - word
        - isMatch
        - matchCount
        - media
      properties:
        word:
          type: string
          description: The word that was searched for
          minLength: 1
          example: 彼女
        isMatch:
          type: boolean
          description: Indicates whether the word was found in any segment
          example: true
        matchCount:
          type: integer
          description: Total number of times this word appears across all media
          minimum: 0
          example: 1523
        media:
          type: array
          description: List of media containing this word
          items:
            $ref: '#/components/schemas/WordMatchMedia'
    SearchMultipleResponse:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/WordMatch'
        includes:
          type: object
          description: Optional related resources requested via `include[]`
          properties:
            media:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/Media'
              description: Media objects keyed by publicId. Present only when `include[]=media` is requested.
    SearchMediaFilters:
      type: object
      description: Filters for narrowing media search results
      properties:
        category:
          type: array
          description: Media category filter
          items:
            $ref: '#/components/schemas/Category'
          default:
            - ANIME
            - JDRAMA
    SearchMediaRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: Search term to match against media names (English, Japanese, romaji)
          minLength: 1
          pattern: .*\S.*
          example: steins
        take:
          type: integer
          description: Maximum number of results to return
          default: 10
          minimum: 1
          maximum: 40
        filters:
          $ref: '#/components/schemas/SearchMediaFilters'
    MediaSummary:
      type: object
      description: Slim media item returned by autocomplete (names + cover only)
      required:
        - publicId
        - slug
        - nameJa
        - nameRomaji
        - nameEn
        - coverUrl
        - category
      properties:
        publicId:
          type: string
          description: Public ID for the media
          pattern: ^[A-Za-z0-9_-]{12}$
          example: V1StGXR8_Z5d
        slug:
          type: string
          minLength: 1
          description: URL-friendly slug for the media
          example: bakuman
        nameJa:
          type: string
          minLength: 1
          description: Original Japanese name of the media
          example: バクマン。
        nameRomaji:
          type: string
          minLength: 1
          description: Romaji transliteration of the media name
          example: Bakuman.
        nameEn:
          type: string
          minLength: 1
          description: English name of the media
          example: Bakuman.
        coverUrl:
          type: string
          format: uri
          minLength: 1
          description: Full URL to the cover image
          example: https://cdn.example.com/media/anime/bakuman/cover.webp
        category:
          $ref: '#/components/schemas/Category'
    MediaAutocompleteResponse:
      type: object
      required:
        - media
      properties:
        media:
          type: array
          items:
            $ref: '#/components/schemas/MediaSummary'
    WordCoverageTier:
      type: object
      description: Coverage statistics for a frequency tier
      required:
        - tier
        - covered
        - total
        - percentage
      properties:
        tier:
          type: integer
          minimum: 1
          description: The frequency tier (e.g. 1000 means top 1000 words)
          example: 5000
        covered:
          type: integer
          minimum: 0
          description: Number of words with at least one match in the corpus
          example: 4823
        total:
          type: integer
          minimum: 0
          description: Total number of words in this tier
          example: 5000
        percentage:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Coverage percentage
          example: 96.5
    StatsOverview:
      type: object
      description: Corpus statistics overview
      required:
        - totalSegments
        - totalEpisodes
        - totalMedia
        - totalFrequencyWords
        - dialogueHours
        - tiers
        - lastUpdated
        - translations
      properties:
        totalSegments:
          type: integer
          minimum: 0
          description: Total number of active segments in the corpus
          example: 1200000
        totalEpisodes:
          type: integer
          minimum: 0
          description: Total number of episodes
          example: 8500
        totalMedia:
          type: integer
          minimum: 0
          description: Total number of media entries
          example: 350
        totalFrequencyWords:
          type: integer
          minimum: 0
          description: Total number of words in the frequency list
          example: 215900
        dialogueHours:
          type: number
          format: float
          minimum: 0
          description: Total hours of Japanese dialogue (subtitle coverage time)
          example: 2450.5
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/WordCoverageTier'
        lastUpdated:
          type: string
          format: date-time
          nullable: true
          description: When the word coverage data was last updated
        translations:
          type: object
          required:
            - total
            - enHuman
            - enMachine
            - esHuman
            - esMachine
          properties:
            total:
              type: integer
              minimum: 0
              description: Total active segments
              example: 1200000
            enHuman:
              type: integer
              minimum: 0
              description: Segments with human English translations
              example: 800000
            enMachine:
              type: integer
              minimum: 0
              description: Segments with machine English translations
              example: 350000
            esHuman:
              type: integer
              minimum: 0
              description: Segments with human Spanish translations
              example: 200000
            esMachine:
              type: integer
              minimum: 0
              description: Segments with machine Spanish translations
              example: 400000
    CursorPagination:
      type: object
      description: Opaque cursor pagination metadata
      required:
        - hasMore
        - cursor
      properties:
        hasMore:
          type: boolean
          description: Whether more results are available
          example: true
        cursor:
          type: string
          nullable: true
          minLength: 1
          description: Opaque token to pass on the next request to fetch the following page
          example: eyJraW...IxfQ
    MediaGlobalStats:
      type: object
      description: Global corpus totals across all media
      required:
        - totalMedia
        - totalSegments
        - totalEpisodes
      properties:
        totalMedia:
          type: integer
          description: Total number of media across all pages
          minimum: 0
          example: 312
        totalSegments:
          type: integer
          description: Total number of non-deleted segments
          minimum: 0
          example: 184520
        totalEpisodes:
          type: integer
          description: Total number of episodes
          minimum: 0
          example: 4287
    MediaListResponse:
      type: object
      required:
        - media
        - pagination
        - stats
      properties:
        media:
          type: array
          items:
            $ref: '#/components/schemas/Media'
        pagination:
          $ref: '#/components/schemas/CursorPagination'
        stats:
          $ref: '#/components/schemas/MediaGlobalStats'
    Error404:
      type: object
      description: Not Found error response
      required:
        - code
        - title
        - detail
        - status
      properties:
        code:
          type: string
          description: Specific error code for programmatic handling
          enum:
            - NOT_FOUND
        title:
          type: string
          minLength: 1
          description: A short, human-readable summary of the problem
        detail:
          type: string
          minLength: 1
          description: A human-readable explanation specific to this occurrence
        type:
          type: string
          format: uri
          minLength: 1
          description: A URI reference that identifies the problem type (e.g., GitHub issues link)
        instance:
          type: string
          minLength: 1
          description: A URI reference that identifies the specific occurrence (e.g., trace ID)
        status:
          type: integer
          description: The HTTP status code
          enum:
            - 404
        errors:
          type: object
          additionalProperties:
            type: string
          description: Optional map of field names to their error messages (for validation errors)
    SegmentContextResponse:
      type: object
      required:
        - segments
      properties:
        segments:
          type: array
          items:
            $ref: '#/components/schemas/Segment'
        includes:
          type: object
          description: Optional related resources requested via `include[]`
          properties:
            media:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/Media'
              description: Media objects keyed by publicId. Present only when `include[]=media` is requested.
    Episode:
      type: object
      description: Episode entry with metadata and dialogue segment count
      required:
        - mediaPublicId
        - episodeNumber
        - titleEn
        - titleRomaji
        - titleJa
        - description
        - airedAt
        - lengthSeconds
        - thumbnailUrl
        - segmentCount
      properties:
        mediaPublicId:
          type: string
          description: Media public ID this episode belongs to
          pattern: ^[A-Za-z0-9_-]{12}$
          example: V1StGXR8_Z5d
        episodeNumber:
          type: integer
          description: Episode number within the media (0 for movies/specials)
          minimum: 0
          example: 1
        titleEn:
          type: string
          nullable: true
          minLength: 1
          description: English title of the episode
          example: The Beginning
        titleRomaji:
          type: string
          nullable: true
          minLength: 1
          description: Romanized title of the episode
          example: Hajimari
        titleJa:
          type: string
          nullable: true
          minLength: 1
          description: Japanese title of the episode
          example: 始まり
        description:
          type: string
          nullable: true
          minLength: 1
          description: Episode description or synopsis
          example: The hero begins their journey
        airedAt:
          type: string
          format: date-time
          nullable: true
          description: When the episode originally aired
          example: '2024-01-15T09:00:00Z'
        lengthSeconds:
          type: integer
          nullable: true
          minimum: 0
          description: Episode duration in seconds
          example: 1420
        thumbnailUrl:
          type: string
          format: uri
          nullable: true
          minLength: 1
          description: URL to episode thumbnail image
          example: https://example.com/thumbnails/episode1.jpg
        segmentCount:
          type: integer
          description: Number of segments in this episode
          minimum: 0
          example: 450
    EpisodeListResponse:
      type: object
      required:
        - episodes
        - pagination
      properties:
        episodes:
          type: array
          items:
            $ref: '#/components/schemas/Episode'
        pagination:
          $ref: '#/components/schemas/CursorPagination'
    UserMe:
      type: object
      required:
        - user
        - quota
      properties:
        user:
          type: object
          required:
            - username
            - createdAt
            - role
          properties:
            username:
              type: string
              minLength: 1
              description: The user's display name.
              example: tanaka_san
            createdAt:
              type: string
              format: date-time
              description: When the account was created.
              example: '2024-03-15T10:00:00.000Z'
            role:
              type: string
              minLength: 1
              description: The user's account tier or role.
              example: USER
        quota:
          type: object
          required:
            - used
            - limit
            - remaining
            - periodYyyymm
            - periodStart
            - periodEnd
          properties:
            used:
              type: integer
              minimum: 0
              description: Number of API requests used this month.
              example: 342
            limit:
              type: integer
              minimum: 0
              description: Maximum number of API requests allowed per month.
              example: 5000
            remaining:
              type: integer
              minimum: 0
              description: Number of API requests remaining this month.
              example: 4658
            periodYyyymm:
              type: integer
              minimum: 202001
              description: Current month in YYYYMM format.
              example: 202602
            periodStart:
              type: string
              format: date-time
              description: Start of the current month (UTC).
              example: '2026-02-01T00:00:00.000Z'
            periodEnd:
              type: string
              format: date-time
              description: End of the current month (UTC).
              example: '2026-02-28T23:59:59.999Z'
    ActivityType:
      type: string
      enum:
        - SEARCH
        - ANKI_EXPORT
        - SEGMENT_PLAY
        - SHARE
      description: Type of user activity
    UserActivity:
      type: object
      required:
        - id
        - activityType
        - segmentPublicId
        - mediaPublicId
        - searchQuery
        - mediaName
        - japaneseText
        - createdAt
      properties:
        id:
          type: integer
          minimum: 1
        activityType:
          $ref: '#/components/schemas/ActivityType'
        segmentPublicId:
          type: string
          nullable: true
          minLength: 1
          pattern: ^[A-Za-z0-9_-]{12}$
        mediaPublicId:
          type: string
          nullable: true
          minLength: 1
          pattern: ^[A-Za-z0-9_-]{12}$
        searchQuery:
          type: string
          nullable: true
          minLength: 1
        mediaName:
          type: string
          nullable: true
          minLength: 1
        japaneseText:
          type: string
          nullable: true
          minLength: 1
        createdAt:
          type: string
          format: date-time
    HeatmapDayCounts:
      type: object
      description: Activity counts for a single day, broken down by type. Only types with at least 1 event are present.
      properties:
        SEARCH:
          type: integer
          minimum: 0
        SEGMENT_PLAY:
          type: integer
          minimum: 0
        ANKI_EXPORT:
          type: integer
          minimum: 0
        SHARE:
          type: integer
          minimum: 0
    UserActivityStats:
      type: object
      description: Aggregate statistics about a user's activity
      required:
        - totalSearches
        - totalExports
        - totalPlays
        - totalListAdds
        - totalShares
        - topMedia
      properties:
        totalSearches:
          type: integer
          minimum: 0
          example: 1240
        totalExports:
          type: integer
          minimum: 0
          example: 82
        totalPlays:
          type: integer
          minimum: 0
          example: 3400
        totalListAdds:
          type: integer
          minimum: 0
          example: 58
        totalShares:
          type: integer
          minimum: 0
          example: 17
        topMedia:
          type: array
          items:
            type: object
            required:
              - mediaPublicId
              - mediaName
              - count
            properties:
              mediaPublicId:
                type: string
                minLength: 1
                example: V1StGXR8_Z5d
              mediaName:
                type: string
                minLength: 1
                example: Steins;Gate
              count:
                type: integer
                minimum: 1
                example: 240
    CollectionVisibility:
      type: string
      description: Visibility of a collection
      enum:
        - PUBLIC
        - PRIVATE
      example: PRIVATE
    Collection:
      type: object
