          type: string
          description: Japanese name of the series
          example: バクマン。シリーズ
        nameRomaji:
          type: string
          description: Romaji name of the series
          example: Bakuman. Series
        nameEn:
          type: string
          description: English name of the series
          example: Bakuman Series
    SeriesListResponse:
      type: object
      required:
        - series
        - pagination
      properties:
        series:
          type: array
          items:
            $ref: '#/components/schemas/Series'
        pagination:
          $ref: '#/components/schemas/OpaqueCursorPagination'
    SeriesWithMedia:
      type: object
      description: Series with ordered media entries
      required:
        - id
        - nameJa
        - nameRomaji
        - nameEn
        - media
      properties:
        id:
          type: integer
          description: Series ID
          example: 1
        nameJa:
          type: string
          description: Japanese name of the series
          example: バクマン。シリーズ
        nameRomaji:
          type: string
          description: Romaji name of the series
          example: Bakuman. Series
        nameEn:
          type: string
          description: English name of the series
          example: Bakuman Series
        media:
          type: array
          description: All media in the series, sorted by position
          items:
            type: object
            required:
              - position
              - media
            properties:
              position:
                type: integer
                description: Position in the series (1-indexed)
                example: 1
              media:
                $ref: '#/components/schemas/Media'
    Character:
      type: object
      description: Anime character
      required:
        - id
        - publicId
        - externalIds
        - nameJa
        - nameEn
        - imageUrl
      properties:
        id:
          type: integer
          description: Internal character ID
          example: 1
        publicId:
          type: string
          description: Public identifier for the character (use this in public URLs)
          example: V1StGXR8_Z5d
        externalIds:
          $ref: '#/components/schemas/ExternalId'
        nameJa:
          type: string
          description: Japanese name of the character
          example: 真城最高
        nameEn:
          type: string
          description: English name of the character
          example: Moritaka Mashiro
        imageUrl:
          type: string
          format: uri
          description: Character image URL
          example: https://s4.anilist.co/file/anilistcdn/character/large/b14545.jpg
    CharacterWithMedia:
      description: Character with voice actor and all media appearances
      allOf:
        - $ref: '#/components/schemas/Character'
        - type: object
          required:
            - seiyuu
            - mediaAppearances
          properties:
            seiyuu:
              $ref: '#/components/schemas/Seiyuu'
            mediaAppearances:
              type: array
              description: All media this character appears in
              items:
                type: object
                required:
                  - media
                  - role
                properties:
                  media:
                    $ref: '#/components/schemas/Media'
                  role:
                    type: string
                    enum:
                      - MAIN
                      - SUPPORTING
                      - BACKGROUND
                    description: Character role in this media
                    example: MAIN
    SeiyuuWithRoles:
      type: object
      description: Seiyuu details with optional character appearances
      required:
        - id
        - externalIds
        - nameJa
        - nameEn
        - imageUrl
        - characters
      properties:
        id:
          type: integer
          description: AniList staff ID
          example: 95991
        externalIds:
          $ref: '#/components/schemas/ExternalId'
        nameJa:
          type: string
          description: Japanese name of the voice actor
          example: 阿部敦
        nameEn:
          type: string
          description: English name of the voice actor
          example: Atsushi Abe
        imageUrl:
          type: string
          format: uri
          description: Profile image URL
          example: https://s4.anilist.co/file/anilistcdn/staff/large/n95991.jpg
        characters:
          type: array
          description: Characters voiced by this seiyuu with their media appearances
          items:
            allOf:
              - $ref: '#/components/schemas/Character'
              - type: object
                required:
                  - media
                  - role
                properties:
                  media:
                    $ref: '#/components/schemas/Media'
                  role:
                    type: string
                    enum:
                      - MAIN
                      - SUPPORTING
                      - BACKGROUND
                    description: Character role in this media
                    example: MAIN
    Episode:
      type: object
      required:
        - mediaId
        - episodeNumber
        - segmentCount
      properties:
        mediaId:
          type: integer
          description: ID of the media this episode belongs to
          example: 7674
        episodeNumber:
          type: integer
          description: Episode number within the media
          example: 1
        titleEn:
          type: string
          nullable: true
          description: English title of the episode
          example: The Beginning
        titleRomaji:
          type: string
          nullable: true
          description: Romanized title of the episode
          example: Hajimari
        titleJa:
          type: string
          nullable: true
          description: Japanese title of the episode
          example: 始まり
        description:
          type: string
          nullable: true
          description: Episode description or synopsis
          example: The hero begins their journey
        airedAt:
          type: string
          format: date-time
          nullable: true
          description: When the episode originally aired
          example: '2024-01-15T09:00:00Z'
        lengthSeconds:
          type: integer
          nullable: true
          description: Episode duration in seconds
          example: 1420
        thumbnailUrl:
          type: string
          nullable: true
          description: URL to episode thumbnail image
          example: https://example.com/thumbnails/episode1.jpg
        segmentCount:
          type: integer
          description: Number of segments in this episode
          example: 450
    EpisodeListResponse:
      type: object
      required:
        - episodes
        - pagination
      properties:
        episodes:
          type: array
          items:
            $ref: '#/components/schemas/Episode'
          description: Array of episode objects
        pagination:
          $ref: '#/components/schemas/OpaqueCursorPagination'
  examples:
    ValidationFailed:
      summary: Validation Failed
      value:
        code: VALIDATION_FAILED
        title: Validation Failed
        detail: The request data did not pass validation rules. Please check the errors field for details.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 400
        errors:
          query: Required
          limit: Must be a positive integer
          email: Invalid email format
    InvalidJson:
      summary: Invalid JSON
      value:
        code: INVALID_JSON
        title: Invalid JSON
        detail: The request body contains invalid JSON that could not be parsed. Please check the syntax.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 400
    AuthCredentialsRequired:
      summary: Authentication Credentials Required
      value:
        code: AUTH_CREDENTIALS_REQUIRED
        title: Authentication Credentials Required
        detail: No API key or session credentials were provided. Please include an Authorization Bearer token or a valid session cookie.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 401
    AuthCredentialsInvalid:
      summary: Invalid Authentication Credentials
      value:
        code: AUTH_CREDENTIALS_INVALID
        title: Invalid Authentication Credentials
        detail: The provided API key or session credentials are invalid. Please check your credentials and try again.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 401
    AuthCredentialsExpired:
      summary: Expired Authentication Credentials
      value:
        status: 401
        code: AUTH_CREDENTIALS_EXPIRED
        title: Expired Authentication Credentials
        detail: Your credentials are not valid anymore. Please sign in again or create a new API key.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
    InsufficientPermissions:
      summary: Insufficient Permissions
      value:
        code: INSUFFICIENT_PERMISSIONS
        title: Insufficient Permissions
        detail: 'Your account lacks the required permissions to perform this action. Required permissions: {permissions}.'
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 403
    RateLimitExceeded:
      summary: Rate Limit Exceeded
      value:
        code: RATE_LIMIT_EXCEEDED
        title: Rate Limit Exceeded
        detail: You have made too many requests. Please slow down and try again later.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 429
    QuotaExceeded:
      summary: Quota Exceeded
      value:
        code: QUOTA_EXCEEDED
        title: Quota Exceeded
        detail: You have exceeded your monthly API quota. Please upgrade your plan or wait until next month.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 429
    InternalServerError:
      summary: Internal Server Error
      value:
        code: INTERNAL_SERVER_EXCEPTION
        title: Internal Server Error
        detail: An unexpected error occurred on our end. Please try again later. If the problem persists, please report this issue.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 500
    NotFound:
      summary: Not Found
      value:
        code: NOT_FOUND
        title: Not Found
        detail: The requested resource could not be found. Please check the URL and try again.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 404
  responses:
    UnauthorizedApiKey:
      description: Unauthorized (API key)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error401'
          examples:
            AuthCredentialsRequired:
              $ref: '#/components/examples/AuthCredentialsRequired'
            AuthCredentialsInvalid:
              $ref: '#/components/examples/AuthCredentialsInvalid'
            AuthCredentialsExpired:
              $ref: '#/components/examples/AuthCredentialsExpired'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error403'
          examples:
            InsufficientPermissions:
              $ref: '#/components/examples/InsufficientPermissions'
    TooManyRequests:
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error429'
          examples:
            RateLimitExceeded:
              $ref: '#/components/examples/RateLimitExceeded'
            QuotaExceeded:
              $ref: '#/components/examples/QuotaExceeded'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error500'
          examples:
            InternalServerError:
              $ref: '#/components/examples/InternalServerError'
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error400'
          examples:
            ValidationFailed:
              $ref: '#/components/examples/ValidationFailed'
            InvalidJson:
              $ref: '#/components/examples/InvalidJson'
    SegmentInternalResponse:
      description: Single segment response with internal fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SegmentInternal'
    Unauthorized:
      description: Unauthorized (API key or session)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error401'
          examples:
            AuthCredentialsRequired:
              $ref: '#/components/examples/AuthCredentialsRequired'
            AuthCredentialsInvalid:
              $ref: '#/components/examples/AuthCredentialsInvalid'
            AuthCredentialsExpired:
              $ref: '#/components/examples/AuthCredentialsExpired'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error404'
          examples:
            NotFound:
              $ref: '#/components/examples/NotFound'
    EpisodeListResponse:
      description: Paginated list of episodes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EpisodeListResponse'
    EpisodeResponse:
      description: Single episode response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Episode'
    SegmentResponse:
      description: Single segment response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Segment'
