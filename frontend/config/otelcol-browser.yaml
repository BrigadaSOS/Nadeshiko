extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        include_metadata: true
        cors:
          allowed_origins:
            - https://nadeshiko.co
            - https://dev.nadeshiko.co
          allowed_headers: ["*"]
          max_age: 7200

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 25

  attributes/cf:
    actions:
      - key: client_geo_country
        from_context: metadata.cf-ipcountry
        action: insert
      - key: cf_ray
        from_context: metadata.cf-ray
        action: insert
      - key: client_address
        from_context: metadata.cf-connecting-ip
        action: insert

  groupbyattrs/cf:
    keys:
      - client_geo_country
      - cf_ray
      - client_address

  resource/source:
    attributes:
      - key: telemetry.source
        value: browser
        action: insert

  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  otlphttp:
    endpoint: http://host.docker.internal:4328
    compression: gzip

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/cf, groupbyattrs/cf, resource/source, batch]
      exporters: [otlphttp]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, attributes/cf, groupbyattrs/cf, resource/source, batch]
      exporters: [otlphttp]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, attributes/cf, groupbyattrs/cf, resource/source, batch]
      exporters: [otlphttp]
