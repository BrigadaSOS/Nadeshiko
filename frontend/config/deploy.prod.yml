service: nadeshiko-frontend-prod
image: brigadasos/nadeshiko-frontend-prod

options:
  # Memory limit: 1GB RAM + 256MB swap
  # Nuxt SSR workers=3, each ~200-300MB
  memory: 1g
  memory-swap: 1.25g

builder:
  args:
    NUXT_PUBLIC_ENVIRONMENT: production
    NITRO_PRESET: node_cluster

proxy:
  ssl: true
  host: nadeshiko.co
  app_port: 3000
  forward_headers: true

env:
  secret:
    - NUXT_NADESHIKO_API_KEY

  clear:
    NUXT_PUBLIC_ENVIRONMENT: production
    NODE_ENV: production
    NUXT_BACKEND_INTERNAL_URL: https://api.nadeshiko.co
    PORT: 3000
    LOG_LEVEL: info

    NITRO_PRESET: node_cluster
    NITRO_CLUSTER_WORKERS: 3

    OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4328"
    OTEL_SERVICE_NAME: nadeshiko-frontend-prod
    OTEL_SEMCONV_STABILITY_OPT_IN: http
