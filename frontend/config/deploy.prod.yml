service: nadeshiko-frontend-prod
image: brigadasos/nadeshiko-frontend-prod

servers:
  web:
    options:
      # Memory limit: 1GB RAM + 256MB swap
      # Nuxt SSR workers=3, each ~200-300MB
      memory: 1g
      memory-swap: 1.25g

builder:
  args:
    NUXT_PUBLIC_ENVIRONMENT: production
    NITRO_PRESET: node_cluster

proxy:
  ssl: true
  host: nadeshiko.co
  app_port: 3000
  forward_headers: true

env:
  secret:
    - NUXT_NADESHIKO_API_KEY

  clear:
    NUXT_PUBLIC_ENVIRONMENT: production
    NODE_ENV: production
    NUXT_BACKEND_INTERNAL_URL: https://api.nadeshiko.co
    PORT: 3000
    LOG_LEVEL: info

    NITRO_PRESET: node_cluster
    NITRO_CLUSTER_WORKERS: 3

    OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4328"
    OTEL_SERVICE_NAME: nadeshiko-frontend-prod
    OTEL_SEMCONV_STABILITY_OPT_IN: http

    NUXT_PUBLIC_FARO_URL: "https://o.nadeshiko.co"

accessories:
  otelcol-browser:
    image: otel/opentelemetry-collector-contrib:0.117.0
    host: nadeshiko
    cmd: "--config=/etc/otelcol/config.yaml"
    # Proxy route registered manually after boot:
    #   ssh nadeshiko "docker exec kamal-proxy kamal-proxy deploy \
    #     nadeshiko-frontend-prod-otelcol-browser \
    #     --target \$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' nadeshiko-frontend-prod-otelcol-browser):4318 \
    #     --host o.nadeshiko.co --tls \
    #     --health-check-port 13133 --health-check-path /"
    options:
      memory: 192m
      add-host: host.docker.internal:host-gateway
    env:
      clear:
        GOMEMLIMIT: 150MiB
    files:
      - config/otelcol-browser.yaml:/etc/otelcol/config.yaml:ro
