service: nadeshiko-frontend-prod
image: brigadasos/nadeshiko-frontend-prod

servers:
  web:
    options:
      # Memory limit: 1GB RAM + 256MB swap
      # Nuxt SSR workers=3, each ~200-300MB
      memory: 1g
      memory-swap: 1.25g

builder:
  args:
    NUXT_PUBLIC_ENVIRONMENT: production
    NITRO_PRESET: node_cluster

proxy:
  ssl: true
  host: nadeshiko.co
  app_port: 3000
  forward_headers: true

env:
  secret:
    - NUXT_NADESHIKO_API_KEY
    - NUXT_INTERNAL_PROXY_SECRET

  clear:
    NUXT_PUBLIC_ENVIRONMENT: production
    NODE_ENV: production
    NUXT_BACKEND_INTERNAL_URL: https://api.nadeshiko.co
    PORT: 3000
    LOG_LEVEL: info

    NITRO_PRESET: node_cluster
    NITRO_CLUSTER_WORKERS: 3

    OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4328"
    OTEL_SERVICE_NAME: nadeshiko-frontend-prod
    OTEL_SEMCONV_STABILITY_OPT_IN: http

    # Grafana Faro browser RUM. o.nadeshiko.co is routed by kamal-proxy to the
    # host Alloy's Faro receiver (:4329, /collect); its CORS already allows
    # nadeshiko.co + dev.nadeshiko.co. Replaces the old otelcol-browser sidecar.
    NUXT_PUBLIC_FARO_URL: "https://o.nadeshiko.co/collect"

# The otelcol-browser accessory was removed: browser RUM now goes straight to
# the host Alloy Faro receiver. Server-side (SSR) telemetry still uses
# OTEL_EXPORTER_OTLP_ENDPOINT → host.docker.internal:4328 (also Alloy).
#
# After the first deploy, point kamal-proxy at the Faro receiver:
#   ssh nadeshiko "docker exec kamal-proxy kamal-proxy deploy \
#     nadeshiko-frontend-prod-faro \
#     --target 172.18.0.1:4329 --host o.nadeshiko.co --tls \
#     --health-check-port 12345 --health-check-path /-/ready"
