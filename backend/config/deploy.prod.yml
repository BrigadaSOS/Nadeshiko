image: brigadasos/nadeshiko-backend-prod
service: nadeshiko-backend-prod

proxy:
  ssl: true
  host: api.nadeshiko.co
  forward_headers: true

options:
  # Memory limit: 1.5GB RAM + 512MB swap
  # Current ~310MB, peaks ~1.2GB under load = 1.25x headroom
  memory: 1.5g
  memory-swap: 2g

env:
  secret:
    - ALLOWED_WEBSITE_URLS
    - API_KEY_MASTER
    - BETTER_AUTH_SECRET

    - EMAIL_API_NADEDB
    - USERNAME_API_NADEDB
    - UUID_NAMESPACE

    - POSTGRES_USER
    - POSTGRES_PASSWORD
    - POSTGRES_DB

    - ELASTICSEARCH_USER
    - ELASTICSEARCH_PASSWORD

    - DISCORD_CLIENT_ID
    - DISCORD_CLIENT_SECRET

    - ID_OAUTH_GOOGLE
    - SECRET_OAUTH_GOOGLE

    - SES_AWS_REGION
    - SES_AWS_ACCESS_KEY_ID
    - SES_AWS_SECRET_ACCESS_KEY
    - SES_FROM_EMAIL
    - SES_FROM_NAME

    - E2E_USER_PASSWORD

  clear:
    ENVIRONMENT: production
    PORT: 80
    BASE_URL: https://nadeshiko.co

    POSTGRES_HOST: "nadeshiko-backend-prod-postgres"
    POSTGRES_PORT: 5432

    ELASTICSEARCH_HOST: "http://nadeshiko-backend-prod-elasticsearch:9200"
    ELASTICSEARCH_INDEX: nadedb_prod

    R2_BASE_URL: https://cdn.nadeshiko.co

    OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4328"
    OTEL_SERVICE_NAME: nadeshiko-backend-prod
    OTEL_SEMCONV_STABILITY_OPT_IN: http

accessories:
  postgres:
    image: postgres:17
    host: nadeshiko
    port: "100.114.126.96:5432:5432"
    options:
      # Memory limit: 1GB (current ~310MB, 3x headroom)
      # Postgres persists data to disk, safe to OOM-kill and restart
      memory: 1g
      publish:
        - "127.0.0.1:5432:5432"
    cmd: >
      -c shared_preload_libraries='pg_stat_statements,auto_explain'
      -c pg_stat_statements.track=all
      -c auto_explain.log_min_duration=1000
    env:
      secret:
        - POSTGRES_USER:POSTGRES_ADMIN_USER
        - POSTGRES_PASSWORD:POSTGRES_ADMIN_PASSWORD
        - POSTGRES_DB
    volumes:
      - nadeshiko-postgres-data:/var/lib/postgresql/data

  elasticsearch:
    image: ghcr.io/davafons/nadeshiko-elasticsearch:8.17.10
    host: nadeshiko
    port: "100.114.126.96:9200:9200"
    env:
      secret:
        - ELASTICSEARCH_ADMIN_PASSWORD
      clear:
        discovery.type: single-node
        ES_JAVA_OPTS: "-Xms1g -Xmx1g"
        xpack.security.enabled: "true"
        xpack.security.http.ssl.enabled: "false"
        http.host: "0.0.0.0"
    volumes:
      - nadeshiko-elasticsearch-data:/usr/share/elasticsearch/data
    cmd: >
      bash -c '
        export ELASTIC_PASSWORD="$ELASTICSEARCH_ADMIN_PASSWORD";
        ./bin/elasticsearch
      '
    options:
      # Memory limit: 3.5GB (current ~2.7GB, 800MB headroom for growth)
      # JVM heap fixed at 1GB via ES_JAVA_OPTS; rest is Lucene off-heap
      memory: 3.5g
      ulimit:
        - nofile=65536:65536
        - memlock=-1:-1

  # Rebuild with:
  #   docker build --target toolbox -t ghcr.io/brigadasos/nadeshiko-toolbox:latest .
  #   docker push ghcr.io/brigadasos/nadeshiko-toolbox:latest
  #   kamal accessory reboot toolbox -d prod
  toolbox:
    image: ghcr.io/brigadasos/nadeshiko-toolbox:latest
    host: nadeshiko
    cmd: "sleep infinity"
    env:
      secret:
        - POSTGRES_USER
        - POSTGRES_PASSWORD
        - POSTGRES_DB
        - POSTGRES_ADMIN_USER
        - POSTGRES_ADMIN_PASSWORD

        - ELASTICSEARCH_USER
        - ELASTICSEARCH_PASSWORD
        - ELASTICSEARCH_ADMIN_USER
        - ELASTICSEARCH_ADMIN_PASSWORD

        - EMAIL_API_NADEDB
        - USERNAME_API_NADEDB
        - UUID_NAMESPACE
        - API_KEY_MASTER
        - BETTER_AUTH_SECRET
        - E2E_USER_PASSWORD
      clear:
        ENVIRONMENT: production
        PORT: 80
        BASE_URL: https://nadeshiko.co
        POSTGRES_HOST: "nadeshiko-backend-prod-postgres"
        POSTGRES_PORT: 5432
        ELASTICSEARCH_HOST: "http://nadeshiko-backend-prod-elasticsearch:9200"
        ELASTICSEARCH_INDEX: nadedb_prod
        R2_BASE_URL: https://cdn.nadeshiko.co
        SES_FROM_EMAIL: "noreply@nadeshiko.co"
        SES_FROM_NAME: "Nadeshiko"

  pg-backup:
    image: kartoza/pg-backup:17-3.5
    host: nadeshiko
    env:
      clear:
        CRON_SCHEDULE: "0 2 * * *"
        REMOVE_BEFORE: "30"
        STORAGE_BACKEND: "S3"
        CONSOLE_LOGGING: "True"
        SSL_SECURE: "True"
        POSTGRES_MAJOR_VERSION: "17"
        POSTGRES_HOST: "nadeshiko-backend-prod-postgres"
        POSTGRES_PORT: "5432"
        DEFAULT_REGION: "auto"
      secret:
        - POSTGRES_USER:POSTGRES_ADMIN_USER
        - POSTGRES_PASS:POSTGRES_ADMIN_PASSWORD
        - ACCESS_KEY_ID:R2_BACKUP_ACCESS_KEY_ID
        - SECRET_ACCESS_KEY:R2_BACKUP_SECRET_ACCESS_KEY
        - BUCKET:R2_BACKUP_BUCKET
        - HOST_BASE:R2_BACKUP_HOST_BASE
        - HOST_BUCKET:R2_BACKUP_HOST_BUCKET
