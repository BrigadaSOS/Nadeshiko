servers:
  web:
    hosts:
      - nadeshiko
    options:
      add-host: host.docker.internal:host-gateway

registry:
  server: ghcr.io
  username: kamal
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

ssh:
  user: docker

aliases:
  console: app exec -i bash
  toolbox-console: accessory exec toolbox -i "bash"
  logs: app logs -f
