service: nadeshiko-backend-dev
image: brigadasos/nadeshiko-backend-dev

options:
  # Memory limit: 1.5GB RAM + 256MB swap for dev
  memory: 1.5g
  memory-swap: 1.75g

proxy:
  ssl: true
  host: api-dev.nadeshiko.co
  forward_headers: true

env:
  secret:
    - ALLOWED_WEBSITE_URLS
    - API_KEY_MASTER
    - BETTER_AUTH_SECRET

    - EMAIL_API_NADEDB
    - USERNAME_API_NADEDB
    - UUID_NAMESPACE

    - POSTGRES_USER
    - POSTGRES_PASSWORD
    - POSTGRES_DB

    - ELASTICSEARCH_USER
    - ELASTICSEARCH_PASSWORD

    - DISCORD_CLIENT_ID
    - DISCORD_CLIENT_SECRET

    - ID_OAUTH_GOOGLE
    - SECRET_OAUTH_GOOGLE

    - SES_AWS_REGION
    - SES_AWS_ACCESS_KEY_ID
    - SES_AWS_SECRET_ACCESS_KEY
    - SES_FROM_EMAIL
    - SES_FROM_NAME

    - E2E_USER_PASSWORD

  clear:
    ENVIRONMENT: development
    PORT: 80
    BASE_URL: https://dev.nadeshiko.co

    POSTGRES_HOST: "nadeshiko-backend-prod-postgres"
    POSTGRES_PORT: 5432

    ELASTICSEARCH_HOST: "http://nadeshiko-backend-prod-elasticsearch:9200"
    ELASTICSEARCH_INDEX: nadedb_dev

    R2_BASE_URL: https://cdn.nadeshiko.co

    OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4328"
    OTEL_SERVICE_NAME: nadeshiko-backend-dev
    OTEL_SEMCONV_STABILITY_OPT_IN: http

accessories:
  # Rebuild with:
  #   docker build --target toolbox -t ghcr.io/brigadasos/nadeshiko-toolbox:latest .
  #   docker push ghcr.io/brigadasos/nadeshiko-toolbox:latest
  #   kamal accessory reboot toolbox -d dev
  toolbox:
    image: ghcr.io/brigadasos/nadeshiko-toolbox:latest
    host: nadeshiko
    cmd: "sleep infinity"
    env:
      secret:
        - POSTGRES_USER
        - POSTGRES_PASSWORD
        - POSTGRES_DB
        - POSTGRES_ADMIN_USER
        - POSTGRES_ADMIN_PASSWORD

        - ELASTICSEARCH_USER
        - ELASTICSEARCH_PASSWORD
        - ELASTICSEARCH_ADMIN_USER
        - ELASTICSEARCH_ADMIN_PASSWORD

        - EMAIL_API_NADEDB
        - USERNAME_API_NADEDB
        - UUID_NAMESPACE
        - API_KEY_MASTER
        - BETTER_AUTH_SECRET
        - E2E_USER_PASSWORD
      clear:
        ENVIRONMENT: development
        PORT: 80
        BASE_URL: https://dev.nadeshiko.co
        POSTGRES_HOST: "nadeshiko-backend-prod-postgres"
        POSTGRES_PORT: 5432
        ELASTICSEARCH_HOST: "http://nadeshiko-backend-prod-elasticsearch:9200"
        ELASTICSEARCH_INDEX: nadedb_dev
        R2_BASE_URL: https://cdn.nadeshiko.co
        SES_FROM_EMAIL: "noreply@nadeshiko.co"
        SES_FROM_NAME: "Nadeshiko"
