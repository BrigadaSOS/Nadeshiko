                      totalMedia:
                        type: integer
                      totalEpisodes:
                        type: integer
                      totalSegments:
                        type: integer
                      totalCharacters:
                        type: integer
                      totalSeiyuu:
                        type: integer
                  users:
                    type: object
                    required:
                      - totalUsers
