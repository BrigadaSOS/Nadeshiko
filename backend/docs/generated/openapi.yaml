                          clusterName:
                            type: string
                            nullable: true
                          clusterStatus:
                            type: string
                            nullable: true
                          indexName:
                            type: string
                            nullable: true
                          documentCount:
                            type: integer
                            nullable: true
                      database:
                        type: object
                        required:
                          - status
                        properties:
                          status:
                            type: string
                            enum:
                              - connected
                              - disconnected
                          version:
                            type: string
                            nullable: true
                      queues:
                        type: array
                        items:
                          type: object
                          required:
                            - queue
                            - stuckCount
                            - failedCount
                          properties:
                            queue:
                              type: string
                            stuckCount:
                              type: integer
                            failedCount:
                              type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedSession'
        '403':
