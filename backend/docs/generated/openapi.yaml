        count:
          type: integer
          description: Number of entries in this category
          example: 1523
    SearchStatsResponse:
      type: object
      properties:
        media:
          type: array
          items:
            $ref: '#/components/schemas/MediaSearchStats'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryCount'
        includes:
          type: object
          properties:
            media:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/Media'
              description: Media objects keyed by mediaId
    SearchMultipleRequest:
      type: object
      properties:
        query:
          type: object
          description: What to search for
          properties:
            words:
              type: array
              items:
                type: string
              description: List of words to search for
              example:
                - 彼女
                - 私
            exactMatch:
              type: boolean
              default: false
              description: Whether to use exact matching
          required:
            - words
        filters:
          $ref: '#/components/schemas/SearchFilters'
        include:
          type: array
          description: Resources to expand in the response includes block
          items:
            $ref: '#/components/schemas/IncludeExpansion'
          default: []
      required:
        - query
