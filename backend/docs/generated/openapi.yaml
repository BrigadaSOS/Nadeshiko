                example: MAIN
    UserQuotaResponse:
      type: object
      required:
        - quotaUsed
        - quotaLimit
        - quotaRemaining
        - periodYyyymm
        - periodStart
        - periodEnd
      properties:
        quotaUsed:
          type: integer
          description: Number of API requests used in the current billing period.
          example: 342
        quotaLimit:
          type: integer
          description: Maximum number of API requests allowed in the current billing period.
          example: 2500
        quotaRemaining:
          type: integer
          description: Number of API requests remaining in the current billing period.
          example: 2158
        periodYyyymm:
          type: integer
          description: Current billing period in YYYYMM format.
          example: 202602
        periodStart:
          type: string
          format: date-time
          description: Start of the current billing period (UTC).
          example: '2026-02-01T00:00:00.000Z'
        periodEnd:
          type: string
          format: date-time
          description: End of the current billing period (UTC).
          example: '2026-02-28T23:59:59.999Z'
    Report:
      type: object
      required:
        - id
        - source
        - targetType
        - targetMediaId
        - reason
        - status
        - createdAt
      properties:
        id:
          type: integer
          description: Report ID
          example: 1
        source:
          type: string
          enum:
            - USER
            - AUTO
          description: Who created this report
          example: USER
        targetType:
          type: string
          enum:
            - SEGMENT
            - EPISODE
            - MEDIA
          description: What level the report targets
          example: SEGMENT
        targetMediaId:
          type: integer
          description: Media ID this report targets
          example: 42
        targetEpisodeNumber:
          type: integer
          nullable: true
          description: Episode number (for EPISODE/SEGMENT targets)
          example: 5
        targetSegmentUuid:
          type: string
          nullable: true
          description: Segment UUID (for SEGMENT targets)
          example: 3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e
        reviewCheckRunId:
          type: integer
          nullable: true
          description: ID of the auto-check run that created this report (AUTO only)
        reason:
          type: string
          enum:
            - WRONG_TRANSLATION
            - WRONG_TIMING
            - WRONG_AUDIO
            - NSFW_NOT_TAGGED
            - DUPLICATE_SEGMENT
            - WRONG_METADATA
            - MISSING_EPISODES
            - WRONG_COVER_IMAGE
            - INAPPROPRIATE_CONTENT
            - OTHER
            - LOW_SEGMENT_MEDIA
            - EMPTY_EPISODES
            - MISSING_EPISODES_AUTO
            - BAD_SEGMENT_RATIO
            - MEDIA_WITH_NO_EPISODES
            - MISSING_TRANSLATIONS
            - DB_ES_SYNC_ISSUES
            - HIGH_REPORT_DENSITY
          description: Reason for the report
          example: WRONG_TRANSLATION
        description:
          type: string
          nullable: true
          description: Optional description with additional details
        data:
          type: object
          nullable: true
          description: Check-specific metrics (AUTO reports) or null (USER reports)
          additionalProperties: true
        status:
          type: string
          enum:
            - PENDING
            - CONCERN
            - ACCEPTED
            - REJECTED
            - RESOLVED
            - IGNORED
          description: Current status of the report
          example: PENDING
        adminNotes:
          type: string
          nullable: true
          maxLength: 1000
          description: Notes from the admin who reviewed the report
        userId:
          type: integer
          nullable: true
          description: ID of the user who submitted the report (USER reports only)
          example: 42
        createdAt:
          type: string
          format: date-time
          description: When the report was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the report was last updated
    ReportListResponse:
      type: object
      required:
        - data
        - hasMore
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Report'
        hasMore:
          type: boolean
          description: Whether more results are available
          example: true
        cursor:
          type: integer
          nullable: true
          description: Cursor for next page
          example: 10
    CreateReportRequest:
      type: object
      required:
        - targetType
        - targetMediaId
        - reason
      properties:
        targetType:
          type: string
          enum:
            - SEGMENT
            - MEDIA
          description: Type of the entity being reported
          example: SEGMENT
        targetMediaId:
          type: integer
          description: Media ID of the reported entity
          example: 42
        targetSegmentUuid:
          type: string
          description: Segment UUID (required when targetType is SEGMENT)
          example: 3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e
        reason:
          type: string
          enum:
            - WRONG_TRANSLATION
            - WRONG_TIMING
            - WRONG_AUDIO
            - NSFW_NOT_TAGGED
            - DUPLICATE_SEGMENT
            - WRONG_METADATA
            - MISSING_EPISODES
            - WRONG_COVER_IMAGE
            - INAPPROPRIATE_CONTENT
            - OTHER
          description: Reason for the report
          example: WRONG_TRANSLATION
        description:
          type: string
          maxLength: 1000
          description: Optional description with additional details
          example: The translation doesn't match the spoken Japanese
    UserPreferences:
      type: object
      properties:
        labs:
          type: object
          additionalProperties:
            type: boolean
          description: Lab feature opt-in flags keyed by feature key
        mediaNameLanguage:
          type: string
          enum:
            - english
            - japanese
            - romaji
          description: Preferred language for media names display
        searchHistory:
          type: object
          properties:
            enabled:
              type: boolean
              description: Whether activity tracking is enabled (default true)
    ActivityType:
      type: string
      enum:
        - SEARCH
        - ANKI_EXPORT
        - SEGMENT_PLAY
        - LIST_ADD_SEGMENT
      description: Type of user activity
    UserActivity:
      type: object
      required:
        - id
        - activityType
        - createdAt
      properties:
        id:
          type: integer
        activityType:
          $ref: '#/components/schemas/ActivityType'
        segmentUuid:
          type: string
          nullable: true
        mediaId:
          type: integer
          nullable: true
        searchQuery:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    LabFeature:
      type: object
      required:
        - key
        - name
        - description
        - enabled
      properties:
        key:
          type: string
          description: Unique identifier for the lab feature
        name:
          type: string
          description: Human-readable feature name
        description:
          type: string
          description: Description of what the feature does
        enabled:
          type: boolean
          description: Whether the feature is globally available
    ListCreateRequest:
      type: object
      description: Request body for creating a new standalone list
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the list
          example: My Watchlist
        type:
          type: string
          enum:
            - SERIES
            - CUSTOM
            - SEGMENT
          description: Type of list
          example: CUSTOM
        userId:
          type: integer
          description: User ID who owns the list (1 = admin)
          example: 1
        visibility:
          type: string
          enum:
            - PUBLIC
            - PRIVATE
          description: Visibility of the list
          example: PUBLIC
    ListWithMedia:
      type: object
      description: List with all media in order
      required:
        - id
        - name
        - type
        - userId
        - visibility
        - media
      properties:
        id:
          type: integer
          description: List ID
          example: 123
        name:
          type: string
          description: Name of the list
          example: Bakuman Series
        type:
          type: string
          enum:
            - SERIES
            - CUSTOM
            - SEGMENT
          description: Type of list
          example: SERIES
        userId:
          type: integer
          description: User ID who owns the list (1 = admin)
          example: 1
        visibility:
          type: string
          enum:
            - PUBLIC
            - PRIVATE
          description: Visibility of the list
          example: PUBLIC
        media:
          type: array
          description: All media in the list, sorted by position
          items:
            type: object
            properties:
              position:
                type: integer
                description: Position in the list (1-indexed)
                example: 1
              media:
                $ref: '#/components/schemas/Media'
    ListWithSegments:
      type: object
      description: List with saved segments (search result format)
      required:
        - id
        - name
        - type
        - userId
        - visibility
        - segments
        - totalCount
      properties:
        id:
          type: integer
          description: List ID
          example: 123
        name:
          type: string
          description: Name of the list
          example: Study Favorites
        type:
          type: string
          enum:
            - SERIES
            - CUSTOM
            - SEGMENT
          description: Type of list
          example: SEGMENT
        userId:
          type: integer
          description: User ID who owns the list
          example: 1
        visibility:
          type: string
          enum:
            - PUBLIC
            - PRIVATE
          description: Visibility of the list
          example: PRIVATE
        segments:
          type: array
          description: Saved segments with their search result data
          items:
            type: object
            properties:
              position:
                type: integer
                description: Position in the list
                example: 1
              note:
                type: string
                nullable: true
                description: User annotation
              result:
                $ref: '#/components/schemas/SearchResult'
        totalCount:
          type: integer
          description: Total number of segments in the list
          example: 42
    ReindexRequest:
      type: object
      description: Request to reindex segments from the database into Elasticsearch
      properties:
        media:
          type: array
          description: |-
            Array of media to reindex. If not provided, all media will be reindexed.
            Each media can optionally specify which episodes to reindex.
            If episodes are not specified for a media, all episodes will be reindexed.
          items:
            type: object
            required:
              - mediaId
            properties:
              mediaId:
                type: integer
                description: The ID of the media
                example: 5
              episodes:
                type: array
                description: |-
                  Optional array of episode numbers to reindex.
                  If not provided, all episodes for this media will be reindexed.
                items:
                  type: integer
                example:
                  - 1
                  - 3
                  - 5
          example:
            - mediaId: 5
              episodes:
                - 1
                - 3
            - mediaId: 10
    ReindexResponse:
      type: object
      description: Response from the reindex operation
      properties:
        success:
          type: boolean
          description: Whether the reindex operation completed successfully
        message:
          type: string
          description: Human-readable message about the reindex operation
        stats:
          type: object
          description: Statistics about the reindex operation
          properties:
            totalSegments:
              type: integer
              description: Total number of segments processed
            successfulIndexes:
              type: integer
              description: Number of segments successfully indexed
            failedIndexes:
              type: integer
              description: Number of segments that failed to index
            mediaProcessed:
              type: integer
              description: Number of media items processed
        errors:
          type: array
          description: Array of errors that occurred during reindexing (if any)
          items:
            type: object
            properties:
              segmentId:
                type: integer
                description: ID of the segment that failed
              error:
                type: string
                description: Error message
    AdminReport:
      allOf:
        - $ref: '#/components/schemas/Report'
        - type: object
          required:
            - reportCount
            - reporterName
          properties:
            reportCount:
              type: integer
              description: Number of reports for the same target
              example: 3
            reporterName:
              type: string
              description: Name of the user who submitted this report
              example: john_doe
    AdminReportListResponse:
      type: object
      required:
        - data
        - hasMore
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AdminReport'
        hasMore:
          type: boolean
          description: Whether more results are available
          example: true
        cursor:
          type: integer
          nullable: true
          description: Cursor for next page
          example: 10
    UpdateReportRequest:
      type: object
      properties:
        status:
          type: string
          enum:
            - PENDING
            - CONCERN
            - ACCEPTED
            - REJECTED
            - RESOLVED
            - IGNORED
          description: New status for the report
          example: ACCEPTED
        adminNotes:
          type: string
          maxLength: 1000
          description: Admin notes about the report
          example: Confirmed wrong translation, will fix
    RunReviewResponse:
      type: object
      required:
        - category
        - checksRun
        - totalReports
      properties:
        category:
          type: string
          nullable: true
          description: Category filter used
        checksRun:
          type: array
          items:
            type: object
            required:
              - checkName
              - label
              - resultCount
              - runId
            properties:
              checkName:
                type: string
                description: Check identifier
              label:
                type: string
                description: Human-readable check name
              resultCount:
                type: integer
                description: Number of reports created
              runId:
                type: integer
                description: ID of the created run record
        totalReports:
          type: integer
          description: Total reports created across all checks
    ReviewCheck:
      type: object
      required:
        - id
        - name
        - label
        - description
        - targetType
        - threshold
        - enabled
      properties:
        id:
          type: integer
          description: Check ID
        name:
          type: string
          description: Unique check identifier
          example: lowSegmentMedia
        label:
          type: string
          description: Human-readable label
          example: Low Segment Media
        description:
          type: string
          description: What this check does
        targetType:
          type: string
          enum:
            - MEDIA
            - EPISODE
          description: What level this check operates on
        threshold:
          type: object
          description: Current threshold configuration
          additionalProperties: true
        enabled:
          type: boolean
          description: Whether this check is active
        thresholdSchema:
          type: array
          description: Schema for threshold fields (from registry)
          items:
            type: object
            properties:
              key:
                type: string
              label:
                type: string
              type:
                type: string
                enum:
                  - number
                  - boolean
              default:
                oneOf:
                  - type: number
                  - type: boolean
              min:
                type: number
              max:
                type: number
        latestRun:
          type: object
          nullable: true
          description: Latest run info for this check
          properties:
            id:
              type: integer
            resultCount:
              type: integer
            createdAt:
              type: string
              format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
    ReviewCheckRun:
      type: object
      required:
        - id
        - checkName
        - resultCount
        - thresholdUsed
        - createdAt
      properties:
        id:
          type: integer
          description: Run ID
        checkName:
          type: string
          description: Name of the check that was run
          example: lowSegmentMedia
        category:
          type: string
          nullable: true
          description: Category filter used (ANIME/JDRAMA) or null for all
        resultCount:
          type: integer
          description: Number of reports created in this run
          example: 12
        thresholdUsed:
          type: object
          description: Snapshot of threshold at run time
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
          description: When this run was executed
    ReviewAllowlist:
      type: object
      required:
        - id
        - checkName
        - mediaId
        - createdAt
      properties:
        id:
          type: integer
          description: Allowlist entry ID
        checkName:
          type: string
          description: Name of the check this entry applies to
          example: lowSegmentMedia
        mediaId:
          type: integer
          description: Media ID to exclude
          example: 42
        episodeNumber:
          type: integer
          nullable: true
          description: Episode number to exclude (null for media-level checks)
        reason:
          type: string
          nullable: true
          description: Why this was allowlisted
          example: Known short OVA series
        createdAt:
          type: string
          format: date-time
          description: When this entry was created
  examples:
    AuthCredentialsRequired:
      summary: Authentication Credentials Required
      value:
        code: AUTH_CREDENTIALS_REQUIRED
        title: Authentication Credentials Required
        detail: No API key or session credentials were provided. Please include an Authorization Bearer token or a valid session cookie.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 401
    AuthCredentialsInvalid:
      summary: Invalid Authentication Credentials
      value:
        code: AUTH_CREDENTIALS_INVALID
        title: Invalid Authentication Credentials
        detail: The provided API key or session credentials are invalid. Please check your credentials and try again.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 401
    AuthCredentialsExpired:
      summary: Expired Authentication Credentials
      value:
        status: 401
        code: AUTH_CREDENTIALS_EXPIRED
        title: Expired Authentication Credentials
        detail: Your credentials are not valid anymore. Please sign in again or create a new API key.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
    InsufficientPermissions:
      summary: Insufficient Permissions
      value:
        code: INSUFFICIENT_PERMISSIONS
        title: Insufficient Permissions
        detail: 'Your account lacks the required permissions to perform this action. Required permissions: {permissions}.'
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 403
    RateLimitExceeded:
      summary: Rate Limit Exceeded
      value:
        code: RATE_LIMIT_EXCEEDED
        title: Rate Limit Exceeded
        detail: You have made too many requests. Please slow down and try again later.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 429
    QuotaExceeded:
      summary: Quota Exceeded
      value:
        code: QUOTA_EXCEEDED
        title: Quota Exceeded
        detail: You have exceeded your monthly API quota. Please upgrade your plan or wait until next month.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 429
    InternalServerError:
      summary: Internal Server Error
      value:
        code: INTERNAL_SERVER_EXCEPTION
        title: Internal Server Error
        detail: An unexpected error occurred on our end. Please try again later. If the problem persists, please report this issue.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 500
    ValidationFailed:
      summary: Validation Failed
      value:
        code: VALIDATION_FAILED
        title: Validation Failed
        detail: The request data did not pass validation rules. Please check the errors field for details.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 400
        errors:
          query: Required
          limit: Must be a positive integer
          email: Invalid email format
    InvalidJson:
      summary: Invalid JSON
      value:
        code: INVALID_JSON
        title: Invalid JSON
        detail: The request body contains invalid JSON that could not be parsed. Please check the syntax.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 400
    AccountConflict:
      summary: Account Conflict
      value:
        code: ACCOUNT_CONFLICT
        title: Account Conflict
        detail: An account with this email already exists. Please log in or use a different email.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 409
    DuplicateKey:
      summary: Duplicate Key (Resource Already Exists)
      value:
        code: DUPLICATE_KEY
        title: Resource already exists
        detail: A resource with this UUID already exists
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 409
    NotFound:
      summary: Not Found
      value:
        code: NOT_FOUND
        title: Not Found
        detail: The requested resource could not be found. Please check the URL and try again.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 404
  responses:
    UnauthorizedApiKey:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error401'
          examples:
            AuthCredentialsRequired:
              $ref: '#/components/examples/AuthCredentialsRequired'
            AuthCredentialsInvalid:
              $ref: '#/components/examples/AuthCredentialsInvalid'
            AuthCredentialsExpired:
              $ref: '#/components/examples/AuthCredentialsExpired'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error403'
          examples:
            InsufficientPermissions:
              $ref: '#/components/examples/InsufficientPermissions'
    TooManyRequests:
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error429'
          examples:
            RateLimitExceeded:
              $ref: '#/components/examples/RateLimitExceeded'
            QuotaExceeded:
              $ref: '#/components/examples/QuotaExceeded'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error500'
          examples:
            InternalServerError:
              $ref: '#/components/examples/InternalServerError'
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error400'
          examples:
            ValidationFailed:
              $ref: '#/components/examples/ValidationFailed'
            InvalidJson:
              $ref: '#/components/examples/InvalidJson'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error409'
          examples:
            AccountConflict:
              $ref: '#/components/examples/AccountConflict'
            DuplicateKey:
              $ref: '#/components/examples/DuplicateKey'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error404'
          examples:
            NotFound:
              $ref: '#/components/examples/NotFound'
    EpisodeListResponse:
      description: Paginated list of episodes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EpisodeListResponse'
    EpisodeResponse:
      description: Single episode response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Episode'
    SegmentListResponse:
      description: Paginated list of segments
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SegmentListResponse'
    SegmentResponse:
      description: Single segment response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Segment'
