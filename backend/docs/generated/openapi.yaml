openapi: 3.1.0
info:
  title: Nadeshiko API
  description: |
    Welcome to the Nadeshiko API.

    ## Getting Started

    Nadeshiko uses API keys to grant access to the API. Authentication is performed using the Authorization header. Please note that you must be registered on Nadeshiko to generate an API key. If you haven't registered yet, please do so.

    If you haven't generated an API key yet, you can do so on your [account page](https://nadeshiko.co/settings/api), API section.

    ### Quotas and Limits
    The API has a rate limit to ensure fair usage. Each API key is subject to a rate limit of 2000 requests per 5 minutes. Exceeding this limit will result in a temporary block with the following message:
    > "Too many requests. Please try again later."

    Additionally, each account has a monthly quota limit. Once the monthly quota is exceeded, further requests will receive the message:
    > "API Key quota exceeded for this month."

    | Account Type | Quota (Monthly) |
    |--------------|-----------------|
    | Default      | 2500 requests   |

    To increase your quota, please contact the Nadeshiko team. For more information, refer to the [contact page](https://nadeshiko.co/about).
  version: 1.4.0
  contact:
    name: Nadeshiko Team
    url: https://nadeshiko.co
servers:
  - description: Local server
    url: http://localhost:5000
  - description: Production server
    url: https://api.nadeshiko.co
security:
  - apiKeyHeader: []
  - sessionCookie: []
tags:
  - name: Search
    description: |
      Search endpoints for querying Japanese segments across indexed media.
  - name: Admin
    x-internal: true
    description: |
      Administrative endpoints for system management, queue monitoring, and automated review.
  - name: Media
    description: |
      Media CRUD endpoints for managing anime, J-Drama, and audiobook entries, episodes, segments, characters, and seiyuu.
  - name: User
    description: |
      User endpoints for account data including quota, preferences, activity history, reports, and data export.
  - name: Lists
    description: |
      List endpoints for managing media collections, watch orders, and saved segments.
  - name: Labs
    description: |
      Lab feature endpoints for experimental features and beta flags.
paths:
  /v1/health:
    get:
      tags:
        - Search
      operationId: healthCheck
      summary: Health check
      description: |
        Tests the search service connectivity and functionality by performing a simple search query.

        **Permissions:** `READ_MEDIA`
      x-internal: true
      security:
        - apiKeyHeader:
            - READ_MEDIA
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchHealthCheckResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/search:
    post:
      tags:
        - Search
      operationId: searchIndex
      summary: Search segments by query
      description: |
        The primary search endpoint for finding Japanese segments and their translations across indexed media (anime, J-Drama, audiobooks).

        This endpoint uses Elasticsearch with advanced Japanese text analysis supporting multiple input types (romaji, kanji, kana) and providing intelligent field-based boosting.

        **Query Features**
        - **Multi-language Support:** Search using Japanese (kanji/kana), Romaji, or English/Spanish
        - **Boolean Operators:** `AND`, `OR`, `NOT` supported (e.g., `(cat OR dog) AND bird`)
        - **Phrase Matching:** Use quotes for exact phrases (e.g., `"good morning"`), or pass `exact_match: true` to the request body
        - **Wildcards:** `te*t` format (leading wildcards not supported)
        - **Smart Field Selection:** Automatically chooses optimal search fields based on input type

        **Input Type Handling**
        | Input Type | Search Strategy |
        |------------|-----------------|
        | **Romaji** (`go`, `taberu`) | Boosts EN/ES translations, reading form (pronunciation), and base form |
        | **Kanji** (`食べる`, `彼女`) | Searches content and base form (dictionary form). Ignores matches by reading (homophones). |
        | **Kana** (`たべる`, `かのじょ`) | Standard search across content, base form, and reading form |
        | **English/Spanish** | Direct translation search |

        **Permissions:** `READ_MEDIA`
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'
              examples:
                ValidationFailed:
                  $ref: '#/components/examples/ValidationFailed'
                InvalidJson:
                  $ref: '#/components/examples/InvalidJson'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/search/stats:
    post:
      tags:
        - Search
      operationId: searchStats
      summary: Get search statistics
      description: |
        Returns statistics for search filters and category tabs without fetching segment rows.

        This endpoint is optimized for UI filter panels:
        - `media` powers the media dropdown on the right side.
        - `categories` powers category tabs below the search bar.

        The stats are scoped by query and category filters, but are not narrowed by a selected media/episode.

        **Permissions:** `READ_MEDIA`
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchStatsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchStatsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'
              examples:
                ValidationFailed:
                  $ref: '#/components/examples/ValidationFailed'
                InvalidJson:
                  $ref: '#/components/examples/InvalidJson'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/search/words:
    post:
      tags:
        - Search
      operationId: searchWords
      summary: Search by multiple words
      description: |
        Searches for multiple words simultaneously and aggregates results by media.

        Unlike the main search endpoint, this returns a summary of matches per media rather than individual segments.

        **Use Cases**
        - Vocabulary discovery across media library
        - Finding anime/dramas that use specific words
        - Comparing word usage across different titles

        **Permissions:** `READ_MEDIA`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchMultipleRequest'
            example:
              words:
                - 彼女
                - 私
              exact_match: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMultipleResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'
              examples:
                ValidationFailed:
                  $ref: '#/components/examples/ValidationFailed'
                InvalidJson:
                  $ref: '#/components/examples/InvalidJson'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media:
    get:
      tags:
        - Media
      operationId: mediaIndex
      summary: List all media
      description: |
        Returns a paginated list of media with full metadata, including cover/banner images, episode counts, and genres.
        Supports filtering by category and text search.

        **Permissions:** `READ_MEDIA`
      security:
        - apiKeyHeader:
            - READ_MEDIA
      parameters:
        - name: limit
          in: query
          description: Number of results per page
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 40
        - name: cursor
          in: query
          description: Pagination cursor offset
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: category
          in: query
          description: Filter by media category
          schema:
            type: string
            enum:
              - ANIME
              - JDRAMA
            example: ANIME
        - name: query
          in: query
          description: Search query for filtering media by name
          schema:
            type: string
            example: steins
        - name: includeCharacters
          in: query
          description: Include character and voice actor data in the response
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Media
      operationId: mediaCreate
      x-internal: true
      summary: Create new media
      description: |
        Creates a new media entry in the database.

        **Permissions:** `ADD_MEDIA`
      security:
        - apiKeyHeader:
            - ADD_MEDIA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/{id}:
    get:
      tags:
        - Media
      operationId: mediaShow
      summary: Get single media
      description: |
        Returns a single media entry by its ID with full metadata.

        **Permissions:** `READ_MEDIA`
      security:
        - apiKeyHeader:
            - READ_MEDIA
      parameters:
        - name: id
          in: path
          required: true
          description: Media ID
          schema:
            type: integer
            example: 7674
        - name: includeCharacters
          in: query
          description: Include character and voice actor data in the response
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Media
      operationId: mediaUpdate
      x-internal: true
      summary: Update media
      description: |
        Updates an existing media entry. Only provided fields will be updated.

        **Permissions:** `UPDATE_MEDIA`
      security:
        - apiKeyHeader:
            - UPDATE_MEDIA
      parameters:
        - name: id
          in: path
          required: true
          description: Media ID
          schema:
            type: integer
            example: 7674
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Media
      operationId: mediaDestroy
      x-internal: true
      summary: Delete media (soft delete)
      description: |
        Soft-deletes a media entry by setting the `deletedAt` timestamp. The media remains in the database but is excluded from query results.

        **Permissions:** `REMOVE_MEDIA`
      security:
        - apiKeyHeader:
            - REMOVE_MEDIA
      parameters:
        - name: id
          in: path
          required: true
          description: Media ID
          schema:
            type: integer
            example: 7674
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Media deleted successfully
                  id:
                    type: integer
                    example: 7674
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/{mediaId}/episodes:
    get:
      operationId: episodeIndex
      tags:
        - Media
      summary: List episodes for a media
      description: |
        Returns a paginated list of episodes for a specific media.

        **Permissions:** `READ_MEDIA`
      security:
        - apiKeyHeader:
            - READ_MEDIA
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the media
          example: 7674
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: Maximum number of episodes to return
          example: 50
        - name: cursor
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Episode number to start from (for pagination)
          example: 10
      responses:
        '200':
          $ref: '#/components/responses/EpisodeListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: episodeCreate
      x-internal: true
      tags:
        - Media
      summary: Create new episode
      description: |
        Creates a new episode for a specific media.

        **Permissions:** `ADD_MEDIA`
      security:
        - apiKeyHeader:
            - ADD_MEDIA
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the media
          example: 7674
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpisodeCreateRequest'
      responses:
        '201':
          $ref: '#/components/responses/EpisodeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/{mediaId}/episodes/{episodeNumber}:
    get:
      operationId: episodeShow
      tags:
        - Media
      summary: Get single episode
      description: |
        Returns a specific episode by media ID and episode number.

        **Permissions:** `READ_MEDIA`
      security:
        - apiKeyHeader:
            - READ_MEDIA
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the media
          example: 7674
        - name: episodeNumber
          in: path
          required: true
          schema:
            type: integer
          description: Episode number
          example: 1
      responses:
        '200':
          $ref: '#/components/responses/EpisodeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Media
      operationId: episodeUpdate
      x-internal: true
      summary: Update episode
      description: |
        Updates an existing episode. Only provided fields will be updated.

        **Permissions:** `UPDATE_MEDIA`
      security:
        - apiKeyHeader:
            - UPDATE_MEDIA
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the media
          example: 7674
        - name: episodeNumber
          in: path
          required: true
          schema:
            type: integer
          description: Episode number
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpisodeUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/EpisodeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Media
      operationId: episodeDestroy
      x-internal: true
      summary: Delete an episode
      description: |
        Soft-deletes an episode. Segments are not cascade deleted — this only hides the episode from results.

        **Permissions:** `REMOVE_MEDIA`
      security:
        - apiKeyHeader:
            - REMOVE_MEDIA
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the media
          example: 7674
        - name: episodeNumber
          in: path
          required: true
          schema:
            type: integer
          description: Episode number
          example: 1
      responses:
        '204':
          description: Episode successfully deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/{mediaId}/episodes/{episodeNumber}/segments:
    get:
      tags:
        - Media
      operationId: segmentIndex
      x-internal: true
      summary: List segments for an episode
      description: |
        Returns a paginated list of segments for a specific episode.

        **Permissions:** `READ_MEDIA`
      security:
        - apiKeyHeader:
            - READ_MEDIA
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the media
          example: 7674
        - name: episodeNumber
          in: path
          required: true
          schema:
            type: integer
          description: Episode number
          example: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: Maximum number of segments to return
          example: 50
        - name: cursor
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Segment ID to start from (for pagination)
          example: 1000
      responses:
        '200':
          $ref: '#/components/responses/SegmentListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Media
      operationId: segmentCreate
      x-internal: true
      summary: Create new segment
      description: |
        Creates a new segment for a specific episode.

        **Permissions:** `UPDATE_MEDIA`
      security:
        - apiKeyHeader:
            - UPDATE_MEDIA
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the media
          example: 7674
        - name: episodeNumber
          in: path
          required: true
          schema:
            type: integer
          description: Episode number
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SegmentCreateRequest'
      responses:
        '201':
          $ref: '#/components/responses/SegmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/{mediaId}/episodes/{episodeNumber}/segments/{id}:
    get:
      operationId: segmentShow
      tags:
        - Media
      summary: Get single segment
      description: |
        Returns a specific segment by its ID within the media/episode hierarchy.

        **Permissions:** `READ_MEDIA`
      security:
        - apiKeyHeader:
            - READ_MEDIA
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the media
          example: 7674
        - name: episodeNumber
          in: path
          required: true
          schema:
            type: integer
          description: Episode number
          example: 1
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Segment ID
          example: 12345
      responses:
        '200':
          $ref: '#/components/responses/SegmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: segmentUpdate
      x-internal: true
      tags:
        - Media
      summary: Update segment
      description: |
        Updates an existing segment. Only provided fields will be updated.

        **Permissions:** `UPDATE_MEDIA`
      security:
        - apiKeyHeader:
            - UPDATE_MEDIA
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the media
          example: 7674
        - name: episodeNumber
          in: path
          required: true
          schema:
            type: integer
          description: Episode number
          example: 1
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Segment ID
          example: 12345
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SegmentUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/SegmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
