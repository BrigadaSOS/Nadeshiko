        - quotaUsed
        - quotaLimit
        - quotaRemaining
        - periodYyyymm
        - periodStart
        - periodEnd
      properties:
        quotaUsed:
          type: integer
          description: Number of API requests used in the current billing period.
          example: 342
        quotaLimit:
          type: integer
          description: Maximum number of API requests allowed in the current billing period.
          example: 2500
        quotaRemaining:
          type: integer
          description: Number of API requests remaining in the current billing period.
          example: 2158
        periodYyyymm:
          type: integer
          description: Current billing period in YYYYMM format.
          example: 202602
        periodStart:
          type: string
          format: date-time
          description: Start of the current billing period (UTC).
          example: '2026-02-01T00:00:00.000Z'
        periodEnd:
          type: string
          format: date-time
          description: End of the current billing period (UTC).
          example: '2026-02-28T23:59:59.999Z'
    Report:
      type: object
      required:
        - id
        - reportType
        - targetId
        - reason
        - status
        - userId
        - createdAt
      properties:
        id:
          type: integer
          description: Report ID
          example: 1
        reportType:
          type: string
          enum:
            - SEGMENT
            - MEDIA
          description: Type of the reported entity
          example: SEGMENT
        targetId:
          type: string
          description: ID of the reported entity (segment UUID or media ID)
          example: 3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e
        reason:
          type: string
          enum:
            - WRONG_TRANSLATION
            - WRONG_TIMING
            - WRONG_AUDIO
            - NSFW_NOT_TAGGED
            - DUPLICATE_SEGMENT
            - WRONG_METADATA
            - MISSING_EPISODES
            - WRONG_COVER_IMAGE
            - INAPPROPRIATE_CONTENT
            - OTHER
          description: Reason for the report
          example: WRONG_TRANSLATION
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: Optional description with additional details
          example: The translation doesn't match the spoken Japanese
        status:
          type: string
          enum:
            - PENDING
            - ACCEPTED
            - REJECTED
            - RESOLVED
          description: Current status of the report
          example: PENDING
        adminNotes:
          type: string
          nullable: true
          maxLength: 1000
          description: Notes from the admin who reviewed the report
        resolvedAt:
          type: string
          format: date-time
          nullable: true
          description: When the report was resolved
        userId:
          type: integer
          description: ID of the user who submitted the report
          example: 42
        resolvedById:
          type: integer
          nullable: true
          description: ID of the admin who resolved the report
        createdAt:
          type: string
          format: date-time
          description: When the report was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the report was last updated
    ReportListResponse:
      type: object
      required:
        - data
        - hasMore
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Report'
        hasMore:
          type: boolean
          description: Whether more results are available
          example: true
        cursor:
          type: integer
          nullable: true
          description: Cursor for next page
          example: 10
    CreateReportRequest:
      type: object
      required:
        - reportType
        - targetId
        - reason
      properties:
        reportType:
          type: string
          enum:
            - SEGMENT
            - MEDIA
          description: Type of the entity being reported
          example: SEGMENT
        targetId:
          type: string
          description: ID of the entity being reported (segment UUID or media ID as string)
          example: 3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e
        reason:
          type: string
          enum:
            - WRONG_TRANSLATION
            - WRONG_TIMING
            - WRONG_AUDIO
            - NSFW_NOT_TAGGED
            - DUPLICATE_SEGMENT
            - WRONG_METADATA
            - MISSING_EPISODES
            - WRONG_COVER_IMAGE
            - INAPPROPRIATE_CONTENT
            - OTHER
          description: Reason for the report
          example: WRONG_TRANSLATION
        description:
          type: string
          maxLength: 1000
          description: Optional description with additional details
          example: The translation doesn't match the spoken Japanese
    ListCreateRequest:
      type: object
      description: Request body for creating a new standalone list
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the list
          example: My Watchlist
        type:
          type: string
          enum:
            - SERIES
            - CUSTOM
            - SEGMENT
          description: Type of list
          example: CUSTOM
