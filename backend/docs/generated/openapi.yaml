        - Admin
      x-internal: true
      operationId: listAdminReports
      summary: List all reports
      description: |
        Returns all reports with filtering and cursor pagination.
        Supports filtering by source (USER/AUTO) to separate user reports from auto-check findings.
      security:
        - SessionCookie:
            - ADMIN
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque pagination cursor token
