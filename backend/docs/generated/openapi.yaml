          description: Impersonation session created
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - user
                properties:
                  message:
                    type: string
                  user:
                    type: object
                    required:
                      - id
                      - username
                      - email
                    properties:
                      id:
                        type: integer
                      username:
                        type: string
                      email:
                        type: string
                        format: email
        '400':
