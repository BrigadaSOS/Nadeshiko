      required:
        - id
        - externalIds
        - nameJa
        - nameRomaji
        - nameEn
        - airingFormat
        - airingStatus
        - genres
        - coverUrl
        - bannerUrl
        - startDate
        - category
        - segmentCount
        - episodeCount
        - studio
        - seasonName
        - seasonYear
      properties:
