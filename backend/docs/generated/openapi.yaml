    SearchStatsRequest:
      type: object
      description: |
        Stats request. All fields are optional — omit `query` to get filter counts for the full corpus.
      properties:
        query:
          $ref: '#/components/schemas/SearchQuery'
        filters:
          $ref: '#/components/schemas/SearchFilters'
        include:
          type: array
          description: Optional resources to expand in the response `includes` block
          items:
            $ref: '#/components/schemas/IncludeExpansion'
          default: []
    MediaSearchStats:
      type: object
      description: Search hit statistics for a single media
      required:
        - mediaPublicId
        - matchCount
        - episodeHits
      properties:
        mediaPublicId:
          type: string
          description: Media public ID (look up full details in `includes.media` when `include[]=media` is requested)
          pattern: ^[A-Za-z0-9_-]{12}$
          example: V1StGXR8_Z5d
        matchCount:
          type: integer
          description: Number of matching segments found in this media
          minimum: 0
          example: 42
        episodeHits:
          type: array
          description: Episode-level hit counts
          items:
            type: object
            required:
              - episode
              - hitCount
            properties:
              episode:
                type: integer
                description: Episode number
                minimum: 0
                example: 1
              hitCount:
                type: integer
                description: Number of matching segments in this episode
                minimum: 0
                example: 5
          example:
            - episode: 1
              hitCount: 5
            - episode: 2
              hitCount: 8
            - episode: 3
              hitCount: 3
    CategoryCount:
      type: object
      description: Count of entries grouped by media category
      required:
        - category
        - count
      properties:
        category:
          $ref: '#/components/schemas/Category'
        count:
          type: integer
          description: Number of entries in this category
          minimum: 0
          example: 1523
    SearchStatsResponse:
      type: object
      required:
        - media
        - categories
      properties:
        media:
          type: array
          items:
            $ref: '#/components/schemas/MediaSearchStats'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryCount'
        includes:
          type: object
          description: Optional related resources requested via `include[]`
          properties:
            media:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/Media'
              description: Media objects keyed by publicId. Present only when `include[]=media` is requested.
    SearchMultipleQuery:
      type: object
      description: What to search for (multiple words)
      required:
        - words
      properties:
        words:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 100
          description: List of words to search for
          minItems: 1
          maxItems: 100
          example:
            - 彼女
            - 私
        exactMatch:
          type: boolean
          default: false
          description: Require exact phrase matching (disables fuzzy and partial matches)
    SearchMultipleRequest:
      type: object
      required:
        - query
      properties:
        query:
          $ref: '#/components/schemas/SearchMultipleQuery'
        filters:
          $ref: '#/components/schemas/SearchFilters'
        include:
          type: array
          description: Optional resources to expand in the response `includes` block
          items:
            $ref: '#/components/schemas/IncludeExpansion'
          default: []
    WordMatchMedia:
      type: object
      description: Media match count entry
      required:
        - mediaPublicId
        - matchCount
      properties:
        mediaPublicId:
          type: string
          description: Media public ID (look up full details in `includes.media` when `include[]=media` is requested)
          pattern: ^[A-Za-z0-9_-]{12}$
          example: V1StGXR8_Z5d
        matchCount:
          type: integer
          description: Number of times the word appears in this media
          minimum: 0
          example: 234
    WordMatch:
      type: object
      description: Word matching result with occurrences across media
      required:
        - word
        - isMatch
        - matchCount
        - media
      properties:
        word:
          type: string
          description: The word that was searched for
          minLength: 1
          example: 彼女
        isMatch:
