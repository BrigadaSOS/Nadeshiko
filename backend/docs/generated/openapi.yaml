        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/health:
    get:
      tags:
        - Admin
      x-internal: true
      operationId: getAdminHealth
      summary: System health check
      description: |
        Returns connectivity status and version information for all backend subsystems
        (Elasticsearch, PostgreSQL, application).

        **Permissions:** `ADD_MEDIA`
      security:
        - SessionCookie:
            - ADMIN
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - app
                  - elasticsearch
                  - database
                properties:
                  status:
                    type: string
                    enum:
                      - healthy
                      - degraded
                    description: Overall system status
                  app:
                    type: object
                    required:
                      - version
                    properties:
                      version:
                        type: string
                        description: API version from OpenAPI spec
                  elasticsearch:
                    type: object
                    required:
                      - status
                    properties:
                      status:
                        type: string
                        enum:
                          - connected
                          - disconnected
                      version:
                        type: string
                        nullable: true
                      clusterName:
                        type: string
                        nullable: true
                      clusterStatus:
                        type: string
                        nullable: true
                        description: ES cluster health (green, yellow, red)
                      indexName:
                        type: string
                        nullable: true
                      documentCount:
                        type: integer
                        nullable: true
                  database:
                    type: object
                    required:
                      - status
                    properties:
                      status:
                        type: string
                        enum:
                          - connected
                          - disconnected
                      version:
                        type: string
                        nullable: true
        '401':
          $ref: '#/components/responses/UnauthorizedSession'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/reindex:
    post:
      tags:
        - Admin
      x-internal: true
      operationId: triggerReindex
      summary: Reindex database into Elasticsearch
      description: |
        Reindexes segments from the PostgreSQL database into Elasticsearch.
        Allows filtering by specific media entries and episodes.

        **Behavior:**
        - If no filters provided, reindexes all segments
        - If `media` is provided, reindexes segments from those media entries
        - If a media item includes `episodes`, only those episodes are reindexed for that media

        **Permissions:** `ADD_MEDIA`
      security:
        - SessionCookie:
            - ADMIN
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReindexRequest'
      responses:
        '200':
          description: Reindex operation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReindexResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedSession'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/queues/stats:
    get:
      tags:
        - Admin
      x-internal: true
      operationId: listAdminQueueStats
      summary: Get queue statistics
      description: |
        Returns statistics for all ES sync queues including pending and failed job counts.

        **Use cases:**
        - Monitor queue health
        - Detect stuck jobs
        - Check backlog size

        **Permissions:** `ADD_MEDIA`
      security:
        - SessionCookie:
            - ADMIN
      responses:
        '200':
          description: Queue statistics retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - queue
                    - stuckCount
                    - failedCount
                  properties:
                    queue:
                      type: string
                      example: es-sync-create
                    stuckCount:
                      type: integer
                      description: Number of jobs currently pending/active
                      example: 5
                    failedCount:
                      type: integer
                      description: Number of failed jobs
                      example: 2
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedSession'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/queues/{queueName}:
    get:
      tags:
        - Admin
      x-internal: true
      operationId: getAdminQueue
      summary: Get detailed queue information
      description: |
        Returns live queue stats and queue metadata from PgBoss for a specific queue.

        **Queue names:**
        - `es-sync-create` - Jobs to create new segments in Elasticsearch
        - `es-sync-update` - Jobs to update existing segments
        - `es-sync-delete` - Jobs to delete segments

        **Permissions:** `ADD_MEDIA`
      security:
        - SessionCookie:
            - ADMIN
      parameters:
        - name: queueName
          in: path
          required: true
          schema:
            type: string
            enum:
              - es-sync-create
              - es-sync-update
              - es-sync-delete
          description: The name of the queue
          example: es-sync-create
      responses:
        '200':
          description: Queue details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - queue
                  - stats
                  - metadata
                properties:
                  queue:
                    type: string
                    example: es-sync-create
                  stats:
                    type: object
                    required:
                      - deferred
                      - queued
                      - active
                      - total
                    properties:
                      deferred:
                        type: integer
                        description: Jobs scheduled for future execution (`start_after > now()`)
                        example: 1
                      queued:
                        type: integer
                        description: Jobs currently queued and waiting to be processed
                        example: 10
                      active:
                        type: integer
                        description: Jobs currently being processed
                        example: 2
                      total:
                        type: integer
                        description: Total jobs currently stored in the queue table
                        example: 13
                  metadata:
                    type: object
                    required:
                      - policy
                      - partition
                      - createdOn
                      - updatedOn
                      - singletonsActive
                      - table
                    properties:
                      policy:
                        type: string
                        example: standard
                      partition:
                        type: boolean
                        example: false
                      deadLetter:
                        type: string
                        nullable: true
                      warningQueueSize:
                        type: integer
                        nullable: true
                      retryLimit:
                        type: integer
                        nullable: true
                        example: 5
                      retryDelay:
                        type: integer
                        nullable: true
                        description: Initial retry delay in seconds
                        example: 1
                      retryBackoff:
                        type: boolean
                        nullable: true
                        example: true
                      retryDelayMax:
                        type: integer
                        nullable: true
                      expireInSeconds:
                        type: integer
                        nullable: true
                        example: 3600
                      retentionSeconds:
                        type: integer
                        nullable: true
                        example: 86400
                      deleteAfterSeconds:
                        type: integer
                        nullable: true
                      createdOn:
                        type: string
                        format: date-time
                      updatedOn:
                        type: string
                        format: date-time
                      singletonsActive:
                        type: array
                        items:
                          type: string
                      table:
                        type: string
                        example: job
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedSession'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/queues/{queueName}/failed:
    get:
      tags:
        - Admin
      x-internal: true
      operationId: listAdminQueueFailed
      summary: Get failed jobs from a queue
      description: |
        Returns jobs that have exceeded their retry limit and permanently failed.

        **Use cases:**
        - Identify segments that failed to sync to Elasticsearch
        - Debug persistent sync issues
        - Decide whether to retry or purge failed jobs

        **Permissions:** `ADD_MEDIA`
      security:
        - SessionCookie:
            - ADMIN
      parameters:
        - name: queueName
          in: path
          required: true
          schema:
            type: string
            enum:
              - es-sync-create
              - es-sync-update
              - es-sync-delete
          description: The name of the queue
          example: es-sync-create
      responses:
        '200':
          description: Failed jobs retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - segmentId
                    - error
                    - createdOn
                  properties:
                    id:
                      type: string
                      description: Job ID
                    segmentId:
                      type: integer
                      description: The segment ID that failed to sync
                    error:
                      type: string
                      nullable: true
                      description: Error message from the last attempt
                    createdOn:
                      type: string
                      format: date-time
                      description: When the job was created
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedSession'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/queues/{queueName}/retry:
    post:
      tags:
        - Admin
      x-internal: true
      operationId: retryAdminQueueFailed
      summary: Retry failed jobs from a queue
      description: |
        Re-enqueues all failed jobs from a specific queue for another attempt.

        **Use cases:**
        - Retry jobs that failed due to temporary Elasticsearch issues
        - Recover from network blips

        **Permissions:** `ADD_MEDIA`
      security:
        - SessionCookie:
            - ADMIN
      parameters:
        - name: queueName
          in: path
          required: true
          schema:
            type: string
            enum:
              - es-sync-create
              - es-sync-update
              - es-sync-delete
          description: The name of the queue
          example: es-sync-create
      responses:
        '200':
          description: Jobs queued for retry
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - retriedCount
                  - message
                properties:
                  success:
                    type: boolean
                    example: true
                  retriedCount:
                    type: integer
                    description: Number of jobs queued for retry
                    example: 5
                  message:
                    type: string
                    example: Retried 5 failed jobs from es-sync-create
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedSession'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/queues/{queueName}/purge:
    delete:
      tags:
        - Admin
      x-internal: true
      operationId: purgeAdminQueueFailed
      summary: Purge failed jobs from a queue
      description: |
        Permanently deletes all failed jobs from a queue.
        This does **not** re-sync the affected segments — use the reindex endpoint for that.

        **Use cases:**
        - Clean up old failed jobs after investigating
        - Reset a queue after fixing the underlying issue

        **Permissions:** `ADD_MEDIA`
      security:
        - SessionCookie:
            - ADMIN
      parameters:
        - name: queueName
          in: path
          required: true
          schema:
            type: string
            enum:
              - es-sync-create
              - es-sync-update
              - es-sync-delete
          description: The name of the queue
          example: es-sync-create
      responses:
        '200':
          description: Failed jobs purged successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - purgedCount
                  - message
                properties:
                  success:
                    type: boolean
                    example: true
                  purgedCount:
                    type: integer
                    description: Number of failed jobs deleted
                    example: 15
                  message:
                    type: string
                    example: Purged 15 failed jobs from es-sync-create
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedSession'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/impersonation:
    post:
      tags:
        - Admin
      x-internal: true
      operationId: impersonateAdminUser
      summary: Start admin impersonation
