      operationId: reindexElasticsearch
      summary: Reindex database into Elasticsearch
      description: |
        Reindexes segments from the PostgreSQL database into Elasticsearch.
        Allows filtering by specific media IDs or episodes.

        **Requirements:**
        - Required Scopes: `ADD_MEDIA` (admin-level permission for reindexing)

        **Behavior:**
        - If no filters provided, reindexes all segments
        - If `mediaIds` provided, reindexes all segments from those media
        - If `episodes` provided, reindexes only the specified episodes
      security:
        - apiKeyHeader:
            - ADD_MEDIA
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReindexRequest'
      responses:
        '200':
          description: Reindex operation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReindexResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/queues/stats:
    get:
      tags:
        - Admin
      operationId: getQueueStats
      summary: Get queue statistics
      description: |
        Get statistics for all ES sync queues including pending and failed job counts.

        **Requirements:**
        - Required Scopes: `ADD_MEDIA` (admin-level permission)

        **Use cases:**
        - Monitor queue health
        - Detect stuck jobs
        - Check backlog size
      security:
        - apiKeyHeader:
            - ADD_MEDIA
      responses:
        '200':
          description: Queue statistics retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    queue:
                      type: string
                      example: es-sync-create
                    stuckCount:
                      type: integer
                      description: Number of jobs currently pending/active
                      example: 5
                    failedCount:
                      type: integer
                      description: Number of failed jobs
                      example: 2
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/queues/{queueName}:
    get:
      tags:
        - Admin
      operationId: getQueueDetails
      summary: Get detailed queue information
      description: |
        Get detailed information about a specific queue including completed, expired, and cancelled jobs.

        **Requirements:**
        - Required Scopes: `ADD_MEDIA` (admin-level permission)

        **Queue names:**
        - `es-sync-create` - Jobs to create new segments
        - `es-sync-update` - Jobs to update existing segments
        - `es-sync-delete` - Jobs to delete segments
      security:
        - apiKeyHeader:
            - ADD_MEDIA
      parameters:
        - name: queueName
          in: path
          required: true
          schema:
            type: string
            enum:
              - es-sync-create
              - es-sync-update
              - es-sync-delete
          description: The name of the queue
          example: es-sync-create
      responses:
        '200':
          description: Queue details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: string
                    example: es-sync-create
                  size:
                    type: integer
                    description: Current queue size (pending jobs)
                    example: 10
                  created:
                    type: integer
                    description: Total jobs created
                    example: 1250
                  failed:
                    type: integer
                    description: Total failed jobs
                    example: 5
                  complete:
                    type: integer
                    description: Total completed jobs
                    example: 1235
                  expired:
                    type: integer
                    description: Total expired jobs
                    example: 2
                  cancelled:
                    type: integer
                    description: Total cancelled jobs
                    example: 3
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/queues/{queueName}/failed:
    get:
      tags:
        - Admin
      operationId: getFailedJobs
      summary: Get failed jobs from a queue
      description: |
        Get jobs that have exceeded their retry limit and permanently failed.

        **Requirements:**
        - Required Scopes: `ADD_MEDIA` (admin-level permission)

        **Use cases:**
        - Identify segments that failed to sync to Elasticsearch
        - Debug persistent sync issues
        - Decide whether to retry or purge failed jobs
      security:
        - apiKeyHeader:
            - ADD_MEDIA
      parameters:
        - name: queueName
          in: path
          required: true
          schema:
            type: string
            enum:
              - es-sync-create
              - es-sync-update
              - es-sync-delete
          description: The name of the queue
          example: es-sync-create
      responses:
        '200':
          description: Failed jobs retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Job ID
                    segmentId:
                      type: integer
                      description: The segment ID that failed to sync
                    error:
                      type: string
                      nullable: true
                      description: Error message from the last attempt
                    createdOn:
                      type: string
                      format: date-time
                      description: When the job was created
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/queues/{queueName}/retry:
    post:
      tags:
        - Admin
      operationId: retryQueueJobs
      summary: Retry failed jobs from a queue
      description: |
        Retry all failed jobs from a specific queue.

        **Requirements:**
        - Required Scopes: `ADD_MEDIA` (admin-level permission)

        **Use cases:**
        - Retry jobs that failed due to temporary Elasticsearch issues
        - Recover from network blips
      security:
        - apiKeyHeader:
            - ADD_MEDIA
      parameters:
        - name: queueName
          in: path
          required: true
          schema:
            type: string
            enum:
              - es-sync-create
              - es-sync-update
              - es-sync-delete
          description: The name of the queue
          example: es-sync-create
      responses:
        '200':
          description: Jobs queued for retry
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  retriedCount:
                    type: integer
                    description: Number of jobs queued for retry
                    example: 5
                  message:
                    type: string
                    example: Retried 5 failed jobs from es-sync-create
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/queues/{queueName}/purge:
    delete:
      tags:
        - Admin
      operationId: purgeFailedJobs
      summary: Delete failed jobs from a queue
      description: |
        Permanently delete all failed jobs from a queue.

        **Requirements:**
        - Required Scopes: `ADD_MEDIA` (admin-level permission)

        **Use cases:**
        - Clean up old failed jobs after investigating
        - Reset a queue after fixing the underlying issue
        - Note: This does NOT re-sync the segments - use the reindex endpoint for that
      security:
        - apiKeyHeader:
            - ADD_MEDIA
      parameters:
        - name: queueName
          in: path
          required: true
          schema:
            type: string
            enum:
              - es-sync-create
              - es-sync-update
              - es-sync-delete
          description: The name of the queue
          example: es-sync-create
      responses:
        '200':
          description: Failed jobs purged successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  purgedCount:
                    type: integer
                    description: Number of failed jobs deleted
                    example: 15
                  message:
                    type: string
                    example: Purged 15 failed jobs from es-sync-create
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/morpheme-backfill:
    post:
      operationId: morphemeBackfill
      tags:
        - Admin
      summary: Backfill morpheme analysis for segments
      description: Analyzes segments that are missing morpheme data using the Sudachi sidecar service.
      responses:
        '200':
          description: Backfill completed
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                  - stats
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  stats:
                    type: object
                    required:
                      - totalSegments
                      - successfulAnalyses
                      - failedAnalyses
                    properties:
                      totalSegments:
                        type: integer
                      successfulAnalyses:
                        type: integer
                      failedAnalyses:
                        type: integer
  /v1/admin/reports:
    get:
      tags:
        - Admin
      operationId: getAdminReports
      summary: List all reports (admin)
      description: |
        Returns all reports with filtering and aggregation.
        Reports are grouped by target and sorted by report count descending.

        **Requirements:**
        - Required Scopes: `ADD_MEDIA` (admin-level permission)
      security:
        - apiKeyHeader:
            - ADD_MEDIA
      parameters:
        - name: cursor
          in: query
          schema:
            type: integer
          description: Cursor for pagination (report ID to start after)
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Number of results per page
        - name: status
          in: query
          schema:
            type: string
            enum:
              - PENDING
              - ACCEPTED
              - REJECTED
              - RESOLVED
          description: Filter by report status
        - name: reportType
          in: query
          schema:
            type: string
            enum:
              - SEGMENT
              - MEDIA
          description: Filter by report type
        - name: targetId
          in: query
          schema:
            type: string
          description: Filter by target ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminReportListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/reports/{id}:
    patch:
      tags:
        - Admin
      operationId: updateReport
      summary: Update a report (admin)
      description: |
        Update the status and/or admin notes of a report.
        When status changes to ACCEPTED, REJECTED, or RESOLVED, resolvedAt and resolvedById are set automatically.

        **Requirements:**
        - Required Scopes: `ADD_MEDIA` (admin-level permission)
      security:
        - apiKeyHeader:
            - ADD_MEDIA
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Report ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReportRequest'
      responses:
        '200':
          description: Report updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    apiKeyHeader:
      type: http
      scheme: bearer
      bearerFormat: APIKey
      description: API key authentication via Authorization Bearer header
    sessionCookie:
      type: apiKey
      in: cookie
      name: nadeshiko.session_token
      description: Session authentication via better-auth cookie
  schemas:
    Category:
      type: string
      description: Media category type
      enum:
        - ANIME
        - JDRAMA
      example: ANIME
      x-enum-descriptions:
        - value: ANIME
          description: Anime
        - value: JDRAMA
          description: Japanese Drama
    SearchResultMedia:
      type: object
      description: Media information included in search results
      required:
        - mediaId
        - nameRomaji
        - category
      properties:
        mediaId:
          type: integer
          description: Unique identifier for the media
          example: 110316
        nameRomaji:
          type: string
          description: Romaji transliteration of the media name
          example: Steins;Gate
        nameEn:
          type: string
          description: English name of the media
          example: Steins;Gate
        nameJa:
          type: string
          description: Original Japanese name of the media
          example: シュタインズ・ゲート
        coverUrl:
          type: string
          format: uri
          description: URL to the cover image
          example: https://example.com/media/anime/steins-gate/cover.jpg
        bannerUrl:
          type: string
          format: uri
          description: URL to the banner image
          example: https://example.com/media/anime/steins-gate/banner.jpg
        category:
          $ref: '#/components/schemas/Category'
    JapaneseSearchContent:
      type: object
      description: Japanese content in search results with optional highlight
      required:
        - content
      properties:
        content:
          type: string
          description: Original Japanese content of the segment
          example: 僕は僕で、君は君だ。
        highlight:
          type: string
          description: Japanese content with search terms highlighted
          example: <em>僕</em>は<em>僕</em>で、<em>君</em>は<em>君</em>だ。
    TranslationSearchContent:
      type: object
      description: Translation content in search results with optional highlight
      required:
        - isMachineTranslated
      properties:
        content:
          type: string
          description: Translated content
          example: I am me, and you are you.
        highlight:
          type: string
          description: Translated content with search terms highlighted
          example: <em>I</em> am <em>me</em>, and <em>you</em> are <em>you</em>.
        isMachineTranslated:
          type: boolean
          description: Whether the translation was machine-translated
          example: false
    Morpheme:
      type: object
      description: Morphological analysis token
      required:
        - surface
        - reading
        - baseform
        - pronunciation
        - pos
        - posShort
        - begin
        - end
        - pitchAccentType
        - pitchCompoundRule
        - pitchModificationRule
      properties:
        surface:
          type: string
          description: Surface form of the token as it appears in the text
          example: 食べ
        reading:
          type: string
          description: Reading in katakana
          example: タベ
        baseform:
          type: string
          description: Dictionary/base form of the word
          example: 食べる
        pronunciation:
          type: string
          description: Pronunciation in katakana
          example: タベル
        pos:
          type: array
          items:
            type: string
          description: Full part-of-speech tag array
          example:
            - 動詞
            - 一般
            - '*'
            - '*'
        posShort:
          type: string
          description: Short part-of-speech label (first element of pos array)
          example: 動詞
        begin:
          type: integer
          description: Character offset where the token begins in the original text
          example: 0
        end:
          type: integer
          description: Character offset where the token ends in the original text
          example: 2
        pitchAccentType:
          type: array
          items:
            type: integer
          nullable: true
          description: |
            Pitch accent type — mora position(s) where the pitch drops. 0 = heiban (flat), 1 = atamadaka, 2+ = nakadaka/odaka. Comma-separated in UniDic feature[24]. Null if not available.
          example:
            - 0
        pitchCompoundRule:
          type: string
          nullable: true
          description: |
            Compound accent connection rule from UniDic feature[25]. Values like C1-C5, F1-F6, P1-P13. Null if not available.
          example: C2
        pitchModificationRule:
          type: string
          nullable: true
          description: |
            Accent modification rule from UniDic feature[26]. Values like M1, M2, M4. Null if not available.
          example: null
    SearchResultSegment:
      type: object
      description: Segment details in search results
      required:
        - status
        - uuid
        - position
        - startTime
        - endTime
        - episodeNumber
        - ja
        - en
        - es
        - isNsfw
      properties:
        status:
          type: string
          enum:
            - DELETED
            - ACTIVE
            - SUSPENDED
            - VERIFIED
            - INVALID
            - TOO_LONG
          description: Segment status
          example: ACTIVE
        uuid:
          type: string
          format: uuid
          description: Unique identifier for the segment
          example: 3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e
        position:
          type: integer
          description: Position of the segment within the episode
          example: 1133
        startTime:
          type: string
          description: Timestamp in H:MM:SS.ffffff format indicating when the segment starts
          example: '0:33:27.255000'
        endTime:
          type: string
          description: Timestamp in H:MM:SS.ffffff format indicating when the segment ends
          example: '0:33:28.464000'
        episodeNumber:
          type: integer
          description: Episode number where the segment appears
          example: 1
        ja:
          $ref: '#/components/schemas/JapaneseSearchContent'
        en:
          $ref: '#/components/schemas/TranslationSearchContent'
        es:
          $ref: '#/components/schemas/TranslationSearchContent'
        isNsfw:
          type: boolean
          description: Whether the segment contains NSFW content
          example: false
        morphemes:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Morpheme'
          description: Morphological analysis of the Japanese content
    SearchResultUrls:
      type: object
      description: URLs to media resources for a segment
      properties:
        imageUrl:
          type: string
          format: uri
          description: URL to the subtitle image snapshot
          example: https://example.com/media/anime/steins-gate/segments/1133.jpg
        audioUrl:
          type: string
          format: uri
          description: URL to the audio clip for this segment
          example: https://example.com/media/anime/steins-gate/audio/1133.mp3
        videoUrl:
          type: string
          format: uri
          description: URL to the video clip for this segment
          example: https://example.com/media/anime/steins-gate/video/1133.mp4
    SearchResult:
      type: object
      description: A complete search result combining media info, segment details, and URLs
      required:
        - media
        - segment
        - urls
      properties:
        media:
          $ref: '#/components/schemas/SearchResultMedia'
          description: Media information for this result
        segment:
          $ref: '#/components/schemas/SearchResultSegment'
          description: Segment details including translations
        urls:
          $ref: '#/components/schemas/SearchResultUrls'
          description: URLs to media resources (images, audio, video)
    PaginationInfo:
      type: object
      description: Pagination metadata for search results
      properties:
        pageSize:
          type: integer
          description: Number of results returned in this page
          example: 20
        hasMore:
          type: boolean
          description: Whether there are more results after this page
          example: true
        estimatedTotalHits:
          type: integer
          description: Estimated total number of matching segments
          example: 12456
        estimatedTotalHitsRelation:
          type: string
          description: Whether estimatedTotalHits is exact or a lower bound
          enum:
            - EXACT
            - LOWER_BOUND
          example: LOWER_BOUND
    SearchHealthCheckResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'
        cursor:
          type: array
          items:
            type: number
          description: Cursor for pagination
    Error:
      type: object
      description: Error Response schema for all cases
      required:
        - code
        - title
        - detail
        - status
      properties:
        code:
          type: string
          description: Specific error code for programmatic handling
        title:
          type: string
          description: A short, human-readable summary of the problem
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type (e.g., GitHub issues link)
        instance:
          type: string
          description: A URI reference that identifies the specific occurrence (e.g., trace ID)
        status:
          type: integer
          description: The HTTP status code
        errors:
          type: object
          additionalProperties:
            type: string
          description: Optional map of field names to their error messages (for validation errors)
    SearchRequest:
      type: object
      properties:
        query:
          type: string
          description: Text or sentence to search (null to search without query)
          example: 彼女
        limit:
          type: integer
          description: Max amount of entries by response
          default: 10
        uuid:
          type: string
          format: uuid
          description: Unique ID from segment (Useful to get a specific segment)
          example: 3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e
        category:
          type: array
          description: Media category filter
          items:
            $ref: '#/components/schemas/Category'
          default:
            - ANIME
            - JDRAMA
        mediaId:
          type: integer
          description: Unique ID from media
          example: 5
        episode:
          type: array
          description: Array of episodes to get
          items:
            type: integer
          example:
            - 5
            - 8
        randomSeed:
          type: integer
          description: Non-negative integer seed for deterministic random sorting
          minimum: 0
          example: 42
        contentSort:
          type: string
          description: Order by amount of characters
          enum:
            - ASC
            - DESC
            - NONE
            - TIME_ASC
            - TIME_DESC
            - RANDOM
          example: NONE
          default: NONE
        cursor:
          type: array
          description: Current page of search
          items:
            type: number
          example:
            - 23.31727
            - 7
        exactMatch:
          type: boolean
          description: Whether to use exact phrase matching
          default: false
        minLength:
          type: integer
          description: Minimum content length
          example: 10
        maxLength:
          type: integer
          description: Maximum content length
          example: 50
        excludedMediaIds:
          type: array
          items:
            type: integer
          description: Media IDs to exclude from results
          default: []
        status:
          type: array
          description: Segment status filter
          items:
            type: string
            enum:
              - DELETED
              - ACTIVE
              - SUSPENDED
              - VERIFIED
              - INVALID
              - TOO_LONG
          default:
            - ACTIVE
        media:
          type: array
          description: Media filter with episodes
          items:
            type: object
            required:
              - mediaId
              - episodes
            properties:
              mediaId:
                type: integer
                example: 123
              episodes:
                type: array
                description: Array of episode numbers
                items:
                  type: number
                example:
                  - 1
                  - 2
    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'
        cursor:
          type: array
          nullable: true
          items:
            type: number
          description: Cursor for pagination
    SearchStatsRequest:
      type: object
      properties:
        query:
          type: string
          description: Text or sentence to search
          example: 彼女
        category:
          type: array
          description: Media category filter
          items:
            $ref: '#/components/schemas/Category'
          default:
            - ANIME
            - JDRAMA
        exactMatch:
          type: boolean
          description: Whether to use exact phrase matching
          default: false
        minLength:
          type: integer
          description: Minimum content length
          example: 10
        maxLength:
          type: integer
          description: Maximum content length
          example: 50
        excludedMediaIds:
          type: array
          items:
            type: integer
          description: Media IDs to exclude from results
          default: []
        mediaIds:
          type: array
          items:
            type: integer
          description: Restrict stats to these media IDs (for list-scoped stats)
          default: []
        status:
          type: array
          description: Segment status filter
          items:
            type: string
            enum:
              - DELETED
              - ACTIVE
              - SUSPENDED
              - VERIFIED
              - INVALID
              - TOO_LONG
          default:
            - ACTIVE
    MediaSearchStats:
      type: object
      description: Search result statistics grouped by media
      properties:
        mediaId:
          type: integer
          description: Unique identifier for the media
          example: 110316
        category:
          $ref: '#/components/schemas/Category'
        nameRomaji:
          type: string
          description: Romaji transliteration of the media name
          example: Steins;Gate
        nameEn:
          type: string
          description: English name of the media
          example: Steins;Gate
