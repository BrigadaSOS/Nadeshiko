                      - recentlyActiveCount
                    properties:
                      totalUsers:
                        type: integer
                      recentlyRegisteredCount:
                        type: integer
                        description: Users registered in the last 30 days
                      recentlyActiveCount:
                        type: integer
                        description: Users active in the last 30 days
                  activity:
                    type: object
                    required:
                      - totalSearches
                      - totalExports
                      - totalPlays
                      - totalCollectionAdds
                      - activeSearchers7d
                      - topQueries7d
                      - dailyActivity30d
                    properties:
                      totalSearches:
                        type: integer
                      totalExports:
                        type: integer
                      totalPlays:
                        type: integer
                      totalCollectionAdds:
                        type: integer
                      activeSearchers7d:
                        type: integer
                        description: Unique users who searched in the last 7 days
                      topQueries7d:
                        type: array
                        items:
                          type: object
                          required:
                            - query
                            - count
                          properties:
                            query:
                              type: string
                            count:
                              type: integer
                      dailyActivity30d:
                        type: array
                        items:
                          type: object
                          required:
                            - date
                            - count
                          properties:
                            date:
                              type: string
                            count:
                              type: integer
                  system:
                    type: object
                    required:
                      - status
                      - app
                      - elasticsearch
                      - database
                      - queues
                    properties:
                      status:
                        type: string
                        enum:
                          - healthy
                          - degraded
                      app:
                        type: object
                        required:
                          - version
                        properties:
                          version:
                            type: string
                      elasticsearch:
                        type: object
                        required:
                          - status
                        properties:
                          status:
                            type: string
                            enum:
                              - connected
                              - disconnected
                          version:
                            type: string
                            nullable: true
