components:
  securitySchemes:
    ApiKey:
      type: http
      scheme: bearer
      bearerFormat: APIKey
      description: API key authentication via Authorization Bearer header
    SessionCookie:
      type: apiKey
      in: cookie
      name: nadeshiko.session_token
      description: Session authentication via cookie
  schemas:
    MediaFilterItem:
      type: object
      description: A media filter entry with optional episode restriction
      required:
        - mediaId
      properties:
        mediaId:
          type: string
          description: Media identifier (publicId or AniList external ID)
          example: abc123xyz
        episodes:
          type: array
          description: Specific episodes (omit for all episodes)
          items:
            type: integer
          example:
            - 1
            - 2
    Category:
      type: string
      description: Media category type
      enum:
        - ANIME
        - JDRAMA
      example: ANIME
      x-enum-descriptions:
        - value: ANIME
          description: Anime
        - value: JDRAMA
          description: Japanese Drama
    ContentRating:
      type: string
      description: Content rating level for the segment
      enum:
        - SAFE
        - SUGGESTIVE
        - QUESTIONABLE
        - EXPLICIT
      example: SAFE
    SearchFilters:
      type: object
      description: Search filters for narrowing segment results
      properties:
        media:
          type: object
          description: Media inclusion/exclusion filters
          properties:
            include:
              type: array
              description: Include only segments from these media (with optional episode filter)
              items:
                $ref: '#/components/schemas/MediaFilterItem'
            exclude:
              type: array
              description: Exclude segments from these media (with optional episode filter)
              items:
                $ref: '#/components/schemas/MediaFilterItem'
        category:
          type: array
          description: Media category filter
          items:
            $ref: '#/components/schemas/Category'
          default:
            - ANIME
            - JDRAMA
        contentRating:
          type: array
          description: Content ratings to include (omit for all ratings)
          items:
            $ref: '#/components/schemas/ContentRating'
        status:
          type: array
          description: Segment status filter
          items:
            type: string
            enum:
              - DELETED
              - ACTIVE
              - SUSPENDED
              - VERIFIED
              - INVALID
              - TOO_LONG
          default:
            - ACTIVE
        segmentLengthChars:
          type: object
          description: Content character count range filter
          properties:
            min:
              type: integer
              description: Minimum content length
              example: 10
            max:
              type: integer
              description: Maximum content length
              example: 50
        segmentDurationMs:
          type: object
          description: Segment audio duration range filter (in milliseconds)
          properties:
            min:
              type: integer
              description: Minimum duration in ms
              example: 1000
            max:
              type: integer
              description: Maximum duration in ms
              example: 10000
        languages:
          type: object
          description: Language inclusion/exclusion for search matching
          properties:
            exclude:
              type: array
              description: Language codes to exclude from search matching (e.g., ["en"], ["es"], ["en","es"])
              items:
                type: string
                enum:
                  - en
                  - es
    IncludeExpansion:
      type: string
      description: Resource to expand in the response includes block
      enum:
        - media
    SearchRequest:
      type: object
      properties:
        query:
          type: object
          description: What to search for (omit for queryless browse)
          properties:
            search:
              type: string
              description: Search expression (supports boolean operators, wildcards, phrase matching)
              example: (猫 OR 犬) AND 好き
            exactMatch:
              type: boolean
              description: Whether to use exact phrase matching
              default: false
        take:
          type: integer
          description: Max amount of entries by response
          default: 10
        cursor:
          type: string
          description: Opaque cursor token returned from the previous search page
          example: eyJraW5kIjoia2V5c2V0IiwiY3Vyc29yIjpbMjMuMzE3MjcsN119
        sort:
          type: object
          description: Sort configuration
          properties:
            mode:
              type: string
              description: Sort mode
              enum:
                - ASC
                - DESC
                - NONE
                - TIME_ASC
                - TIME_DESC
                - RANDOM
              default: NONE
            seed:
              type: integer
              description: Non-negative integer seed for deterministic random sorting (only used when mode is RANDOM)
              minimum: 0
              example: 42
        filters:
          $ref: '#/components/schemas/SearchFilters'
        include:
          type: array
          description: Resources to expand in the response includes block
          items:
            $ref: '#/components/schemas/IncludeExpansion'
          default:
            - media
    Segment:
      type: object
      description: Segment with content, optional highlights, and media URLs
      required:
        - id
        - uuid
        - publicId
        - position
        - status
        - startTimeMs
        - endTimeMs
        - contentRating
        - episode
        - mediaId
        - textJa
        - textEn
        - textEs
        - urls
      properties:
        id:
          type: integer
          description: Numeric identifier for the segment
          example: 120045
        uuid:
          type: string
          description: Unique identifier for the segment
          example: 3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e
        publicId:
          type: string
          description: Public identifier for the segment (use this instead of uuid in public URLs)
          example: V1StGXR8_Z5d
        position:
          type: integer
          description: Position of the segment within the episode
          example: 1133
        status:
          type: string
          enum:
            - DELETED
            - ACTIVE
            - SUSPENDED
            - VERIFIED
            - INVALID
            - TOO_LONG
          description: Segment status
          example: ACTIVE
        startTimeMs:
          type: integer
          description: Start time of the segment in milliseconds from the beginning of the episode
          example: 2007255
        endTimeMs:
          type: integer
          description: End time of the segment in milliseconds from the beginning of the episode
          example: 2008464
        contentRating:
          $ref: '#/components/schemas/ContentRating'
        episode:
          type: integer
          description: Episode number this segment belongs to
          example: 1
        mediaId:
          type: integer
          description: Media ID this segment belongs to
          example: 7674
        textJa:
          type: object
          required:
            - content
          properties:
            content:
              type: string
              maxLength: 500
              description: Original Japanese content
              example: 僕は僕で、君は君だ。
            highlight:
              type: string
              description: Japanese content with search terms highlighted
        textEn:
          type: object
          required:
            - content
            - isMachineTranslated
          properties:
            content:
              type: string
              maxLength: 500
              description: English translation
              example: I am me, and you are you.
            isMachineTranslated:
              type: boolean
              description: Whether the translation was machine-translated
              example: false
            highlight:
              type: string
              description: English content with search terms highlighted
        textEs:
          type: object
          required:
            - content
            - isMachineTranslated
          properties:
            content:
              type: string
              maxLength: 500
              description: Spanish translation
              example: Yo soy yo, y tú eres tú.
            isMachineTranslated:
              type: boolean
              description: Whether the translation was machine-translated
              example: false
            highlight:
              type: string
              description: Spanish content with search terms highlighted
        urls:
          type: object
          description: URLs to media resources for this segment
          required:
            - imageUrl
            - audioUrl
            - videoUrl
          properties:
            imageUrl:
              type: string
              format: uri
              description: URL to the subtitle image snapshot
            audioUrl:
              type: string
              format: uri
              description: URL to the audio clip for this segment
            videoUrl:
              type: string
              format: uri
              description: URL to the video clip for this segment
    ExternalId:
      type: object
      description: Map of external IDs keyed by source. Only sources with values are included.
      properties:
        anilist:
          type: string
          description: AniList ID
          example: '21459'
        imdb:
          type: string
          description: IMDB ID
          example: tt1234567
        tvdb:
          type: string
          description: TVDB ID
          example: '12345'
    Seiyuu:
      type: object
      description: Japanese voice actor (seiyuu)
      required:
        - id
        - publicId
        - externalIds
        - nameJa
        - nameEn
        - imageUrl
      properties:
        id:
          type: integer
          description: Internal seiyuu ID
          example: 1
        publicId:
          type: string
          description: Public identifier for the seiyuu (use this in public URLs)
          example: V1StGXR8_Z5d
        externalIds:
          $ref: '#/components/schemas/ExternalId'
        nameJa:
          type: string
          description: Japanese name of the voice actor
          example: 阿部敦
        nameEn:
          type: string
          description: English name of the voice actor
          example: Atsushi Abe
        imageUrl:
          type: string
          format: uri
          description: Profile image URL
          example: https://s4.anilist.co/file/anilistcdn/staff/large/n95991.jpg
    MediaCharacter:
      type: object
      description: Character appearing in a media with their voice actor and role
      required:
        - id
        - nameJa
        - nameEn
        - imageUrl
        - seiyuu
        - role
      properties:
        id:
          type: integer
          description: AniList character ID
          example: 14545
        nameJa:
          type: string
          description: Japanese name of the character
          example: 真城最高
        nameEn:
          type: string
          description: English name of the character
          example: Moritaka Mashiro
        imageUrl:
          type: string
          format: uri
          description: Character image URL
          example: https://s4.anilist.co/file/anilistcdn/character/large/b14545.jpg
        seiyuu:
          $ref: '#/components/schemas/Seiyuu'
        role:
          type: string
          enum:
            - MAIN
            - SUPPORTING
            - BACKGROUND
          description: Character's role in the media
          example: MAIN
    Media:
      type: object
      description: Media entry with full metadata
      required:
        - id
        - publicId
        - externalIds
        - nameJa
        - nameRomaji
        - nameEn
        - airingFormat
        - airingStatus
        - genres
        - coverUrl
        - bannerUrl
        - startDate
        - category
        - segmentCount
        - episodeCount
        - studio
        - seasonName
        - seasonYear
      properties:
        id:
          type: integer
          description: Internal unique identifier for the media
          example: 7674
        publicId:
          type: string
          description: Public identifier for the media (use this in public URLs)
          example: V1StGXR8_Z5d
        externalIds:
          $ref: '#/components/schemas/ExternalId'
        nameJa:
          type: string
          description: Original Japanese name of the media
          example: バクマン。
        nameRomaji:
          type: string
          description: Romaji transliteration of the media name
          example: Bakuman.
        nameEn:
          type: string
          description: English name of the media
          example: Bakuman.
        airingFormat:
          type: string
          description: Format of the media release (e.g., TV, OVA, Movie)
          example: TV
        airingStatus:
          type: string
          description: Current airing status (FINISHED, RELEASING, NOT_YET_RELEASED, CANCELLED)
          example: FINISHED
        genres:
          type: array
          items:
            type: string
          description: List of genres associated with the media
          example:
            - Comedy
            - Drama
            - Romance
            - Slice of Life
        coverUrl:
          type: string
          format: uri
          description: Full URL to the cover image
          example: https://cdn.example.com/media/anime/bakuman/cover.webp
        bannerUrl:
          type: string
          format: uri
          description: Full URL to the banner image
          example: https://cdn.example.com/media/anime/bakuman/banner.webp
        startDate:
          type: string
          format: date
          description: Start date of the media (first airing/release)
          example: '2010-10-02'
        endDate:
          type: string
          format: date
          nullable: true
          description: End date of the media (last airing/release)
          example: '2011-04-02'
        category:
          $ref: '#/components/schemas/Category'
        segmentCount:
          type: integer
          description: Total number of subtitle segments available
          example: 0
        episodeCount:
          type: integer
          description: Total number of episodes available
          example: 25
        studio:
          type: string
          description: Animation studio that produced the media
          example: J.C.STAFF
        seasonName:
          type: string
          description: Airing season label for the media
          example: FALL
        seasonYear:
          type: integer
          description: Airing year for the media
          example: 2010
        characters:
          type: array
          items:
            $ref: '#/components/schemas/MediaCharacter'
          description: Characters appearing in the media with their voice actors
    PaginationInfo:
      type: object
      description: Pagination metadata for search results
      required:
        - hasMore
        - estimatedTotalHits
        - estimatedTotalHitsRelation
        - cursor
      properties:
        hasMore:
          type: boolean
          description: Whether there are more results after this page
          example: true
        estimatedTotalHits:
          type: integer
          description: Estimated total number of matching segments
          example: 12456
        estimatedTotalHitsRelation:
          type: string
          description: Whether estimatedTotalHits is exact or a lower bound
          enum:
