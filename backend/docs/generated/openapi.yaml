          properties:
            search:
              type: string
              description: Search expression (supports boolean operators, wildcards, phrase matching)
              example: 彼女
            exactMatch:
              type: boolean
              description: Whether to use exact phrase matching
              default: false
        filters:
          $ref: '#/components/schemas/SearchFilters'
        include:
          type: array
          description: Resources to expand in the response includes block
          items:
            $ref: '#/components/schemas/IncludeExpansion'
          default: []
    MediaSearchStats:
      type: object
      description: Search hit statistics for a single media
      required:
        - mediaId
        - matchCount
        - episodeHits
      properties:
        mediaId:
          type: integer
          description: Media identifier (look up full details in includes.media)
          example: 110316
        matchCount:
          type: integer
          description: Number of matching segments found in this media
          example: 42
        episodeHits:
          type: object
          description: Mapping of episode numbers to segment hit counts
          example:
            '1': 5
            '2': 8
            '3': 3
          additionalProperties:
            type: integer
    CategoryCount:
      type: object
      description: Count of entries grouped by media category
