components:
  securitySchemes:
    ApiKey:
      type: http
      scheme: bearer
      bearerFormat: APIKey
      description: 'Send `Authorization: Bearer <api_key>`. Get your API key from https://nadeshiko.co/user/developer'
    SessionCookie:
      type: apiKey
      in: cookie
      name: nadeshiko.session_token
      description: Session authentication via cookie
  schemas:
    SearchQuery:
      type: object
      description: What to search for (omit for queryless browse/stats)
      properties:
        search:
          type: string
          description: Search expression (supports boolean operators, wildcards, phrase matching)
          maxLength: 500
          example: (猫 OR 犬) AND 好き
        exactMatch:
          type: boolean
          description: Require exact phrase matching (disables fuzzy and partial matches)
          default: false
    SearchSort:
      type: object
      description: Sort configuration
      properties:
        mode:
          type: string
          description: |
            Sort mode.
            - `RELEVANCE` (default): Elasticsearch relevance score
            - `ASC` / `DESC`: by segment length (character count)
            - `TIME_ASC` / `TIME_DESC`: by episode & position within an episode
            - `RANDOM`: deterministic random order (pass `seed` for reproducibility)
          enum:
            - RELEVANCE
            - ASC
            - DESC
            - TIME_ASC
            - TIME_DESC
            - RANDOM
          default: RELEVANCE
        seed:
          type: integer
          description: Non-negative integer seed for deterministic random sorting (only used when mode is RANDOM)
          minimum: 0
          example: 42
    MediaFilterItem:
      type: object
      description: A media filter entry with optional episode restriction
      required:
        - mediaPublicId
      properties:
        mediaPublicId:
          type: string
          description: Media public ID (nanoid)
          pattern: ^[A-Za-z0-9_-]{12}$
          example: V1StGXR8_Z5d
        episodes:
          type: array
          description: Specific episodes (omit for all episodes). Use 0 for movies/specials
          items:
            type: integer
            minimum: 0
          example:
            - 1
            - 2
    Category:
      type: string
      description: Media category type
      enum:
        - ANIME
        - JDRAMA
      example: ANIME
      x-enum-descriptions:
        - value: ANIME
          description: Anime
        - value: JDRAMA
          description: Japanese Drama
    ContentRating:
      type: string
      description: Content rating level for the segment
      enum:
        - SAFE
        - SUGGESTIVE
        - QUESTIONABLE
        - EXPLICIT
      example: SAFE
    SegmentStatus:
      type: string
      description: Segment status
      enum:
        - ACTIVE
        - HIDDEN
        - DELETED
      example: ACTIVE
    SearchFilters:
      type: object
      description: Search filters for narrowing segment results
      properties:
        media:
          type: object
          description: Media inclusion/exclusion filters
          properties:
            include:
              type: array
              description: Include only segments from these media (with optional episode filter)
              items:
                $ref: '#/components/schemas/MediaFilterItem'
            exclude:
              type: array
              description: Exclude segments from these media (with optional episode filter)
              items:
                $ref: '#/components/schemas/MediaFilterItem'
        category:
          type: array
          description: Media category filter
          items:
            $ref: '#/components/schemas/Category'
          default:
            - ANIME
            - JDRAMA
        contentRating:
          type: array
          description: Content ratings to include (omit for all ratings)
          items:
            $ref: '#/components/schemas/ContentRating'
        status:
          type: array
          description: Segment status filter
          items:
            $ref: '#/components/schemas/SegmentStatus'
          default:
            - ACTIVE
        segmentLengthChars:
          type: object
          description: Content character count range filter
          properties:
            min:
              type: integer
              description: Minimum content length
              minimum: 0
              example: 10
            max:
              type: integer
              description: Maximum content length
              minimum: 0
              example: 50
        segmentDurationMs:
          type: object
          description: Segment audio duration range filter (in milliseconds)
          properties:
            min:
              type: integer
              description: Minimum duration in ms
              minimum: 0
              example: 1000
            max:
              type: integer
              description: Maximum duration in ms
              minimum: 0
              example: 10000
        languages:
          description: |
            Translation languages to include alongside Japanese in search matching.
            - Omitted / `null`: match against Japanese and all translation languages (default)
            - `[]`: match against Japanese only
            - `["EN"]` / `["ES"]` / `["EN", "ES"]`: match against Japanese plus the listed translation languages

            Also accepts the legacy object form `{ exclude: ["en", "es"] }` for backward compatibility.
            The legacy form is translated on receipt: listed codes are excluded from the default language set.
          oneOf:
            - type: array
              items:
                type: string
                enum:
                  - EN
                  - ES
            - type: object
              deprecated: true
              description: Legacy exclude-based filter. Prefer the array form.
              properties:
                exclude:
                  type: array
                  items:
                    type: string
                    enum:
                      - en
                      - es
                      - EN
                      - ES
    IncludeExpansion:
      type: string
      description: |
        Resource to expand in the response `includes` block. Currently only `media` is supported; additional expansions may be added in future versions without breaking existing clients.
      enum:
        - media
    SearchRequest:
      type: object
      description: |
        Search request. All fields are optional — omit `query` for queryless browse (segments matching filters only).
      properties:
        query:
          $ref: '#/components/schemas/SearchQuery'
        take:
          type: integer
          description: Max number of entries per response
          default: 10
          minimum: 1
          maximum: 50
        cursor:
          type: string
          description: Opaque cursor token returned from the previous search page
          maxLength: 500
          example: eyJraW...N119
        sort:
          $ref: '#/components/schemas/SearchSort'
        filters:
          $ref: '#/components/schemas/SearchFilters'
        include:
          type: array
          description: Optional resources to expand in the response `includes` block
          items:
            $ref: '#/components/schemas/IncludeExpansion'
          default: []
    Token:
      type: object
      description: Morphological token from Japanese text analysis
      required:
        - s
        - d
        - r
        - b
        - e
        - p
        - p1
        - p2
        - p4
        - cf
      properties:
        s:
          type: string
          description: Surface form (the text as it appears in the sentence)
          example: 食べ
        d:
          type: string
          description: Dictionary form (base/lemma form for search)
          example: 食べる
        r:
          type: string
          description: Reading in katakana
          example: タベ
        b:
          type: integer
          description: Begin character offset in textJa.content
          example: 3
        e:
          type: integer
          description: End character offset in textJa.content
          example: 5
        p:
          type: string
          description: Primary part-of-speech tag
          example: 動詞
        p1:
          type: string
          nullable: true
          minLength: 1
          description: POS subtype 1 (UniDic pos[1])
          example: 固有名詞
        p2:
          type: string
          nullable: true
          minLength: 1
          description: POS subtype 2 (UniDic pos[2])
          example: 人名
        p4:
          type: string
          nullable: true
          minLength: 1
          description: Conjugation type (UniDic pos[4])
          example: 五段-カ行
        cf:
          type: string
          nullable: true
          minLength: 1
          description: Conjugation form (UniDic pos[5])
          example: 連用形-一般
    Segment:
      type: object
      description: Segment with content, translations, search-related highlights, and media URLs
      required:
        - publicId
        - position
        - status
        - startTimeMs
        - endTimeMs
        - contentRating
        - episode
        - mediaPublicId
        - textJa
        - textEn
        - textEs
        - urls
      properties:
        publicId:
          type: string
          description: Public ID for the segment (nanoid)
          pattern: ^[A-Za-z0-9_-]{12}$
          example: V1StGXR8_Z5d
        position:
          type: integer
          description: Position of the segment within the episode
          minimum: 0
          example: 1133
        status:
          $ref: '#/components/schemas/SegmentStatus'
        startTimeMs:
          type: integer
          description: Start time of the segment in milliseconds from the beginning of the episode
          minimum: 0
          example: 2007255
        endTimeMs:
          type: integer
          description: End time of the segment in milliseconds from the beginning of the episode
          minimum: 0
          example: 2008464
        contentRating:
          $ref: '#/components/schemas/ContentRating'
        episode:
          type: integer
          description: Episode number this segment belongs to (0 for movies/specials)
          minimum: 0
          example: 1
        mediaPublicId:
          type: string
          description: Public ID of the media this segment belongs to (nanoid)
          pattern: ^[A-Za-z0-9_-]{12}$
          example: V1StGXR8_Z5d
        textJa:
          type: object
          required:
            - content
            - highlight
            - tokens
          properties:
            content:
              type: string
              minLength: 1
              maxLength: 500
              description: Original Japanese content
              example: 僕は僕で、君は君だ。
            highlight:
              type: string
              nullable: true
              minLength: 1
              description: Japanese `content` with `<mark>` tags wrapping terms that matched a search query. Only populated on segments returned from a search endpoint.
            tokens:
              type: array
              nullable: true
              description: Morphological tokens for interactive display. Populated only for segments with available POS analysis.
              items:
                $ref: '#/components/schemas/Token'
        textEn:
          type: object
          required:
            - content
            - isMachineTranslated
            - highlight
          properties:
            content:
              type: string
              minLength: 1
              maxLength: 500
              description: English translation
              example: I am me, and you are you.
            isMachineTranslated:
              type: boolean
              description: Whether the translation was machine-translated
              example: false
            highlight:
              type: string
              nullable: true
              minLength: 1
              description: English `content` with `<mark>` tags wrapping terms that matched a search query. Only populated on segments returned from a search endpoint that matched this language.
        textEs:
          type: object
          required:
            - content
            - isMachineTranslated
            - highlight
          properties:
            content:
              type: string
              minLength: 1
              maxLength: 500
              description: Spanish translation
              example: Yo soy yo, y tú eres tú.
            isMachineTranslated:
              type: boolean
              description: Whether the translation was machine-translated
              example: false
            highlight:
              type: string
              nullable: true
              minLength: 1
              description: Spanish `content` with `<mark>` tags wrapping terms that matched a search query. Only populated on segments returned from a search endpoint that matched this language.
        urls:
          type: object
          description: URLs to media resources for this segment
          required:
            - imageUrl
            - audioUrl
            - videoUrl
          properties:
            imageUrl:
              type: string
              format: uri
              minLength: 1
              description: URL to the subtitle image snapshot
            audioUrl:
              type: string
              format: uri
              minLength: 1
              description: URL to the audio clip for this segment
            videoUrl:
              type: string
              format: uri
              minLength: 1
              description: URL to the video clip for this segment
    ExternalId:
      type: object
      description: External IDs for this media, keyed by source. Every source appears as a key; absent mappings are represented with a null value.
      required:
        - anilist
        - imdb
        - tvdb
        - tmdb
      properties:
        anilist:
          type: string
          nullable: true
          minLength: 1
          description: AniList ID
          example: '21459'
        imdb:
          type: string
          nullable: true
          minLength: 1
          description: IMDB ID
          example: tt1234567
        tvdb:
          type: string
          nullable: true
          minLength: 1
          description: TVDB ID
          example: '12345'
        tmdb:
          type: string
          nullable: true
          minLength: 1
          description: TMDB ID
          example: '90955'
    Media:
      type: object
      description: Media entry with full metadata
      required:
        - publicId
        - slug
        - externalIds
        - nameJa
        - nameRomaji
        - nameEn
        - airingFormat
        - airingStatus
        - genres
        - coverUrl
        - bannerUrl
        - startDate
        - endDate
        - category
        - segmentCount
        - episodeCount
        - studio
        - seasonName
        - seasonYear
      properties:
        publicId:
          type: string
          description: Public ID for the media (use this in public URLs)
          pattern: ^[A-Za-z0-9_-]{12}$
          example: V1StGXR8_Z5d
        slug:
          type: string
          description: URL-friendly slug for the media
          minLength: 1
          example: bakuman
        externalIds:
          $ref: '#/components/schemas/ExternalId'
        nameJa:
          type: string
          description: Original Japanese name of the media
          minLength: 1
          example: バクマン。
        nameRomaji:
          type: string
          description: Romaji transliteration of the media name
          minLength: 1
          example: Bakuman.
        nameEn:
          type: string
          description: English name of the media
          minLength: 1
          example: Bakuman.
        airingFormat:
          type: string
          description: Format of the media release
          enum:
            - TV
            - MOVIE
            - OVA
            - ONA
            - SPECIAL
          example: TV
        airingStatus:
          type: string
          description: Current airing status
          enum:
            - FINISHED
            - RELEASING
            - NOT_YET_RELEASED
            - CANCELLED
          example: FINISHED
        genres:
          type: array
          items:
            type: string
            minLength: 1
          description: List of genres associated with the media
          example:
            - Comedy
            - Drama
            - Romance
            - Slice of Life
        coverUrl:
          type: string
          format: uri
          minLength: 1
          description: Full URL to the cover image
          example: https://cdn.example.com/media/anime/bakuman/cover.webp
        bannerUrl:
          type: string
          format: uri
          minLength: 1
          description: Full URL to the banner image
          example: https://cdn.example.com/media/anime/bakuman/banner.webp
        startDate:
          type: string
          format: date
          minLength: 1
          description: Start date of the media (first airing/release)
          example: '2010-10-02'
        endDate:
          type: string
          format: date
          nullable: true
          minLength: 1
          description: End date of the media (last airing/release)
          example: '2011-04-02'
        category:
          $ref: '#/components/schemas/Category'
        segmentCount:
          type: integer
          description: Total number of subtitle segments available
          minimum: 0
          example: 1234
        episodeCount:
          type: integer
          description: Total number of episodes available
          minimum: 0
          example: 25
        studio:
          type: string
          nullable: true
          description: Animation studio that produced the media
          example: J.C.STAFF
        seasonName:
          type: string
          description: Airing season label for the media
          enum:
            - WINTER
            - SPRING
            - SUMMER
            - FALL
          example: FALL
        seasonYear:
          type: integer
          description: Airing year for the media
          minimum: 1900
          maximum: 2100
          example: 2010
    SearchPagination:
      type: object
      description: Pagination metadata for search results
      required:
        - hasMore
        - estimatedTotalHits
        - estimatedTotalHitsRelation
        - cursor
      properties:
        hasMore:
          type: boolean
          description: Whether there are more results after this page
          example: true
        estimatedTotalHits:
          type: integer
          description: Estimated total number of matching segments
          minimum: 0
          example: 12456
        estimatedTotalHitsRelation:
          type: string
          description: |
            Whether `estimatedTotalHits` is exact or a lower bound.
            - `EXACT`: the value is the precise total
            - `AT_LEAST`: at least this many matches exist (true total may be higher)
          enum:
            - EXACT
            - AT_LEAST
          example: AT_LEAST
        cursor:
          type: string
          nullable: true
          minLength: 1
          description: Opaque cursor token to pass on the next request to fetch the following page
    SearchResponse:
      type: object
      required:
        - segments
        - pagination
      properties:
        segments:
          type: array
          items:
            $ref: '#/components/schemas/Segment'
        includes:
          type: object
          description: Optional related resources requested via `include[]`
          properties:
            media:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/Media'
              description: Media objects keyed by publicId. Present only when `include[]=media` is requested.
        pagination:
          $ref: '#/components/schemas/SearchPagination'
    Error400:
      type: object
      description: Bad Request error response
      required:
        - code
        - title
        - detail
        - status
      properties:
        code:
          type: string
          description: Specific error code for programmatic handling
          enum:
            - VALIDATION_FAILED
            - INVALID_JSON
            - INVALID_REQUEST
        title:
          type: string
          minLength: 1
          description: A short, human-readable summary of the problem
        detail:
          type: string
          minLength: 1
          description: A human-readable explanation specific to this occurrence
        type:
          type: string
          format: uri
          minLength: 1
          description: A URI reference that identifies the problem type (e.g., GitHub issues link)
        instance:
          type: string
          minLength: 1
          description: A URI reference that identifies the specific occurrence (e.g., trace ID)
        status:
          type: integer
          description: The HTTP status code
          enum:
            - 400
        errors:
          type: object
          additionalProperties:
            type: string
          description: Optional map of field names to their error messages (for validation errors)
    Error401:
