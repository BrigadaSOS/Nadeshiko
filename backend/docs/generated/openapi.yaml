      properties:
        type:
          type: string
          enum:
            - EPISODE
          description: Report target type
          example: EPISODE
        mediaId:
          type: integer
          description: Media ID this report targets
          example: 42
        episodeNumber:
          type: integer
          description: Episode number this report targets
          example: 5
    ReportTargetSegment:
      type: object
      required:
        - type
        - mediaId
        - segmentId
      properties:
        type:
          type: string
          enum:
            - SEGMENT
          description: Report target type
          example: SEGMENT
        mediaId:
          type: integer
          description: Media ID this report targets
          example: 42
        episodeNumber:
          type: integer
          description: Episode number containing the segment
          example: 5
        segmentId:
          type: integer
          nullable: true
          description: Segment ID
          example: 42
    ReportTarget:
      oneOf:
        - $ref: '#/components/schemas/ReportTargetMedia'
        - $ref: '#/components/schemas/ReportTargetEpisode'
        - $ref: '#/components/schemas/ReportTargetSegment'
      discriminator:
        propertyName: type
        mapping:
          MEDIA: '#/components/schemas/ReportTargetMedia'
          EPISODE: '#/components/schemas/ReportTargetEpisode'
          SEGMENT: '#/components/schemas/ReportTargetSegment'
    Report:
      type: object
      required:
        - id
        - source
        - target
        - auditRunId
        - reason
        - description
        - data
        - status
        - adminNotes
        - userId
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          description: Report ID
          example: 1
        source:
          type: string
          enum:
            - USER
            - AUTO
          description: Who created this report
          example: USER
        target:
          $ref: '#/components/schemas/ReportTarget'
        auditRunId:
          type: integer
          nullable: true
          description: ID of the audit run that created this report (AUTO only)
        reason:
          type: string
          enum:
            - WRONG_TRANSLATION
            - WRONG_TIMING
            - WRONG_AUDIO
            - NSFW_NOT_TAGGED
            - DUPLICATE_SEGMENT
            - WRONG_METADATA
            - MISSING_EPISODES
            - WRONG_COVER_IMAGE
            - INAPPROPRIATE_CONTENT
            - OTHER
            - LOW_SEGMENT_MEDIA
            - EMPTY_EPISODES
            - MISSING_EPISODES_AUTO
            - BAD_SEGMENT_RATIO
            - MEDIA_WITH_NO_EPISODES
            - MISSING_TRANSLATIONS
            - DB_ES_SYNC_ISSUES
            - HIGH_REPORT_DENSITY
          description: Reason for the report
          example: WRONG_TRANSLATION
        description:
          type: string
          nullable: true
          description: Optional description with additional details
        data:
          type: object
          nullable: true
          description: Check-specific metrics (AUTO reports) or null (USER reports)
          additionalProperties: true
        status:
          type: string
          enum:
            - PENDING
            - CONCERN
            - ACCEPTED
            - REJECTED
            - RESOLVED
            - IGNORED
          description: Current status of the report
          example: PENDING
        adminNotes:
          type: string
          nullable: true
          maxLength: 1000
          description: Notes from the admin who reviewed the report
        userId:
          type: integer
          nullable: true
          description: ID of the user who submitted the report (USER reports only)
          example: 42
        createdAt:
          type: string
          format: date-time
          description: When the report was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the report was last updated
    UserPreferences:
      type: object
      properties:
        mediaNameLanguage:
          type: string
          enum:
            - english
            - japanese
            - romaji
          description: Preferred language for media names display
        contentRatingPreferences:
          type: object
          description: Per-category content rating display preferences
          properties:
            suggestive:
              type: string
              enum:
                - show
                - blur
                - hide
            explicit:
              type: string
              enum:
                - show
                - blur
                - hide
        searchHistory:
          type: object
          properties:
            enabled:
              type: boolean
              description: Whether activity tracking is enabled (default true)
        blogLastVisited:
          type: string
          format: date-time
          description: ISO timestamp of when the user last visited the blog page
        ankiProfiles:
          type: array
          items:
            type: object
            required:
              - id
              - name
              - serverAddress
            properties:
              id:
                type: string
              name:
                type: string
              deck:
                type: string
                nullable: true
              model:
                type: string
                nullable: true
              fields:
                type: array
                items:
                  type: object
                  required:
                    - key
                    - value
                  properties:
                    key:
                      type: string
                    value:
                      type: string
              key:
                type: string
                nullable: true
              serverAddress:
                type: string
        hiddenMedia:
          type: array
          description: Media hidden from search results by the user
          items:
            type: object
            required:
              - mediaId
            properties:
              mediaId:
                type: integer
              nameEn:
                type: string
              nameJa:
                type: string
              nameRomaji:
                type: string
    ActivityType:
      type: string
      enum:
        - SEARCH
        - ANKI_EXPORT
        - SEGMENT_PLAY
        - SHARE
      description: Type of user activity
    UserActivity:
      type: object
      required:
        - id
        - activityType
        - segmentId
        - mediaId
        - searchQuery
        - mediaName
        - japaneseText
        - createdAt
      properties:
        id:
          type: integer
        activityType:
          $ref: '#/components/schemas/ActivityType'
        segmentId:
          type: integer
          nullable: true
        mediaId:
          type: integer
          nullable: true
        searchQuery:
          type: string
          nullable: true
        mediaName:
          type: string
          nullable: true
        japaneseText:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    HeatmapDayCounts:
      type: object
      description: Activity counts for a single day, broken down by type. Only types with at least 1 event are present.
      properties:
        SEARCH:
          type: integer
        SEGMENT_PLAY:
          type: integer
        ANKI_EXPORT:
          type: integer
        SHARE:
          type: integer
    Collection:
      type: object
      description: User segment collection
      required:
        - id
        - name
        - type
        - visibility
        - segmentCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          description: Collection ID
          example: 123
        name:
          type: string
          description: Name of the collection
          example: Study Favorites
        type:
          type: string
          enum:
            - USER
            - ANKI_EXPORT
          description: Type of the collection
          example: USER
        visibility:
          type: string
          enum:
            - PUBLIC
            - PRIVATE
          description: Visibility of the collection
          example: PRIVATE
        segmentCount:
          type: integer
          description: Number of segments in the collection
          example: 42
        createdAt:
          type: string
          format: date-time
          description: When the collection was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the collection was last updated
    UserExportCollection:
      allOf:
        - $ref: '#/components/schemas/Collection'
        - type: object
          required:
            - segmentIds
          properties:
            segmentIds:
              type: array
              description: Segment IDs in saved order
              items:
                type: integer
    UserExportResponse:
      type: object
      description: User data export payload (identifier-oriented references)
      required:
        - profile
        - preferences
        - activity
        - collections
        - reports
      properties:
        profile:
          type: object
          required:
            - id
            - username
            - email
            - createdAt
          properties:
            id:
              type: integer
            username:
              type: string
            email:
              type: string
            createdAt:
              type: string
              format: date-time
        preferences:
          $ref: '#/components/schemas/UserPreferences'
        activity:
          type: array
          items:
            $ref: '#/components/schemas/UserActivity'
        collections:
          type: array
          items:
            $ref: '#/components/schemas/UserExportCollection'
        reports:
          type: array
          items:
            $ref: '#/components/schemas/Report'
    UserLabFeature:
      type: object
      required:
        - key
        - active
        - userControllable
      properties:
        key:
          type: string
          description: Unique identifier for the feature
        name:
          type: string
          description: Human-readable feature name (only present for labs)
        description:
          type: string
          description: Description of what the feature does (only present for labs)
        active:
          type: boolean
          description: Whether this feature is currently active for the user
        userControllable:
          type: boolean
          description: Whether the user can toggle this feature (lab=true, flag=false)
    CollectionListResponse:
      type: object
      description: Paginated collection list response
      required:
        - collections
        - pagination
      properties:
        collections:
          type: array
          items:
            $ref: '#/components/schemas/Collection'
        pagination:
          $ref: '#/components/schemas/OpaqueCursorPagination'
    CollectionRequests:
      type: object
      description: Request body for creating a new collection
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the collection
          example: My Study List
        visibility:
          type: string
          enum:
            - PUBLIC
            - PRIVATE
          description: Visibility of the collection
          example: PRIVATE
    CollectionWithSegments:
      type: object
      description: Collection with saved segments (search result format)
      required:
        - id
        - name
        - visibility
        - segmentCount
        - createdAt
        - updatedAt
        - segments
        - includes
        - totalCount
        - pagination
      properties:
        id:
          type: integer
          description: Collection ID
          example: 123
        name:
          type: string
          description: Name of the collection
          example: Study Favorites
        visibility:
          type: string
          enum:
            - PUBLIC
            - PRIVATE
          description: Visibility of the collection
          example: PRIVATE
        segmentCount:
          type: integer
          description: Number of segments in the collection
          example: 42
        createdAt:
          type: string
          format: date-time
          description: When the collection was created
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: When the collection was last updated
        segments:
          type: array
          description: Saved segments with their search result data
          items:
            type: object
            required:
              - position
              - note
              - result
            properties:
              position:
                type: integer
                description: Position in the collection
                example: 1
              note:
                type: string
                nullable: true
                description: User annotation
              result:
                $ref: '#/components/schemas/Segment'
        includes:
          type: object
          required:
            - media
          properties:
            media:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/Media'
              description: Media objects keyed by mediaId
        totalCount:
          type: integer
          description: Total number of segments in the collection
          example: 42
        pagination:
          $ref: '#/components/schemas/OpaqueCursorPagination'
    ReindexRequest:
      type: object
      description: Request to reindex segments from the database into Elasticsearch
      properties:
        media:
          type: array
          description: |-
            Array of media to reindex. If not provided, all media will be reindexed.
            Each media can optionally specify which episodes to reindex.
            If episodes are not specified for a media, all episodes will be reindexed.
          items:
            type: object
            required:
              - mediaId
            properties:
              mediaId:
                type: integer
                description: The ID of the media
                example: 5
              episodes:
                type: array
                description: |-
                  Optional array of episode numbers to reindex.
                  If not provided, all episodes for this media will be reindexed.
                items:
                  type: integer
                example:
                  - 1
                  - 3
                  - 5
          example:
            - mediaId: 5
              episodes:
                - 1
                - 3
            - mediaId: 10
    ReindexResponse:
      type: object
      description: Response from the reindex operation
      required:
        - success
        - message
        - stats
        - errors
      properties:
        success:
          type: boolean
          description: Whether the reindex operation completed successfully
        message:
          type: string
          description: Human-readable message about the reindex operation
        stats:
          type: object
          description: Statistics about the reindex operation
          required:
            - totalSegments
            - successfulIndexes
            - failedIndexes
            - mediaProcessed
          properties:
            totalSegments:
              type: integer
              description: Total number of segments processed
            successfulIndexes:
              type: integer
              description: Number of segments successfully indexed
            failedIndexes:
              type: integer
              description: Number of segments that failed to index
            mediaProcessed:
              type: integer
              description: Number of media items processed
        errors:
          type: array
          description: Array of errors that occurred during reindexing (if any)
          items:
            type: object
            required:
              - segmentId
              - error
            properties:
              segmentId:
                type: integer
                description: ID of the segment that failed
              error:
                type: string
                description: Error message
    AdminReport:
      allOf:
        - $ref: '#/components/schemas/Report'
        - type: object
          required:
            - reportCount
            - reporterName
          properties:
            reportCount:
              type: integer
              description: Number of reports for the same target
              example: 3
            reporterName:
              type: string
              description: Name of the user who submitted this report
              example: john_doe
    AdminReportListResponse:
      type: object
      required:
        - reports
        - pagination
      properties:
        reports:
          type: array
          items:
            $ref: '#/components/schemas/AdminReport'
        pagination:
          $ref: '#/components/schemas/OpaqueCursorPagination'
    UpdateReportRequest:
      type: object
      properties:
        status:
          type: string
          enum:
            - PENDING
            - CONCERN
            - ACCEPTED
            - REJECTED
            - RESOLVED
            - IGNORED
          description: New status for the report
          example: ACCEPTED
        adminNotes:
          type: string
          maxLength: 1000
          description: Admin notes about the report
          example: Confirmed wrong translation, will fix
    MediaAudit:
      type: object
      required:
        - id
        - name
        - label
        - description
        - targetType
        - threshold
        - enabled
        - thresholdSchema
        - latestRun
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          description: Audit ID
        name:
          type: string
          description: Unique audit identifier
          example: lowSegmentMedia
        label:
          type: string
          description: Human-readable label
          example: Low Segment Media
        description:
          type: string
          description: What this audit does
        targetType:
          type: string
          enum:
            - MEDIA
            - EPISODE
          description: What level this audit operates on
        threshold:
          type: object
          description: Current threshold configuration
          additionalProperties: true
        enabled:
          type: boolean
          description: Whether this audit is active
        thresholdSchema:
          type: array
          description: Schema for threshold fields (from registry)
          items:
            type: object
            required:
              - key
              - label
              - type
              - default
            properties:
              key:
                type: string
              label:
                type: string
              type:
                type: string
                enum:
                  - number
                  - boolean
              default:
                oneOf:
                  - type: number
                  - type: boolean
              min:
                type: number
              max:
                type: number
        latestRun:
          type: object
          nullable: true
          description: Latest run info for this audit
          required:
            - id
            - resultCount
            - createdAt
          properties:
            id:
              type: integer
            resultCount:
              type: integer
            createdAt:
              type: string
              format: date-time
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    RunAuditResponse:
      type: object
      required:
        - category
        - checksRun
        - totalReports
      properties:
        category:
          type: string
          nullable: true
          description: Category filter used
        checksRun:
          type: array
          items:
            type: object
            required:
              - auditName
              - label
              - resultCount
              - runId
            properties:
              auditName:
                type: string
                description: Audit identifier
              label:
                type: string
                description: Human-readable audit name
              resultCount:
                type: integer
                description: Number of reports created
              runId:
                type: integer
                description: ID of the created run record
        totalReports:
          type: integer
          description: Total reports created across all audits
    MediaAuditRun:
      type: object
      required:
        - id
        - auditName
        - resultCount
        - thresholdUsed
        - createdAt
      properties:
        id:
          type: integer
          description: Run ID
        auditName:
          type: string
          description: Name of the audit that was run
          example: lowSegmentMedia
        category:
          type: string
          nullable: true
          description: Category filter used (ANIME/JDRAMA) or null for all
        resultCount:
          type: integer
          description: Number of reports created in this run
          example: 12
        thresholdUsed:
          type: object
          description: Snapshot of threshold at run time
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
          description: When this run was executed
  examples:
    ValidationFailed:
      summary: Validation Failed
      value:
        code: VALIDATION_FAILED
        title: Validation Failed
        detail: The request data did not pass validation rules. Please check the errors field for details.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 400
        errors:
          query: Required
          limit: Must be a positive integer
          email: Invalid email format
    InvalidJson:
      summary: Invalid JSON
      value:
        code: INVALID_JSON
        title: Invalid JSON
        detail: The request body contains invalid JSON that could not be parsed. Please check the syntax.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 400
    AuthCredentialsRequired:
      summary: Authentication Credentials Required
      value:
        code: AUTH_CREDENTIALS_REQUIRED
        title: Authentication Credentials Required
        detail: No API key or session credentials were provided. Please include an Authorization Bearer token or a valid session cookie.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 401
    AuthCredentialsInvalid:
      summary: Invalid Authentication Credentials
      value:
        code: AUTH_CREDENTIALS_INVALID
        title: Invalid Authentication Credentials
        detail: The provided API key or session credentials are invalid. Please check your credentials and try again.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 401
    AuthCredentialsExpired:
      summary: Expired Authentication Credentials
      value:
        status: 401
        code: AUTH_CREDENTIALS_EXPIRED
        title: Expired Authentication Credentials
        detail: Your credentials are not valid anymore. Please sign in again or create a new API key.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
    InsufficientPermissions:
      summary: Insufficient Permissions
      value:
        code: INSUFFICIENT_PERMISSIONS
        title: Insufficient Permissions
        detail: 'Your account lacks the required permissions to perform this action. Required permissions: {permissions}.'
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 403
    RateLimitExceeded:
      summary: Rate Limit Exceeded
      value:
        code: RATE_LIMIT_EXCEEDED
        title: Rate Limit Exceeded
        detail: You have made too many requests. Please slow down and try again later.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 429
    QuotaExceeded:
      summary: Quota Exceeded
      value:
        code: QUOTA_EXCEEDED
        title: Quota Exceeded
        detail: You have exceeded your monthly API quota. Please upgrade your plan or wait until next month.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 429
    InternalServerError:
      summary: Internal Server Error
      value:
        code: INTERNAL_SERVER_EXCEPTION
        title: Internal Server Error
        detail: An unexpected error occurred on our end. Please try again later. If the problem persists, please report this issue.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 500
    AccountConflict:
      summary: Account Conflict
      value:
        code: ACCOUNT_CONFLICT
        title: Account Conflict
        detail: An account with this email already exists. Please log in or use a different email.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 409
    DuplicateKey:
      summary: Duplicate Key (Resource Already Exists)
      value:
        code: DUPLICATE_KEY
        title: Resource already exists
        detail: A resource with this UUID already exists
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 409
    NotFound:
      summary: Not Found
      value:
        code: NOT_FOUND
        title: Not Found
        detail: The requested resource could not be found. Please check the URL and try again.
        type: https://github.com/BrigadaSOS/Nadeshiko/issues/new?template=bug_report.yml
        instance: trace-id-placeholder
        status: 404
  responses:
    UnauthorizedApiKey:
      description: Unauthorized (API key)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error401'
          examples:
            AuthCredentialsRequired:
              $ref: '#/components/examples/AuthCredentialsRequired'
            AuthCredentialsInvalid:
              $ref: '#/components/examples/AuthCredentialsInvalid'
            AuthCredentialsExpired:
              $ref: '#/components/examples/AuthCredentialsExpired'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error403'
          examples:
            InsufficientPermissions:
              $ref: '#/components/examples/InsufficientPermissions'
    TooManyRequests:
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error429'
          examples:
            RateLimitExceeded:
              $ref: '#/components/examples/RateLimitExceeded'
            QuotaExceeded:
              $ref: '#/components/examples/QuotaExceeded'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error500'
          examples:
            InternalServerError:
              $ref: '#/components/examples/InternalServerError'
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error400'
          examples:
            ValidationFailed:
              $ref: '#/components/examples/ValidationFailed'
            InvalidJson:
              $ref: '#/components/examples/InvalidJson'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error409'
          examples:
            AccountConflict:
              $ref: '#/components/examples/AccountConflict'
            DuplicateKey:
              $ref: '#/components/examples/DuplicateKey'
    SegmentInternalResponse:
      description: Single segment response with internal fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SegmentInternal'
    Unauthorized:
      description: Unauthorized (API key or session)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error401'
          examples:
            AuthCredentialsRequired:
              $ref: '#/components/examples/AuthCredentialsRequired'
            AuthCredentialsInvalid:
              $ref: '#/components/examples/AuthCredentialsInvalid'
            AuthCredentialsExpired:
              $ref: '#/components/examples/AuthCredentialsExpired'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error404'
          examples:
            NotFound:
              $ref: '#/components/examples/NotFound'
    SegmentRevisionListResponse:
      description: List of segment revisions
      content:
        application/json:
          schema:
            type: object
            required:
              - revisions
            properties:
              revisions:
                type: array
                items:
                  $ref: '#/components/schemas/SegmentRevision'
    EpisodeListResponse:
      description: Paginated list of episodes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EpisodeListResponse'
    EpisodeResponse:
      description: Single episode response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Episode'
    SegmentListResponse:
      description: Paginated segment list response
      content:
        application/json:
          schema:
            type: object
            required:
              - segments
              - pagination
            properties:
              segments:
                type: array
                items:
                  $ref: '#/components/schemas/Segment'
                description: Array of segment objects
              pagination:
                $ref: '#/components/schemas/OpaqueCursorPagination'
    SegmentBatchCreateResponse:
      description: Batch segment creation result
      content:
        application/json:
          schema:
            type: object
            required:
              - created
              - skipped
            properties:
              created:
                type: integer
                description: Number of segments successfully created
                example: 700
              skipped:
                type: integer
                description: Number of segments skipped due to duplicate UUIDs
                example: 15
    SegmentResponse:
      description: Single segment response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Segment'
    UnauthorizedSession:
      description: Unauthorized (session)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error401'
          examples:
            AuthCredentialsRequired:
              $ref: '#/components/examples/AuthCredentialsRequired'
            AuthCredentialsInvalid:
              $ref: '#/components/examples/AuthCredentialsInvalid'
            AuthCredentialsExpired:
              $ref: '#/components/examples/AuthCredentialsExpired'
