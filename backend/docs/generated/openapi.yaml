              - es-sync-create
              - es-sync-update
              - es-sync-delete
          description: The name of the queue
          example: es-sync-create
      responses:
        '200':
          description: Queue details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: string
                    example: es-sync-create
                  size:
                    type: integer
                    description: Current queue size (pending jobs)
                    example: 10
                  created:
                    type: integer
                    description: Total jobs created
                    example: 1250
                  failed:
                    type: integer
                    description: Total failed jobs
                    example: 5
                  complete:
                    type: integer
                    description: Total completed jobs
                    example: 1235
                  expired:
                    type: integer
                    description: Total expired jobs
                    example: 2
                  cancelled:
                    type: integer
                    description: Total cancelled jobs
                    example: 3
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
