          description: Filter by check name
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReviewAllowlist'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Admin
      operationId: adminReviewAllowlistCreate
      summary: Add to allowlist
      description: |
        Adds a media or episode to the allowlist for a specific check, excluding it from future auto-check runs.

        **Permissions:** `ADD_MEDIA`
      security:
        - apiKeyHeader:
            - ADD_MEDIA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - checkName
                - mediaId
              properties:
                checkName:
                  type: string
                  description: Check name to allowlist for
                mediaId:
                  type: integer
                  description: Media ID to allowlist
                episodeNumber:
                  type: integer
                  description: Episode number (for episode-level checks)
                reason:
                  type: string
                  description: Reason for allowlisting
      responses:
        '201':
          description: Added to allowlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewAllowlist'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/admin/review/allowlist/{id}:
    delete:
      tags:
        - Admin
      operationId: adminReviewAllowlistDestroy
      summary: Remove from allowlist
      description: |
        Removes an item from the review allowlist, re-enabling auto-checks for that media/episode.

        **Permissions:** `ADD_MEDIA`
      security:
        - apiKeyHeader:
            - ADD_MEDIA
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Allowlist entry ID
      responses:
        '204':
          description: Removed from allowlist
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    apiKeyHeader:
      type: http
      scheme: bearer
      bearerFormat: APIKey
      description: API key authentication via Authorization Bearer header
    sessionCookie:
      type: apiKey
      in: cookie
      name: nadeshiko.session_token
      description: Session authentication via cookie
  schemas:
    Category:
      type: string
      description: Media category type
      enum:
        - ANIME
        - JDRAMA
      example: ANIME
      x-enum-descriptions:
        - value: ANIME
          description: Anime
        - value: JDRAMA
          description: Japanese Drama
    SearchResultMedia:
      type: object
      description: Media information included in search results
      required:
        - mediaId
        - nameRomaji
        - category
      properties:
        mediaId:
          type: integer
          description: Unique identifier for the media
          example: 110316
        nameRomaji:
          type: string
          description: Romaji transliteration of the media name
          example: Steins;Gate
        nameEn:
          type: string
          description: English name of the media
          example: Steins;Gate
        nameJa:
          type: string
          description: Original Japanese name of the media
          example: シュタインズ・ゲート
        coverUrl:
          type: string
          format: uri
          description: URL to the cover image
          example: https://example.com/media/anime/steins-gate/cover.jpg
        bannerUrl:
          type: string
          format: uri
          description: URL to the banner image
          example: https://example.com/media/anime/steins-gate/banner.jpg
        category:
          $ref: '#/components/schemas/Category'
    JapaneseSearchContent:
      type: object
      description: Japanese content in search results with optional highlight
      required:
        - content
      properties:
        content:
          type: string
          description: Original Japanese content of the segment
          example: 僕は僕で、君は君だ。
        highlight:
          type: string
          description: Japanese content with search terms highlighted
          example: <em>僕</em>は<em>僕</em>で、<em>君</em>は<em>君</em>だ。
    TranslationSearchContent:
      type: object
      description: Translation content in search results with optional highlight
      required:
        - isMachineTranslated
      properties:
        content:
          type: string
          description: Translated content
          example: I am me, and you are you.
        highlight:
          type: string
          description: Translated content with search terms highlighted
          example: <em>I</em> am <em>me</em>, and <em>you</em> are <em>you</em>.
        isMachineTranslated:
          type: boolean
          description: Whether the translation was machine-translated
          example: false
    Morpheme:
      type: object
      description: Morphological analysis token
      required:
        - surface
        - reading
        - baseform
        - pronunciation
        - pos
        - posShort
        - begin
        - end
        - pitchAccentType
        - pitchCompoundRule
        - pitchModificationRule
      properties:
        surface:
          type: string
          description: Surface form of the token as it appears in the text
          example: 食べ
        reading:
          type: string
          description: Reading in katakana
          example: タベ
        baseform:
          type: string
          description: Dictionary/base form of the word
          example: 食べる
        pronunciation:
          type: string
          description: Pronunciation in katakana
          example: タベル
        pos:
          type: array
          items:
            type: string
          description: Full part-of-speech tag array
          example:
            - 動詞
            - 一般
            - '*'
            - '*'
        posShort:
          type: string
          description: Short part-of-speech label (first element of pos array)
          example: 動詞
        begin:
          type: integer
          description: Character offset where the token begins in the original text
          example: 0
        end:
          type: integer
          description: Character offset where the token ends in the original text
          example: 2
        pitchAccentType:
          type: array
          items:
            type: integer
          nullable: true
          description: |
            Pitch accent type — mora position(s) where the pitch drops. 0 = heiban (flat), 1 = atamadaka, 2+ = nakadaka/odaka. Comma-separated in UniDic feature[24]. Null if not available.
          example:
            - 0
        pitchCompoundRule:
          type: string
          nullable: true
          description: |
            Compound accent connection rule from UniDic feature[25]. Values like C1-C5, F1-F6, P1-P13. Null if not available.
          example: C2
        pitchModificationRule:
          type: string
          nullable: true
          description: |
            Accent modification rule from UniDic feature[26]. Values like M1, M2, M4. Null if not available.
          example: null
    SearchResultSegment:
      type: object
      description: Segment details in search results
      required:
        - status
        - uuid
        - position
        - startTime
        - endTime
        - episodeNumber
        - textJa
        - textEn
        - textEs
        - isNsfw
      properties:
        status:
          type: string
          enum:
            - DELETED
            - ACTIVE
            - SUSPENDED
            - VERIFIED
            - INVALID
            - TOO_LONG
          description: Segment status
          example: ACTIVE
        uuid:
          type: string
          format: uuid
          description: Unique identifier for the segment
          example: 3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e
        position:
          type: integer
          description: Position of the segment within the episode
          example: 1133
        startTime:
          type: string
          description: Timestamp in H:MM:SS.ffffff format indicating when the segment starts
          example: '0:33:27.255000'
        endTime:
          type: string
          description: Timestamp in H:MM:SS.ffffff format indicating when the segment ends
          example: '0:33:28.464000'
        episodeNumber:
          type: integer
          description: Episode number where the segment appears
          example: 1
        textJa:
          $ref: '#/components/schemas/JapaneseSearchContent'
        textEn:
          $ref: '#/components/schemas/TranslationSearchContent'
        textEs:
          $ref: '#/components/schemas/TranslationSearchContent'
        isNsfw:
          type: boolean
          description: Whether the segment contains NSFW content
          example: false
        morphemes:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Morpheme'
          description: Morphological analysis of the Japanese content
    SearchResultUrls:
      type: object
      description: URLs to media resources for a segment
      properties:
        imageUrl:
          type: string
          format: uri
          description: URL to the subtitle image snapshot
          example: https://example.com/media/anime/steins-gate/segments/1133.jpg
        audioUrl:
          type: string
          format: uri
          description: URL to the audio clip for this segment
          example: https://example.com/media/anime/steins-gate/audio/1133.mp3
        videoUrl:
          type: string
          format: uri
          description: URL to the video clip for this segment
          example: https://example.com/media/anime/steins-gate/video/1133.mp4
    SearchResult:
      type: object
      description: A complete search result combining media info, segment details, and URLs
      required:
        - media
        - segment
        - urls
      properties:
        media:
          $ref: '#/components/schemas/SearchResultMedia'
          description: Media information for this result
        segment:
          $ref: '#/components/schemas/SearchResultSegment'
          description: Segment details including translations
        urls:
          $ref: '#/components/schemas/SearchResultUrls'
          description: URLs to media resources (images, audio, video)
    PaginationInfo:
      type: object
      description: Pagination metadata for search results
      properties:
        pageSize:
          type: integer
          description: Number of results returned in this page
          example: 20
        hasMore:
          type: boolean
          description: Whether there are more results after this page
          example: true
        estimatedTotalHits:
          type: integer
          description: Estimated total number of matching segments
          example: 12456
        estimatedTotalHitsRelation:
          type: string
          description: Whether estimatedTotalHits is exact or a lower bound
          enum:
            - EXACT
            - LOWER_BOUND
          example: LOWER_BOUND
    SearchHealthCheckResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'
        cursor:
          type: array
          items:
            type: number
          description: Cursor for pagination
    Error401:
      type: object
      description: Unauthorized error response
      required:
        - code
        - title
        - detail
        - status
      properties:
        code:
          type: string
          description: Specific error code for programmatic handling
          enum:
            - AUTH_CREDENTIALS_REQUIRED
            - AUTH_CREDENTIALS_INVALID
            - AUTH_CREDENTIALS_EXPIRED
            - EMAIL_NOT_VERIFIED
        title:
          type: string
          description: A short, human-readable summary of the problem
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type (e.g., GitHub issues link)
        instance:
          type: string
          description: A URI reference that identifies the specific occurrence (e.g., trace ID)
        status:
          type: integer
          description: The HTTP status code
          enum:
            - 401
        errors:
          type: object
          additionalProperties:
            type: string
          description: Optional map of field names to their error messages (for validation errors)
    Error403:
      type: object
      description: Forbidden error response
      required:
        - code
        - title
        - detail
        - status
      properties:
        code:
          type: string
          description: Specific error code for programmatic handling
          enum:
            - ACCESS_DENIED
            - INSUFFICIENT_PERMISSIONS
        title:
          type: string
          description: A short, human-readable summary of the problem
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type (e.g., GitHub issues link)
        instance:
          type: string
          description: A URI reference that identifies the specific occurrence (e.g., trace ID)
        status:
          type: integer
          description: The HTTP status code
          enum:
            - 403
        errors:
          type: object
          additionalProperties:
            type: string
          description: Optional map of field names to their error messages (for validation errors)
    Error429:
      type: object
      description: Too Many Requests error response
      required:
        - code
        - title
        - detail
        - status
      properties:
        code:
          type: string
          description: Specific error code for programmatic handling
          enum:
            - RATE_LIMIT_EXCEEDED
            - QUOTA_EXCEEDED
        title:
          type: string
          description: A short, human-readable summary of the problem
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type (e.g., GitHub issues link)
        instance:
          type: string
          description: A URI reference that identifies the specific occurrence (e.g., trace ID)
        status:
          type: integer
          description: The HTTP status code
          enum:
            - 429
        errors:
          type: object
          additionalProperties:
            type: string
          description: Optional map of field names to their error messages (for validation errors)
    Error500:
      type: object
      description: Internal Server Error response
      required:
        - code
        - title
        - detail
        - status
      properties:
        code:
          type: string
          description: Specific error code for programmatic handling
          enum:
            - INTERNAL_SERVER_EXCEPTION
        title:
          type: string
          description: A short, human-readable summary of the problem
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type (e.g., GitHub issues link)
        instance:
          type: string
          description: A URI reference that identifies the specific occurrence (e.g., trace ID)
        status:
          type: integer
          description: The HTTP status code
          enum:
            - 500
        errors:
          type: object
          additionalProperties:
            type: string
          description: Optional map of field names to their error messages (for validation errors)
    SearchRequest:
      type: object
      properties:
        query:
          type: string
          description: Text or sentence to search (null to search without query)
          example: 彼女
        limit:
          type: integer
          description: Max amount of entries by response
          default: 10
        uuid:
          type: string
          format: uuid
          description: Unique ID from segment (Useful to get a specific segment)
          example: 3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e
        category:
          type: array
          description: Media category filter
          items:
            $ref: '#/components/schemas/Category'
          default:
            - ANIME
            - JDRAMA
        mediaId:
          type: integer
          description: Unique ID from media
          example: 5
        episode:
          type: array
          description: Array of episodes to get
          items:
            type: integer
          example:
            - 5
            - 8
        randomSeed:
          type: integer
          description: Non-negative integer seed for deterministic random sorting
          minimum: 0
          example: 42
        contentSort:
          type: string
          description: Order by amount of characters
          enum:
            - ASC
            - DESC
            - NONE
            - TIME_ASC
            - TIME_DESC
            - RANDOM
          example: NONE
          default: NONE
        cursor:
          type: array
          description: Current page of search
          items:
            type: number
          example:
            - 23.31727
            - 7
        exactMatch:
          type: boolean
          description: Whether to use exact phrase matching
          default: false
        minLength:
          type: integer
          description: Minimum content length
          example: 10
        maxLength:
          type: integer
          description: Maximum content length
          example: 50
        excludedMediaIds:
          type: array
          items:
            type: integer
          description: Media IDs to exclude from results
          default: []
        status:
          type: array
          description: Segment status filter
          items:
            type: string
            enum:
              - DELETED
              - ACTIVE
              - SUSPENDED
              - VERIFIED
              - INVALID
              - TOO_LONG
          default:
            - ACTIVE
        media:
          type: array
          description: Media filter with episodes
          items:
            type: object
            required:
              - mediaId
              - episodes
            properties:
              mediaId:
                type: integer
                example: 123
              episodes:
                type: array
                description: Array of episode numbers
                items:
                  type: number
                example:
                  - 1
                  - 2
    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'
        cursor:
          type: array
          nullable: true
          items:
            type: number
          description: Cursor for pagination
    Error400:
      type: object
      description: Bad Request error response
      required:
        - code
        - title
        - detail
        - status
      properties:
        code:
          type: string
          description: Specific error code for programmatic handling
          enum:
            - VALIDATION_FAILED
            - INVALID_JSON
            - INVALID_REQUEST
        title:
          type: string
          description: A short, human-readable summary of the problem
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type (e.g., GitHub issues link)
        instance:
          type: string
          description: A URI reference that identifies the specific occurrence (e.g., trace ID)
        status:
          type: integer
          description: The HTTP status code
          enum:
            - 400
        errors:
          type: object
          additionalProperties:
            type: string
          description: Optional map of field names to their error messages (for validation errors)
    SearchStatsRequest:
      type: object
      properties:
        query:
          type: string
          description: Text or sentence to search
          example: 彼女
        category:
          type: array
          description: Media category filter
          items:
            $ref: '#/components/schemas/Category'
          default:
            - ANIME
            - JDRAMA
        exactMatch:
          type: boolean
          description: Whether to use exact phrase matching
          default: false
        minLength:
          type: integer
          description: Minimum content length
          example: 10
        maxLength:
          type: integer
          description: Maximum content length
          example: 50
        excludedMediaIds:
          type: array
          items:
            type: integer
          description: Media IDs to exclude from results
          default: []
        mediaIds:
          type: array
          items:
            type: integer
          description: Restrict stats to these media IDs (for list-scoped stats)
          default: []
        status:
          type: array
          description: Segment status filter
          items:
            type: string
            enum:
              - DELETED
              - ACTIVE
              - SUSPENDED
              - VERIFIED
              - INVALID
              - TOO_LONG
          default:
            - ACTIVE
    MediaSearchStats:
      type: object
      description: Search result statistics grouped by media
      properties:
        mediaId:
          type: integer
          description: Unique identifier for the media
          example: 110316
        category:
          $ref: '#/components/schemas/Category'
        nameRomaji:
          type: string
          description: Romaji transliteration of the media name
          example: Steins;Gate
        nameEn:
          type: string
          description: English name of the media
          example: Steins;Gate
        nameJa:
          type: string
          description: Original Japanese name of the media
          example: シュタインズ・ゲート
        segmentCount:
          type: integer
          description: Total number of segments found for this media
          example: 42
        episodeHits:
          type: object
          description: Mapping of episode numbers to segment hit counts
          example:
            '1': 5
            '2': 8
            '3': 3
          additionalProperties:
            type: integer
    CategoryCount:
      type: object
      description: Count of entries grouped by media category
      properties:
        category:
          $ref: '#/components/schemas/Category'
        count:
          type: integer
          description: Number of entries in this category
          example: 1523
    SearchStatsResponse:
      type: object
      properties:
        media:
          type: array
          items:
            $ref: '#/components/schemas/MediaSearchStats'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryCount'
    SearchMultipleRequest:
      type: object
      properties:
        words:
          type: array
          items:
            type: string
          description: List of words to search for
          example:
            - 彼女
            - 私
        exactMatch:
          type: boolean
          default: false
          description: Whether to use exact matching
          example: false
      required:
        - words
    WordMatchMedia:
      type: object
      description: Media entry containing word matches
      properties:
        mediaId:
          type: integer
          description: Unique identifier for the media
          example: 110316
        nameEn:
          type: string
          description: English name of the media
          example: Steins;Gate
        nameJa:
          type: string
          description: Original Japanese name of the media
          example: シュタインズ・ゲート
        nameRomaji:
          type: string
          description: Romaji transliteration of the media name
          example: Steins;Gate
        matchCount:
          type: integer
          description: Number of times the word appears in this media
          example: 234
    WordMatch:
      type: object
      description: Word matching result with occurrences across media
      properties:
        word:
          type: string
          description: The word that was searched for
          example: 彼女
        isMatch:
          type: boolean
          description: Indicates whether the word was found in any segment
          example: true
        matchCount:
          type: integer
          description: Total number of times this word appears across all media
          example: 1523
        media:
          type: array
          description: List of media containing this word
          items:
            $ref: '#/components/schemas/WordMatchMedia'
    SearchMultipleResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/WordMatch'
    ExternalId:
      type: object
      description: Map of external IDs keyed by source. Only sources with values are included.
      properties:
        anilist:
          type: string
          description: AniList ID
          example: '21459'
        imdb:
          type: string
          description: IMDB ID
          example: tt1234567
        tvdb:
          type: string
          description: TVDB ID
          example: '12345'
    Seiyuu:
      type: object
      description: Japanese voice actor (seiyuu)
      required:
        - id
        - nameJa
        - nameEn
        - imageUrl
      properties:
        id:
          type: integer
          description: AniList staff ID
          example: 95991
        nameJa:
          type: string
          description: Japanese name of the voice actor
          example: 阿部敦
        nameEn:
          type: string
          description: English name of the voice actor
          example: Atsushi Abe
        imageUrl:
          type: string
          format: uri
          description: Profile image URL
          example: https://s4.anilist.co/file/anilistcdn/staff/large/n95991.jpg
    Character:
      type: object
      description: Anime character
      required:
        - id
        - nameJa
        - nameEn
        - imageUrl
        - seiyuu
      properties:
        id:
          type: integer
          description: AniList character ID
          example: 14545
        nameJa:
          type: string
          description: Japanese name of the character
          example: 真城最高
        nameEn:
          type: string
          description: English name of the character
          example: Moritaka Mashiro
        imageUrl:
          type: string
          format: uri
          description: Character image URL
          example: https://s4.anilist.co/file/anilistcdn/character/large/b14545.jpg
        seiyuu:
          $ref: '#/components/schemas/Seiyuu'
    MediaCharacter:
      type: object
      description: Character appearing in a media with their role
      required:
        - character
        - role
      properties:
        character:
          $ref: '#/components/schemas/Character'
        role:
          type: string
          enum:
            - MAIN
            - SUPPORTING
            - BACKGROUND
          description: Character's role in the media
          example: MAIN
    List:
      type: object
      description: Media collection list
      required:
        - id
        - name
        - type
        - userId
        - visibility
      properties:
        id:
          type: integer
          description: List ID
          example: 123
        name:
          type: string
          description: Name of the list
          example: Bakuman Series
        type:
          type: string
          enum:
            - SERIES
            - CUSTOM
            - SEGMENT
          description: Type of list
          example: SERIES
        userId:
          type: integer
          description: User ID who owns the list (1 = admin)
          example: 1
