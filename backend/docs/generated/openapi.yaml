          schema:
            type: integer
            default: 20
            maximum: 100
          description: Number of results per page
        - name: status
          in: query
          schema:
            type: string
          description: |
            Filter by report status. Accepts a single value or comma-separated list (e.g. "OPEN,PROCESSING"). Valid values: OPEN, PROCESSING, FIXED, DISMISSED.
        - name: source
          in: query
          schema:
            $ref: '#/components/schemas/ReportSource'
          description: Filter by report source
        - name: target.type
