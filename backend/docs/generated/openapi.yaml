openapi: 3.1.0
info:
  title: Nadeshiko API
  description: |
    Welcome to the Nadeshiko API.

    ## Getting Started

    Nadeshiko uses API keys to grant access to the API. Authentication is performed using the Authorization header. Please note that you must be registered on Nadeshiko to generate an API key. If you haven't registered yet, please do so.

    If you haven't generated an API key yet, you can do so on your [account page](https://nadeshiko.co/settings/api), API section.
    Internal user/admin endpoints use session cookie authentication.
    401 response components are scoped by auth mode:
    - `UnauthorizedApiKey` for API key-only endpoints
    - `UnauthorizedSession` for session-only endpoints
    - `Unauthorized` for endpoints that accept either auth mode

    ### Quotas and Limits
    The API has a rate limit to ensure fair usage. Each API key is subject to a rate limit of 2000 requests per 5 minutes. Exceeding this limit will result in a temporary block with the following message:
    > "Too many requests. Please try again later."

    Additionally, each account has a monthly quota limit. Once the monthly quota is exceeded, further requests will receive the message:
    > "API Key quota exceeded for this month."

    | Account Type | Quota (Monthly) |
    |--------------|-----------------|
    | Default      | 2500 requests   |

    To increase your quota, please contact the Nadeshiko team. For more information, refer to the [contact page](https://nadeshiko.co/about).
  version: 1.5.0
  contact:
    name: Nadeshiko Team
    url: https://nadeshiko.co
  license:
    name: ISC
  x-logo:
    url: https://nadeshiko.co/logo.webp
    altText: Nadeshiko
    href: https://nadeshiko.co
servers:
  - description: Production server
    url: https://api.nadeshiko.co
tags:
  - name: Search
    description: |
      Search endpoints for querying Japanese segments across indexed media.
  - name: Admin
    x-internal: true
    description: |
      Administrative endpoints for system management, queue monitoring, and automated review.
  - name: Media
    description: |
      Media CRUD endpoints for managing anime and J-Drama entries, episodes, segments, characters, and seiyuu.
  - name: User
    x-internal: true
    description: |
      User endpoints for account data including quota, preferences, activity history, reports, and data export.
  - name: Collections
    x-internal: true
    description: |
      Collection endpoints for managing saved segment collections.
paths:
  /v1/search:
    post:
      tags:
        - Search
      operationId: search
      summary: Search segments by query
      description: |
        The primary search endpoint for finding Japanese segments and their translations across indexed media (anime, J-Drama).

        This endpoint uses Elasticsearch with advanced Japanese text analysis supporting multiple input types (romaji, kanji, kana) and providing intelligent field-based boosting.

        **Query Features**
        - **Multi-language Support:** Search using Japanese (kanji/kana), Romaji, or English/Spanish
        - **Boolean Operators:** `AND`, `OR`, `NOT` supported (e.g., `(cat OR dog) AND bird`)
        - **Phrase Matching:** Use quotes for exact phrases (e.g., `"good morning"`), or pass `exactMatch: true` to the request body
        - **Wildcards:** `te*t` format (leading wildcards not supported)
        - **Smart Field Selection:** Automatically chooses optimal search fields based on input type

        **Input Type Handling**
        | Input Type | Search Strategy |
        |------------|-----------------|
        | **Romaji** (`go`, `taberu`) | Boosts EN/ES translations, reading form (pronunciation), and base form |
        | **Kanji** (`食べる`, `彼女`) | Searches content and base form (dictionary form). Ignores matches by reading (homophones). |
        | **Kana** (`たべる`, `かのじょ`) | Standard search across content, base form, and reading form |
        | **English/Spanish** | Direct translation search |

        **Permissions:** `READ_MEDIA`
      security:
        - ApiKey:
            - READ_MEDIA
        - SessionCookie: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'
              examples:
                ValidationFailed:
                  $ref: '#/components/examples/ValidationFailed'
                InvalidJson:
                  $ref: '#/components/examples/InvalidJson'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/search/stats:
    post:
      tags:
        - Search
      operationId: getSearchStats
      summary: Get search statistics
      description: |
        Returns statistics for search filters and category tabs without fetching segment rows.

        This endpoint is optimized for UI filter panels:
        - `media` powers the media dropdown on the right side.
        - `categories` powers category tabs below the search bar.

        The stats are scoped by query and category filters, but are not narrowed by a selected media/episode.

        **Permissions:** `READ_MEDIA`
      security:
        - ApiKey:
            - READ_MEDIA
        - SessionCookie: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchStatsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchStatsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'
              examples:
                ValidationFailed:
                  $ref: '#/components/examples/ValidationFailed'
                InvalidJson:
                  $ref: '#/components/examples/InvalidJson'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/search/words:
    post:
      tags:
        - Search
      operationId: searchWords
      summary: Search by multiple words
      description: |
        Searches for multiple words simultaneously and aggregates results by media.

        Unlike the main search endpoint, this returns a summary of matches per media rather than individual segments.

        **Use Cases**
        - Vocabulary discovery across media library
        - Finding anime/dramas that use specific words
        - Comparing word usage across different titles

        **Permissions:** `READ_MEDIA`
      security:
        - ApiKey:
            - READ_MEDIA
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchMultipleRequest'
            example:
              words:
                - 彼女
                - 私
              exactMatch: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMultipleResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'
              examples:
                ValidationFailed:
                  $ref: '#/components/examples/ValidationFailed'
                InvalidJson:
                  $ref: '#/components/examples/InvalidJson'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media:
    get:
      tags:
        - Media
      operationId: listMedia
      summary: List all media
      description: |
        Returns a paginated list of media with full metadata, including cover/banner images, episode counts, and genres.
        Supports filtering by category and text search.

        **Permissions:** `READ_MEDIA`
      security:
        - ApiKey:
            - READ_MEDIA
        - SessionCookie: []
      parameters:
        - name: take
          in: query
          description: Number of results per page
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 40
        - name: cursor
          in: query
          description: Opaque pagination cursor token
          schema:
            type: string
        - name: category
          in: query
          description: Filter by media category
          schema:
            type: string
            enum:
              - ANIME
              - JDRAMA
            example: ANIME
        - name: query
          in: query
          description: Search query for filtering media by name
          schema:
            type: string
            example: steins
        - name: include
          in: query
          description: Resources to expand in the media response
          schema:
            type: array
            items:
              $ref: '#/components/schemas/MediaIncludeExpansion'
            default: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Media
      operationId: createMedia
      x-internal: true
      summary: Create new media
      description: |
        Creates a new media entry in the database.

        **Permissions:** `ADD_MEDIA`
      security:
        - ApiKey:
            - ADD_MEDIA
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/autocomplete:
    get:
      tags:
        - Media
      operationId: autocompleteMedia
      x-internal: true
      summary: Autocomplete media by name
      description: |
        Returns a short list of media matching a name prefix or substring.
        Results are ranked by exact match, then prefix match, then contains match,
        and further sorted by name length.

        **Permissions:** `READ_MEDIA`
      security:
        - ApiKey:
            - READ_MEDIA
        - SessionCookie: []
      parameters:
        - name: query
          in: query
          required: true
          description: Search term to match against media names (English, Japanese, romaji)
          schema:
            type: string
            minLength: 1
            pattern: .*\S.*
            example: steins
        - name: take
          in: query
          description: Maximum number of results to return
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 25
        - name: category
          in: query
          description: Filter by media category
          schema:
            type: string
            enum:
              - ANIME
              - JDRAMA
            example: ANIME
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAutocompleteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/segments/{uuid}:
    get:
      tags:
        - Media
      operationId: getSegmentByUuid
      summary: Get segment by UUID or publicId
      description: |
        Returns a specific segment by its UUID or publicId. A shortcut alternative to the nested `/media/{mediaId}/episodes/{episodeNumber}/segments/{id}` path.

        Pass `include[]=ratingAnalysis` and/or `include[]=posAnalysis` to receive raw analysis fields alongside the standard segment data.

        **Permissions:** `UPDATE_MEDIA` (API key) or admin session
      security:
        - ApiKey:
            - UPDATE_MEDIA
        - SessionCookie:
            - ADMIN
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
          description: Segment UUID or publicId
          example: 3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e
        - name: include
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - ratingAnalysis
                - posAnalysis
                - hashedId
                - storageBasePath
                - storage
          style: form
          explode: true
          description: Additional internal fields to include in the response
      responses:
        '200':
          $ref: '#/components/responses/SegmentInternalResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: updateSegmentByUuid
      x-internal: true
      tags:
        - Media
      summary: Update segment by UUID or publicId
      description: |
        Updates an existing segment identified by its UUID or publicId. Performs the lookup internally,
        then applies the update. Only provided fields will be updated.

        **Permissions:** `UPDATE_MEDIA`
      security:
        - ApiKey:
            - UPDATE_MEDIA
        - SessionCookie:
            - ADMIN
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
          description: Segment UUID or publicId
          example: 3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SegmentUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/SegmentInternalResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/segments/{uuid}/context:
    get:
      tags:
        - Media
      operationId: getSegmentContext
      summary: Get surrounding context for a segment
      description: |
        Retrieves segments surrounding a specific segment within an episode.
        Returns segments both before and after the target, providing dialogue context for how a sentence is used.

        **Permissions:** `UPDATE_MEDIA` (API key) or admin session
      security:
        - ApiKey:
            - UPDATE_MEDIA
        - SessionCookie:
            - ADMIN
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
          description: Segment UUID or publicId
          example: 3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e
        - name: take
          in: query
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 30
          description: Number of segments to return before and after the target
        - name: contentRating
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ContentRating'
          description: Content ratings to include (omit for all ratings)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentContextResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'
              examples:
                ValidationFailed:
                  $ref: '#/components/examples/ValidationFailed'
                InvalidJson:
                  $ref: '#/components/examples/InvalidJson'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404'
              examples:
                NotFound:
                  $ref: '#/components/examples/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/segments/{uuid}/revisions:
    get:
      operationId: listSegmentRevisions
      x-internal: true
      tags:
        - Media
      summary: List segment revision history
      description: |
        Returns the revision history for a segment identified by UUID, ordered by most recent first.

        **Permissions:** `UPDATE_MEDIA` (API key) or admin session
      security:
        - ApiKey:
            - UPDATE_MEDIA
        - SessionCookie:
            - ADMIN
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
          description: Segment UUID or publicId
          example: 3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e
      responses:
        '200':
          $ref: '#/components/responses/SegmentRevisionListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/series:
    get:
      tags:
        - Media
      operationId: listSeries
      summary: List all series
      description: |
        Returns a paginated list of media series groupings.

        **Permissions:** `READ_MEDIA`
      security:
        - ApiKey:
            - READ_MEDIA
        - SessionCookie: []
      parameters:
        - name: take
          in: query
          description: Number of results per page
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: cursor
          in: query
          description: Opaque pagination cursor token
          schema:
            type: string
        - name: query
          in: query
          description: Case-insensitive search across English, Japanese, and Romaji names
          schema:
            type: string
            example: bakuman
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeriesListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Media
      operationId: createSeries
      x-internal: true
      summary: Create series
      description: |
        Creates a new media series grouping.

        **Permissions:** `ADD_MEDIA`
      security:
        - ApiKey:
            - ADD_MEDIA
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nameJa
                - nameRomaji
                - nameEn
              properties:
                nameJa:
                  type: string
                  description: Japanese name of the series
                  example: バクマン。シリーズ
                nameRomaji:
                  type: string
                  description: Romaji name of the series
                  example: Bakuman. Series
                nameEn:
                  type: string
                  description: English name of the series
                  example: Bakuman Series
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Series'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/series/{id}:
    get:
      tags:
        - Media
      operationId: getSeries
      summary: Get series details
      description: |
        Returns a series with all media entries sorted by position.

        **Permissions:** `READ_MEDIA`
      security:
        - ApiKey:
            - READ_MEDIA
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series ID
          schema:
            type: integer
            example: 1
        - name: include
          in: query
          description: Resources to expand in the series response
          schema:
            type: array
            items:
              $ref: '#/components/schemas/MediaIncludeExpansion'
            default: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeriesWithMedia'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Media
      operationId: updateSeries
      x-internal: true
      summary: Update series metadata
      description: |
        Updates series localized names.

        **Permissions:** `UPDATE_MEDIA`
      security:
        - ApiKey:
            - UPDATE_MEDIA
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nameJa:
                  type: string
                  description: Updated Japanese name
                  example: 更新バクマン。シリーズ
                nameRomaji:
                  type: string
                  description: Updated Romaji name
                  example: Updated Bakuman. Series
                nameEn:
                  type: string
                  description: Updated English name
                  example: Updated Bakuman Series
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Series'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Media
      operationId: deleteSeries
      x-internal: true
      summary: Delete series
      description: |
        Deletes a series and all its media associations.

        **Permissions:** `REMOVE_MEDIA`
      security:
        - ApiKey:
            - REMOVE_MEDIA
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series ID
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/series/{id}/media:
    post:
      tags:
        - Media
      operationId: addMediaToSeries
      x-internal: true
      summary: Add media to series
      description: |
        Adds a media entry to a series at a specific position.

        **Permissions:** `UPDATE_MEDIA`
      security:
        - ApiKey:
            - ADD_MEDIA
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          description: Series ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mediaId
                - position
              properties:
                mediaId:
                  type: integer
                  description: Media ID to add
                  example: 42
                position:
                  type: integer
                  description: Position in the series (1-indexed)
                  example: 1
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedApiKey'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
