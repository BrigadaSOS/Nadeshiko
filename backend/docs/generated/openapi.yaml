openapi: 3.1.0
info:
  title: Nadeshiko API
  description: |
    Thank you for using the Nadeshiko API! This API lets you search Japanese dialogue segments across anime and J-Drama, with translations and contextual metadata.

    ### Authentication
    All public API requests require an API key passed in the `Authorization` header as `Bearer <api_key>`.
    You can register and generate your key on the [developer page](https://nadeshiko.co/user/developer), where you can also check your current usage.

    ### Request Headers
    The only required application-level request header for the public API is:

    - `Authorization: Bearer <api_key>`

    Public API endpoints do not currently expose custom request ID or rate limit response headers.

    ### Rate Limit
    Each API key is limited to **150 requests per minute**. Exceeding this limit will return a `429 Too Many Requests` response.
    The `429` response body distinguishes between short-term rate limiting and monthly quota exhaustion.

    ### Quota
    Each account has a monthly quota of **5,000 requests**. Once exceeded, further requests will be rejected until the next month.
    To request a quota increase, reach out via the [contact page](https://nadeshiko.co/about).
  version: 2.1.0
  contact:
    name: Nadeshiko Team
    url: https://nadeshiko.co
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html
  x-logo:
    url: ./logo.png
    altText: Nadeshiko
    href: https://nadeshiko.co
servers:
  - description: Production server
    url: https://api.nadeshiko.co
tags:
  - name: Search
    description: |
      Search endpoints for querying Japanese segments across indexed media.
  - name: Media
    description: |
      Media endpoints for browsing anime and J-Drama entries, episodes, and segments.
  - name: Collections
    description: |
      Collection endpoints for managing saved segment collections.
  - name: User
    description: |
      User endpoints for profile data, excluded media, and activity history.
  - name: Activity
    description: |
      Activity endpoints for tracking and querying the authenticated user's activity history.
  - name: Stats
    description: |
      Statistics endpoints for corpus coverage and word frequency data.
  - name: Admin
    x-internal: true
    description: |
      Administrative endpoints for system management, queue monitoring, and automated review.
paths:
  /v1/search:
    post:
      tags:
        - Search
      operationId: search
      x-order: 10
      summary: Search segments by query
      description: |
        The primary search endpoint for finding Japanese segments and their translations across indexed media (anime, J-Drama).

        This endpoint uses Elasticsearch with advanced Japanese text analysis supporting multiple input types (romaji, kanji, kana) and providing intelligent field-based boosting.

        **Query Features**
        - **Multi-language Support:** Search using Japanese (kanji/kana), Romaji, or English/Spanish
        - **Boolean Operators:** `AND`, `OR`, `NOT` supported (e.g., `(cat OR dog) AND bird`)
        - **Phrase Matching:** Use quotes for exact phrases (e.g., `"good morning"`), or pass `exactMatch: true` to the request body
        - **Wildcards:** `te*t` format (leading wildcards not supported)
        - **Smart Field Selection:** Automatically chooses optimal search fields based on input type

        **Input Type Handling**
        | Input Type | Search Strategy |
        |------------|-----------------|
        | **Kanji** (`食べる`, `彼女`) | Matches against surface form, dictionary form, and normalized form. Reading-only field is disabled to avoid homophones. |
        | **Kana** (`たべる`, `かのじょ`) | Matches against surface form, dictionary form, normalized form, and reading form. |
        | **Romaji / English / Spanish** (`go`, `taberu`, `good morning`) | Boosts EN/ES translations. Also matches kana (reading) and normalized Japanese forms as fallbacks. |
      security:
        - ApiKey:
            - READ_MEDIA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/search/stats:
    post:
      tags:
        - Search
      operationId: getSearchStats
      x-order: 20
      summary: Get search statistics
      description: |
        Returns filter statistics for a query without returning segment results. Useful for populating filter UIs:
        - `media`: media matching the query, with per-episode hit counts
        - `categories`: segment counts grouped by media category

        Stats are scoped by the query and category filters but are not narrowed by a selected media/episode — so selecting a media in the UI doesn't zero out other media from the list.
      security:
        - ApiKey:
            - READ_MEDIA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchStatsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchStatsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/search/words:
    post:
      tags:
        - Search
      operationId: searchWords
      x-order: 30
      summary: Search by multiple words
      description: |
        Searches for multiple words simultaneously and aggregates matches per media.

        Unlike the main search endpoint, this returns a per-word summary of matches across media rather than individual segments. Filters apply the same way as `/v1/search`.
      security:
        - ApiKey:
            - READ_MEDIA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchMultipleRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMultipleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/search/media:
    post:
      tags:
        - Search
      operationId: searchMedia
      summary: Find media by name
      description: |
        Returns a short list of media matching a name prefix or substring.
        Results are ranked by exact match, then prefix match, then contains match,
        and further sorted by name length.
      security:
        - ApiKey:
            - READ_MEDIA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchMediaRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAutocompleteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/stats/overview:
    get:
      tags:
        - Stats
      operationId: getStatsOverview
      summary: Get corpus statistics overview
      description: |
        Returns a comprehensive overview of corpus statistics including headline numbers,
        word frequency coverage tiers, and translation availability.

        The same data powers the public stats page at https://nadeshiko.co/stats.
      security:
        - ApiKey:
            - READ_MEDIA
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsOverview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/stats/covered-words:
    get:
      tags:
        - Stats
      x-internal: true
      operationId: getCoveredWords
      summary: List words with coverage information
      description: |
        Returns a paginated list of words from the frequency list within a given
        tier, with optional filtering by coverage status.
      security:
        - ApiKey:
            - READ_MEDIA
      parameters:
        - name: tier
          in: query
          required: true
          description: Frequency tier (max rank) to query
          schema:
            type: integer
            minimum: 1
        - name: minRank
          in: query
          description: Minimum rank (exclusive). Use to query a slice, e.g. minRank=1000&tier=2000 for ranks 1001-2000.
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: filter
          in: query
          description: Filter by coverage status
          schema:
            type: string
            enum:
              - ALL
              - COVERED
              - UNCOVERED
            default: ALL
        - name: cursor
          in: query
          description: Opaque pagination cursor returned from the previous page
          schema:
            type: string
        - name: take
          in: query
          description: Number of results per page
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 1000
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoveredWordsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/stats/covered-words/update:
    post:
      tags:
        - Stats
      x-internal: true
      operationId: triggerCoveredWordsUpdate
      summary: Trigger word coverage update
      description: |
        Re-checks word coverage by querying Elasticsearch for all words in the frequency table.
        Can optionally only check currently uncovered words (faster for incremental updates after adding new media).
      security:
        - SessionCookie:
            - ADMIN
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoveredWordsUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoveredWordsUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media:
    get:
      tags:
        - Media
      operationId: listMedia
      x-order: 10
      summary: List all media
      description: |
        Returns a paginated list of media with full metadata, including cover/banner images, episode counts, and genres.
        Supports filtering by category and text search.
      security:
        - ApiKey:
            - READ_MEDIA
      parameters:
        - name: take
          in: query
          description: Number of results per page
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 40
        - name: cursor
          in: query
          description: Opaque pagination cursor token
          schema:
            type: string
        - name: category
          in: query
          description: Filter by media category
          schema:
            type: string
            enum:
              - ANIME
              - JDRAMA
            example: ANIME
        - name: query
          in: query
          description: Search term to match against media names (English, Japanese, romaji)
          schema:
            type: string
            example: steins
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Media
      operationId: createMedia
      x-internal: true
      summary: Create media
      description: |
        Creates a new media entry in the database.
      security:
        - ApiKey:
            - ADD_MEDIA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/segments/{segmentPublicId}:
    get:
      tags:
        - Media
      operationId: getSegment
      x-order: 50
      summary: Get single segment
      description: |
        Returns a specific segment by its public ID.
      security:
        - ApiKey:
            - READ_MEDIA
      parameters:
        - name: segmentPublicId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[A-Za-z0-9_-]{12}$
          description: Segment public ID
          example: V1StGXR8_Z5d
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Segment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      operationId: updateSegment
      x-internal: true
      tags:
        - Media
      summary: Update segment
      description: |
        Updates an existing segment. Only provided fields will be updated.
      security:
        - ApiKey:
            - UPDATE_MEDIA
      parameters:
        - name: segmentPublicId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[A-Za-z0-9_-]{12}$
          description: Segment public ID
          example: V1StGXR8_Z5d
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SegmentUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentInternal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/segments/{segmentPublicId}/context:
    get:
      tags:
        - Media
      operationId: getSegmentContext
      x-order: 60
      summary: Get surrounding context for a segment
      description: |
        Retrieves segments surrounding a specific segment within an episode.
        Returns segments both before and after the target, providing dialogue context for how a sentence is used.
      security:
        - ApiKey:
            - READ_MEDIA
      parameters:
        - name: segmentPublicId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[A-Za-z0-9_-]{12}$
          description: Segment public ID
          example: V1StGXR8_Z5d
        - name: take
          in: query
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 30
          description: Number of segments to return before and after the target
        - name: contentRating
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ContentRating'
          description: Content ratings to include (omit for all ratings)
        - name: include
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/IncludeExpansion'
            default: []
          description: Optional resources to expand in the response `includes` block
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentContextResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/segments/{segmentPublicId}/revisions:
    get:
      operationId: listSegmentRevisions
      x-internal: true
      tags:
        - Media
      summary: List segment revision history
      description: |
        Returns the revision history for a segment, ordered by most recent first.
      security:
        - ApiKey:
            - READ_MEDIA
      parameters:
        - name: segmentPublicId
          in: path
          required: true
          schema:
            type: string
          description: Segment public ID
          example: V1StGXR8_Z5d
      responses:
        '200':
          $ref: '#/components/responses/SegmentRevisionListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/{mediaPublicId}:
    get:
      tags:
        - Media
      operationId: getMedia
      x-order: 20
      summary: Get single media
      description: |
        Returns a single media entry by its public ID with full metadata.
      security:
        - ApiKey:
            - READ_MEDIA
      parameters:
        - name: mediaPublicId
          in: path
          required: true
          description: Media public ID
          schema:
            type: string
            pattern: ^[A-Za-z0-9_-]{12}$
            example: V1StGXR8_Z5d
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Media
      operationId: updateMedia
      x-internal: true
      summary: Update media
      description: |
        Updates an existing media entry. Only provided fields will be updated.
      security:
        - ApiKey:
            - UPDATE_MEDIA
      parameters:
        - name: mediaPublicId
          in: path
          required: true
          description: Media public ID
          schema:
            type: string
            example: V1StGXR8_Z5d
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Media
      operationId: deleteMedia
      x-internal: true
      summary: Delete media
      description: |
        Soft-deletes a media entry by setting the `deletedAt` timestamp. The media remains in the database but is excluded from query results.
      security:
        - ApiKey:
            - REMOVE_MEDIA
      parameters:
        - name: mediaPublicId
          in: path
          required: true
          description: Media public ID
          schema:
            type: string
            example: V1StGXR8_Z5d
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/{mediaPublicId}/episodes:
    get:
      operationId: listEpisodes
      x-order: 30
      tags:
        - Media
      summary: List episodes for a media
      description: |
        Returns a paginated list of episodes for a specific media.
      security:
        - ApiKey:
            - READ_MEDIA
      parameters:
        - name: mediaPublicId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[A-Za-z0-9_-]{12}$
          description: Media public ID
          example: V1StGXR8_Z5d
        - name: take
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: Maximum number of episodes to return
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination cursor token
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpisodeListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createEpisode
      x-internal: true
      tags:
        - Media
      summary: Create episode
      description: |
        Creates a new episode for a specific media.
      security:
        - ApiKey:
            - ADD_MEDIA
      parameters:
        - name: mediaPublicId
          in: path
          required: true
          schema:
            type: string
          description: Media public ID
          example: V1StGXR8_Z5d
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpisodeCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Episode'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/media/{mediaPublicId}/episodes/{episodeNumber}:
    get:
      operationId: getEpisode
      x-order: 40
      tags:
        - Media
      summary: Get single episode
      description: |
        Returns a specific episode by media public ID and episode number.
      security:
        - ApiKey:
            - READ_MEDIA
      parameters:
        - name: mediaPublicId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[A-Za-z0-9_-]{12}$
          description: Media public ID
          example: V1StGXR8_Z5d
        - name: episodeNumber
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          description: Episode number (0 for movies/specials)
          example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Episode'
