description: |
  Segment with internal fields. For write operations (create, update) all fields are always populated.
  For GET, optional fields are only populated when requested via include[].
allOf:
  - $ref: "./Segment.yaml"
  - type: object
    properties:
      storage:
        type: string
        enum: [LOCAL, R2]
        nullable: true
        description: Storage backend for segment assets
        example: "R2"
      hashedId:
        type: string
        nullable: true
        description: Hash identifier for the segment
        example: "0d39e46b14"
      storageBasePath:
        type: string
        nullable: true
        description: Base path in the storage backend
        example: "anime/steins-gate"
      ratingAnalysis:
        type: object
        additionalProperties: true
        nullable: true
        description: Raw WD Tagger v3 classifier output used to derive content rating
      posAnalysis:
        type: object
        additionalProperties: true
        nullable: true
        description: POS tokenization results keyed by engine (sudachi, unidic)
