# Segment Request Schemas
# Shared field definitions using YAML anchors

SegmentFields: &segmentFields
  position:
    type: integer
    description: Position of the segment within the episode
    example: 1133
  status:
    type: string
    description: Segment status
    enum: [ACTIVE, HIDDEN, DELETED, SUSPENDED, VERIFIED, INVALID, TOO_LONG]
    example: "ACTIVE"
  startTimeMs:
    type: integer
    description: Start time of the segment in milliseconds from the beginning of the episode
    example: 2007255
  endTimeMs:
    type: integer
    description: End time of the segment in milliseconds from the beginning of the episode
    example: 2008464
  textJa:
    type: object
    properties:
      content:
        type: string
        maxLength: 500
        description: Original Japanese content of the segment
        example: "僕は僕で、君は君だ。"
  textEs:
    type: object
    properties:
      content:
        type: string
        maxLength: 500
        description: Spanish translation of the segment content
        example: "Yo soy yo, y tú eres tú."
      isMachineTranslated:
        type: boolean
        description: Whether the Spanish translation was machine-translated
        example: false
  textEn:
    type: object
    properties:
      content:
        type: string
        maxLength: 500
        description: English translation of the segment content
        example: "I am me, and you are you."
      isMachineTranslated:
        type: boolean
        description: Whether the English translation was machine-translated
        example: false
  contentRating:
    $ref: "../ContentRating.yaml"
  ratingAnalysis:
    type: object
    additionalProperties: true
    nullable: true
    description: Raw WD Tagger v3 classifier output used to derive content rating
  posAnalysis:
    type: object
    additionalProperties: true
    nullable: true
    description: POS tokenization results keyed by engine (sudachi, unidic)
  storage:
    type: string
    enum: [LOCAL, R2]
    description: Storage backend for segment assets
    example: "R2"
  hashedId:
    type: string
    minLength: 1
    description: Hash identifier for the segment (from segment JSON)
    example: "0d39e46b14"

SegmentCreateRequest:
  type: object
  required:
    - position
    - startTimeMs
    - endTimeMs
    - textJa
    - storage
    - hashedId
  properties:
    <<: *segmentFields
    status:
      type: string
      description: Segment status
      enum: [ACTIVE, HIDDEN, DELETED, SUSPENDED, VERIFIED, INVALID, TOO_LONG]
      default: "ACTIVE"
      example: "ACTIVE"
    textEs:
      type: object
      properties:
        content:
          type: string
          maxLength: 500
          description: Spanish translation of the segment content
          example: "Yo soy yo, y tú eres tú."
        isMachineTranslated:
          type: boolean
          description: Whether the Spanish translation was machine-translated
          default: false
          example: false
    textEn:
      type: object
      properties:
        content:
          type: string
          maxLength: 500
          description: English translation of the segment content
          example: "I am me, and you are you."
        isMachineTranslated:
          type: boolean
          description: Whether the English translation was machine-translated
          default: false
          example: false
    storage:
      type: string
      enum: [LOCAL, R2]
      description: Storage backend for segment assets
      example: "R2"
      default: "R2"

SegmentBatchCreateRequest:
  type: object
  required:
    - segments
  properties:
    segments:
      type: array
      minItems: 1
      maxItems: 1000
      items:
        $ref: "#/SegmentCreateRequest"

SegmentUpdateRequest:
  type: object
  description: All fields are optional for partial updates
  properties:
    <<: *segmentFields
