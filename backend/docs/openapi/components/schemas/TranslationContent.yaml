type: object
description: Translation content for a language
required:
  - isMachineTranslated
properties:
  content:
    type: string
    maxLength: 500
    nullable: true
    description: Translated content
    example: "I am me, and you are you."
  isMachineTranslated:
    type: boolean
    description: Whether the translation was machine-translated
    example: false
