type: object
required:
  - id
  - source
  - target
  - auditRunId
  - reason
  - description
  - data
  - status
  - adminNotes
  - userId
  - createdAt
  - updatedAt
properties:
  id:
    type: integer
    description: Report ID
    example: 1
  source:
    $ref: "./ReportSource.yaml"
  target:
    $ref: "./ReportTarget.yaml"
  auditRunId:
    type: integer
    nullable: true
    description: ID of the audit run that created this report (AUTO only)
  reason:
    $ref: "./ReportReason.yaml"
  description:
    type: string
    nullable: true
    description: Optional description with additional details
  data:
    type: object
    nullable: true
    description: Check-specific metrics (AUTO reports) or null (USER reports)
    additionalProperties: true
  status:
    $ref: "./ReportStatus.yaml"
  adminNotes:
    type: string
    nullable: true
    maxLength: 1000
    description: Notes from the admin who reviewed the report
  userId:
    type: integer
    nullable: true
    description: ID of the user who submitted the report (USER reports only)
    example: 42
  createdAt:
    type: string
    format: date-time
    description: When the report was created
  updatedAt:
    type: string
    format: date-time
    nullable: true
    description: When the report was last updated
