type: object
required:
  - id
  - source
  - targetType
  - targetMediaId
  - reason
  - status
  - createdAt
properties:
  id:
    type: integer
    description: Report ID
    example: 1
  source:
    type: string
    enum: [USER, AUTO]
    description: Who created this report
    example: "USER"
  targetType:
    type: string
    enum: [SEGMENT, EPISODE, MEDIA]
    description: What level the report targets
    example: "SEGMENT"
  targetMediaId:
    type: integer
    description: Media ID this report targets
    example: 42
  targetEpisodeNumber:
    type: integer
    nullable: true
    description: Episode number (for EPISODE/SEGMENT targets)
    example: 5
  targetSegmentUuid:
    type: string
    nullable: true
    description: Segment UUID (for SEGMENT targets)
    example: "3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e"
  reviewCheckRunId:
    type: integer
    nullable: true
    description: ID of the auto-check run that created this report (AUTO only)
  reason:
    type: string
    enum:
      - WRONG_TRANSLATION
      - WRONG_TIMING
      - WRONG_AUDIO
      - NSFW_NOT_TAGGED
      - DUPLICATE_SEGMENT
      - WRONG_METADATA
      - MISSING_EPISODES
      - WRONG_COVER_IMAGE
      - INAPPROPRIATE_CONTENT
      - OTHER
      - LOW_SEGMENT_MEDIA
      - EMPTY_EPISODES
      - MISSING_EPISODES_AUTO
      - BAD_SEGMENT_RATIO
      - MEDIA_WITH_NO_EPISODES
      - MISSING_TRANSLATIONS
      - DB_ES_SYNC_ISSUES
      - HIGH_REPORT_DENSITY
    description: Reason for the report
    example: "WRONG_TRANSLATION"
  description:
    type: string
    nullable: true
    description: Optional description with additional details
  data:
    type: object
    nullable: true
    description: Check-specific metrics (AUTO reports) or null (USER reports)
    additionalProperties: true
  status:
    type: string
    enum: [PENDING, CONCERN, ACCEPTED, REJECTED, RESOLVED, IGNORED]
    description: Current status of the report
    example: "PENDING"
  adminNotes:
    type: string
    nullable: true
    maxLength: 1000
    description: Notes from the admin who reviewed the report
  userId:
    type: integer
    nullable: true
    description: ID of the user who submitted the report (USER reports only)
    example: 42
  createdAt:
    type: string
    format: date-time
    description: When the report was created
  updatedAt:
    type: string
    format: date-time
    nullable: true
    description: When the report was last updated
