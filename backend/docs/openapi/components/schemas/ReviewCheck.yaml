type: object
required:
  - id
  - name
  - label
  - description
  - targetType
  - threshold
  - enabled
properties:
  id:
    type: integer
    description: Check ID
  name:
    type: string
    description: Unique check identifier
    example: "lowSegmentMedia"
  label:
    type: string
    description: Human-readable label
    example: "Low Segment Media"
  description:
    type: string
    description: What this check does
  targetType:
    type: string
    enum: [MEDIA, EPISODE]
    description: What level this check operates on
  threshold:
    type: object
    description: Current threshold configuration
    additionalProperties: true
  enabled:
    type: boolean
    description: Whether this check is active
  thresholdSchema:
    type: array
    description: Schema for threshold fields (from registry)
    items:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [number, boolean]
        default:
          oneOf:
            - type: number
            - type: boolean
        min:
          type: number
        max:
          type: number
  latestRun:
    type: object
    nullable: true
    description: Latest run info for this check
    properties:
      id:
        type: integer
      resultCount:
        type: integer
      createdAt:
        type: string
        format: date-time
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
    nullable: true
