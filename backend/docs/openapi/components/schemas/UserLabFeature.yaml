type: object
required:
  - key
  - name
  - description
  - enabled
  - userEnabled
properties:
  key:
    type: string
    description: Unique identifier for the lab feature
  name:
    type: string
    description: Human-readable feature name
  description:
    type: string
    description: Description of what the feature does
  enabled:
    type: boolean
    description: Whether the feature is globally available
  userEnabled:
    type: boolean
    description: Whether the user has opted in to this feature
