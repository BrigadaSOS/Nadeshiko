type: object
required:
  - id
  - auditName
  - resultCount
  - thresholdUsed
  - createdAt
properties:
  id:
    type: integer
    description: Run ID
  auditName:
    type: string
    description: Name of the audit that was run
    example: "lowSegmentMedia"
  category:
    type: string
    nullable: true
    description: Category filter used (ANIME/JDRAMA) or null for all
  resultCount:
    type: integer
    description: Number of reports created in this run
    example: 12
  thresholdUsed:
    type: object
    description: Snapshot of threshold at run time
    additionalProperties: true
  createdAt:
    type: string
    format: date-time
    description: When this run was executed
