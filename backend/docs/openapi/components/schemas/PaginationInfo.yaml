type: object
description: Pagination metadata for search results
required:
  - hasMore
  - estimatedTotalHits
  - estimatedTotalHitsRelation
  - cursor
properties:
  hasMore:
    type: boolean
    description: Whether there are more results after this page
    example: true
  estimatedTotalHits:
    type: integer
    description: Estimated total number of matching segments
    example: 12456
  estimatedTotalHitsRelation:
    type: string
    description: Whether estimatedTotalHits is exact or a lower bound
    enum: [EXACT, LOWER_BOUND]
    example: LOWER_BOUND
  cursor:
    type: string
    nullable: true
    description: Opaque cursor token for fetching the next page (`null` when hasMore is false)
