type: object
required:
  - id
  - reason
  - description
  - source
  - reporterName
  - createdAt
  - adminNotes
properties:
  id:
    type: integer
    description: Report ID
  reason:
    $ref: "./ReportReason.yaml"
  description:
    type: string
    nullable: true
    description: Optional description with additional details
  source:
    $ref: "./ReportSource.yaml"
  reporterName:
    type: string
    description: Name of the reporter
  createdAt:
    type: string
    format: date-time
    description: When the report was created
  adminNotes:
    type: string
    nullable: true
    description: Notes from the admin who reviewed the report
