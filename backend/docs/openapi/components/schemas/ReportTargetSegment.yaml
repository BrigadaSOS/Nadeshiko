type: object
required:
  - type
  - mediaId
  - segmentId
properties:
  type:
    type: string
    enum: [SEGMENT]
    description: Report target type
    example: "SEGMENT"
  mediaId:
    type: string
    description: Public ID of the media this report targets
    example: "V1StGXR8_Z5d"
  episodeNumber:
    type: integer
    description: Episode number containing the segment
    example: 5
  segmentId:
    type: string
    nullable: true
    description: Segment public ID or UUID
    example: "abc123xyz"
