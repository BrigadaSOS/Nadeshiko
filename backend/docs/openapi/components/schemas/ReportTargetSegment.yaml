type: object
required:
  - type
  - mediaPublicId
  - segmentPublicId
properties:
  type:
    type: string
    enum: [SEGMENT]
    description: Report target type
    example: "SEGMENT"
  mediaPublicId:
    type: string
    description: publicId of the media this report targets
    example: "V1StGXR8_Z5d"
  episodeNumber:
    type: integer
    description: Episode number containing the segment
    example: 5
  segmentPublicId:
    type: string
    nullable: true
    description: Segment publicId
    example: "abc123xyz"
