type: object
description: Slim media item returned by autocomplete (names + cover only)
required:
  - publicId
  - slug
  - nameJa
  - nameRomaji
  - nameEn
  - coverUrl
  - category
properties:
  publicId:
    type: string
    description: Public ID for the media
    pattern: '^[A-Za-z0-9_-]{12}$'
    example: V1StGXR8_Z5d
  slug:
    type: string
    minLength: 1
    description: URL-friendly slug for the media
    example: bakuman
  nameJa:
    type: string
    minLength: 1
    description: Original Japanese name of the media
    example: バクマン。
  nameRomaji:
    type: string
    minLength: 1
    description: Romaji transliteration of the media name
    example: Bakuman.
  nameEn:
    type: string
    minLength: 1
    description: English name of the media
    example: Bakuman.
  coverUrl:
    type: string
    format: uri
    minLength: 1
    description: Full URL to the cover image
    example: "https://cdn.example.com/media/anime/bakuman/cover.webp"
  category:
    $ref: "./Category.yaml"
