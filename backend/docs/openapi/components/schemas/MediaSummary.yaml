type: object
description: Summary information about a media entry for browse/list views
required:
  - id
  - slug
properties:
  id:
    type: integer
    description: Unique identifier for the media
    example: 110316
  slug:
    type: string
    description: URL-friendly slug for the media
    example: "steins-gate"
  externalIds:
    $ref: "./ExternalId.yaml"
  category:
    $ref: "./Category.yaml"
  createdAt:
    type: string
    format: date-time
    description: Timestamp when the media entry was created in the database
    example: "2024-01-15T10:30:00Z"
  updatedAt:
    type: integer
    description: Timestamp when the media entry was last updated
    example: 1705769100
  nameRomaji:
    type: string
    description: Romaji transliteration of the media name
    example: "Steins;Gate"
  nameEn:
    type: string
    description: English name of the media
    example: "Steins;Gate"
  nameJa:
    type: string
    description: Original Japanese name of the media
    example: "シュタインズ・ゲート"
  airingFormat:
    type: string
    description: Format of the media release (e.g., TV, OVA, Movie)
    example: "TV"
  airingStatus:
    type: string
    description: Current airing status (FINISHED, RELEASING)
    example: "FINISHED"
  startDate:
    type: string
    format: date
    description: Start date of the media (YYYY-MM-DD)
    example: "2011-04-06"
  endDate:
    type: string
    format: date
    nullable: true
    description: End date of the media (null if unknown) (YYYY-MM-DD)
    example: "2011-09-14"
  genres:
    type: array
    items:
      type: string
    description: List of genres associated with the media
    example: ["Sci-Fi", "Thriller", "Romance"]
  coverUrl:
    type: string
    format: uri
    description: URL to the cover image
    example: "https://example.com/media/anime/steins-gate/cover.jpg"
  bannerUrl:
    type: string
    format: uri
    description: URL to the banner image
    example: "https://example.com/media/anime/steins-gate/banner.jpg"
  version:
    type: string
    description: Version identifier for the media entry
    example: "v1.0"
  segmentCount:
    type: integer
    description: Total number of subtitle segments available
    example: 18542
  episodeCount:
    type: integer
    description: Total number of episodes available
    example: 24
