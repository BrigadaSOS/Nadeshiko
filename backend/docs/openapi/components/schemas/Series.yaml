type: object
description: Ordered media series grouping
required:
  - id
  - publicId
  - nameJa
  - nameRomaji
  - nameEn
properties:
  id:
    type: integer
    description: Series ID
    example: 1
  publicId:
    type: string
    description: Public identifier for the series
    example: "V1StGXR8_Z5d"
  nameJa:
    type: string
    description: Japanese name of the series
    example: "バクマン。シリーズ"
  nameRomaji:
    type: string
    description: Romaji name of the series
    example: "Bakuman. Series"
  nameEn:
    type: string
    description: English name of the series
    example: "Bakuman Series"
