type: object
required:
  - id
  - activityType
  - segmentPublicId
  - mediaPublicId
  - searchQuery
  - mediaName
  - japaneseText
  - createdAt
properties:
  id:
    type: integer
    minimum: 1
  activityType:
    $ref: "./ActivityType.yaml"
  segmentPublicId:
    type: string
    nullable: true
    minLength: 1
    pattern: '^[A-Za-z0-9_-]{12}$'
  mediaPublicId:
    type: string
    nullable: true
    minLength: 1
    pattern: '^[A-Za-z0-9_-]{12}$'
  searchQuery:
    type: string
    nullable: true
    minLength: 1
  mediaName:
    type: string
    nullable: true
    minLength: 1
  japaneseText:
    type: string
    nullable: true
    minLength: 1
  createdAt:
    type: string
    format: date-time
