type: object
required:
  - id
  - activityType
  - segmentId
  - mediaId
  - searchQuery
  - mediaName
  - japaneseText
  - createdAt
properties:
  id:
    type: integer
  activityType:
    $ref: "./ActivityType.yaml"
  segmentId:
    type: string
    nullable: true
  mediaId:
    type: integer
    nullable: true
  searchQuery:
    type: string
    nullable: true
  mediaName:
    type: string
    nullable: true
  japaneseText:
    type: string
    nullable: true
  createdAt:
    type: string
    format: date-time
