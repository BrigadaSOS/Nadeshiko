type: object
required:
  - id
  - activityType
  - createdAt
properties:
  id:
    type: integer
  activityType:
    $ref: "./ActivityType.yaml"
  segmentUuid:
    type: string
    nullable: true
  mediaId:
    type: integer
    nullable: true
  searchQuery:
    type: string
    nullable: true
  animeName:
    type: string
    nullable: true
  japaneseText:
    type: string
    nullable: true
  createdAt:
    type: string
    format: date-time
