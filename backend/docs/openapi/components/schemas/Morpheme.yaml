type: object
description: Morphological analysis token
required:
  - surface
  - reading
  - baseform
  - pronunciation
  - pos
  - posShort
  - begin
  - end
  - pitchAccentType
  - pitchCompoundRule
  - pitchModificationRule
properties:
  surface:
    type: string
    description: Surface form of the token as it appears in the text
    example: "食べ"
  reading:
    type: string
    description: Reading in katakana
    example: "タベ"
  baseform:
    type: string
    description: Dictionary/base form of the word
    example: "食べる"
  pronunciation:
    type: string
    description: Pronunciation in katakana
    example: "タベル"
  pos:
    type: array
    items:
      type: string
    description: Full part-of-speech tag array
    example: ["動詞", "一般", "*", "*"]
  posShort:
    type: string
    description: Short part-of-speech label (first element of pos array)
    example: "動詞"
  begin:
    type: integer
    description: Character offset where the token begins in the original text
    example: 0
  end:
    type: integer
    description: Character offset where the token ends in the original text
    example: 2
  pitchAccentType:
    type: array
    items:
      type: integer
    nullable: true
    description: >
      Pitch accent type — mora position(s) where the pitch drops.
      0 = heiban (flat), 1 = atamadaka, 2+ = nakadaka/odaka.
      Comma-separated in UniDic feature[24]. Null if not available.
    example: [0]
  pitchCompoundRule:
    type: string
    nullable: true
    description: >
      Compound accent connection rule from UniDic feature[25].
      Values like C1-C5, F1-F6, P1-P13. Null if not available.
    example: "C2"
  pitchModificationRule:
    type: string
    nullable: true
    description: >
      Accent modification rule from UniDic feature[26].
      Values like M1, M2, M4. Null if not available.
    example: null
