type: object
description: Count of entries grouped by media category
required:
  - category
  - count
  - realCount
properties:
  category:
    $ref: "./Category.yaml"
  count:
    type: integer
    description: Number of entries in this category under the current request filters (including any hidden-media exclusion).
    minimum: 0
    example: 1523
  realCount:
    type: integer
    description: Number of entries in this category when the hidden-media exclusion filter is ignored. Equal to `count` when no hidden-media exclusion is in effect.
    minimum: 0
    example: 1700
