type: object
description: Statistics about media and segments for browse view
properties:
  filteredMediaCount:
    type: integer
    description: Number of media entries matching current search/filter
    example: 15
  filteredSegmentCount:
    type: integer
    description: Number of segments in the filtered media
    example: 150
  totalMediaCount:
    type: integer
    description: Total number of media entries in the entire database
    example: 5234
  totalSegmentCount:
    type: integer
    description: Total number of segments in the entire database
    example: 1523847
