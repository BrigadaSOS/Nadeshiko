type: object
description: Coverage statistics for a frequency tier
required:
  - tier
  - covered
  - total
  - percentage
properties:
  tier:
    type: integer
    minimum: 1
    description: The frequency tier (e.g. 1000 means top 1000 words)
    example: 5000
  covered:
    type: integer
    minimum: 0
    description: Number of words with at least one match in the corpus
    example: 4823
  total:
    type: integer
    minimum: 0
    description: Total number of words in this tier
    example: 5000
  percentage:
    type: number
    format: float
    minimum: 0.0
    maximum: 100.0
    description: Coverage percentage
    example: 96.5
