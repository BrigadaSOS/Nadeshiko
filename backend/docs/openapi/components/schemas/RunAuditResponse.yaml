type: object
required:
  - category
  - checksRun
  - totalReports
properties:
  category:
    type: string
    nullable: true
    description: Category filter used
  checksRun:
    type: array
    items:
      type: object
      required:
        - auditName
        - label
        - resultCount
        - runId
      properties:
        auditName:
          type: string
          description: Audit identifier
        label:
          type: string
          description: Human-readable audit name
        resultCount:
          type: integer
          description: Number of reports created
        runId:
          type: integer
          description: ID of the created run record
  totalReports:
    type: integer
    description: Total reports created across all audits
