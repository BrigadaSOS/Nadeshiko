type: object
description: Lightweight metadata for the current sentence search query
properties:
  returnedCount:
    type: integer
    description: Number of sentences returned in this page
    example: 20
  hasMoreResults:
    type: boolean
    description: Whether there are more sentence results after this page
    example: true
  estimatedTotalHits:
    type: integer
    description: Estimated total number of matching segments
    example: 12456
  estimatedTotalHitsRelation:
    type: string
    description: Whether estimatedTotalHits is exact (`eq`) or a lower bound (`gte`)
    enum: [eq, gte]
    example: gte
