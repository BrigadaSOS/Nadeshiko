type: object
description: User segment collection
required:
  - publicId
  - name
  - type
  - visibility
  - segmentCount
  - createdAt
  - updatedAt
properties:
  publicId:
    type: string
    description: Public ID for the collection
    pattern: '^[A-Za-z0-9_-]{12}$'
    example: "V1StGXR8_Z5d"
  name:
    type: string
    description: Name of the collection
    example: "Study Favorites"
  type:
    type: string
    enum: [USER, ANKI_EXPORT]
    description: Type of the collection
    example: "USER"
  visibility:
    $ref: "../CollectionVisibility.yaml"
  segmentCount:
    type: integer
    description: Number of segments in the collection
    example: 42
  createdAt:
    type: string
    format: date-time
    description: When the collection was created
  updatedAt:
    type: string
    format: date-time
    nullable: true
    description: When the collection was last updated
