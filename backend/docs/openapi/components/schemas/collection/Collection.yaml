type: object
description: User segment collection
required:
  - id
  - name
  - type
  - visibility
  - segmentCount
  - createdAt
  - updatedAt
properties:
  id:
    type: integer
    description: Collection ID
    example: 123
  name:
    type: string
    description: Name of the collection
    example: "Study Favorites"
  type:
    type: string
    enum: [USER, ANKI_EXPORT]
    description: Type of the collection
    example: "USER"
  visibility:
    type: string
    enum: [PUBLIC, PRIVATE]
    description: Visibility of the collection
    example: "PRIVATE"
  segmentCount:
    type: integer
    description: Number of segments in the collection
    example: 42
  createdAt:
    type: string
    format: date-time
    description: When the collection was created
  updatedAt:
    type: string
    format: date-time
    nullable: true
    description: When the collection was last updated
