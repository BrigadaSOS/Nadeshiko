type: object
description: Collection with saved segments (search result format)
required:
  - publicId
  - name
  - visibility
  - segmentCount
  - createdAt
  - updatedAt
  - segments
  - includes
  - totalCount
  - pagination
properties:
  publicId:
    type: string
    description: Public ID for the collection
    pattern: '^[A-Za-z0-9_-]{12}$'
    example: "V1StGXR8_Z5d"
  name:
    type: string
    description: Name of the collection
    example: "Study Favorites"
  visibility:
    $ref: "../CollectionVisibility.yaml"
  segmentCount:
    type: integer
    description: Number of segments in the collection
    example: 42
  createdAt:
    type: string
    format: date-time
    description: When the collection was created
  updatedAt:
    type: string
    format: date-time
    nullable: true
    description: When the collection was last updated
  segments:
    type: array
    description: Saved segments with their search result data
    items:
      type: object
      required:
        - position
        - note
        - result
      properties:
        position:
          type: integer
          description: Position in the collection
          example: 1
        note:
          type: string
          nullable: true
          description: User annotation
        result:
          $ref: "../segment/Segment.yaml"
  includes:
    type: object
    required:
      - media
    properties:
      media:
        type: object
        additionalProperties:
          $ref: "../Media.yaml"
        description: Media objects keyed by publicId
  totalCount:
    type: integer
    description: Total number of segments in the collection
    example: 42
  pagination:
    $ref: "../CursorPagination.yaml"
