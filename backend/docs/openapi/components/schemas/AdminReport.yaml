allOf:
  - $ref: "./Report.yaml"
  - type: object
    required:
      - reportCount
      - reporterCount
      - reporterName
      - mediaName
    properties:
      reportCount:
        type: integer
        description: Total number of reports in this group (same target + reason)
        example: 3
      reporterCount:
        type: integer
        description: Number of distinct users who reported this issue
        example: 2
      reporterName:
        type: string
        description: Name of the most recent reporter
        example: "john_doe"
      reporterNames:
        type: array
        items:
          type: string
        description: Names of all distinct reporters in this group
        example: ["john_doe", "jane_doe"]
      mediaName:
        type: string
        description: Display name of the target media (romaji)
        example: "Bocchi the Rock!"
      firstReportedAt:
        type: string
        format: date-time
        description: When the earliest report in this group was created
      lastStatusChange:
        type: string
        format: date-time
        nullable: true
        description: When the most recent status change occurred in this group
