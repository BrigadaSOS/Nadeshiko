type: object
properties:
  labs:
    type: object
    additionalProperties:
      type: boolean
    description: Lab feature opt-in flags keyed by feature key
  mediaNameLanguage:
    type: string
    enum:
      - english
      - japanese
      - romaji
    description: Preferred language for media names display
  searchHistory:
    type: object
    properties:
      enabled:
        type: boolean
        description: Whether activity tracking is enabled (default true)
