type: object
properties:
  mediaNameLanguage:
    type: string
    enum:
      - ENGLISH
      - JAPANESE
      - ROMAJI
    description: Preferred language for media names display
  contentRatingPreferences:
    type: object
    description: Per-category content rating display preferences
    properties:
      nsfw:
        type: string
        enum: [SHOW, BLUR, HIDE]
  translationVisibilityPreferences:
    type: object
    description: Per-language visibility mode for translations in search results, keyed by ISO 639-1 code (uppercase)
    properties:
      EN:
        type: string
        enum: [show, spoiler, hidden]
      ES:
        type: string
        enum: [show, spoiler, hidden]
  searchHistory:
    type: object
    properties:
      enabled:
        type: boolean
        description: Whether activity tracking is enabled (default true)
  blogLastVisited:
    type: string
    format: date-time
    description: ISO timestamp of when the user last visited the blog page
  ankiProfiles:
    type: array
    items:
      type: object
      required: [id, name, serverAddress]
      properties:
        id:
          type: string
        name:
          type: string
        deck:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        fields:
          type: array
          items:
            type: object
            required: [key, value]
            properties:
              key:
                type: string
              value:
                type: string
        key:
          type: string
          nullable: true
        serverAddress:
          type: string
  hiddenMedia:
    type: array
    description: Media hidden from search results by the user
    items:
      type: object
      required: [mediaPublicId]
      properties:
        mediaPublicId:
          type: string
          description: Public ID of the hidden media
        nameEn:
          type: string
        nameJa:
          type: string
        nameRomaji:
          type: string
