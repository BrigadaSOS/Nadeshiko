type: object
description: Search hit statistics for a single media
required:
  - mediaPublicId
  - matchCount
  - episodeHits
properties:
  mediaPublicId:
    type: string
    description: Media public ID (look up full details in `includes.media` when `include[]=media` is requested)
    pattern: '^[A-Za-z0-9_-]{12}$'
    example: V1StGXR8_Z5d
  matchCount:
    type: integer
    description: Number of matching segments found in this media
    minimum: 0
    example: 42
  episodeHits:
    type: array
    description: Episode-level hit counts
    items:
      type: object
      required:
        - episode
        - hitCount
      properties:
        episode:
          type: integer
          description: Episode number
          minimum: 0
          example: 1
        hitCount:
          type: integer
          description: Number of matching segments in this episode
          minimum: 0
          example: 5
    example:
      - episode: 1
        hitCount: 5
      - episode: 2
        hitCount: 8
      - episode: 3
        hitCount: 3
