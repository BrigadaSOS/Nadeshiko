type: object
description: Media entry with full metadata
required:
  - id
  - publicId
  - slug
  - externalIds
  - nameJa
  - nameRomaji
  - nameEn
  - airingFormat
  - airingStatus
  - genres
  - coverUrl
  - bannerUrl
  - startDate
  - category
  - segmentCount
  - episodeCount
  - seasonName
  - seasonYear
properties:
  id:
    type: integer
    description: Internal unique identifier for the media
    example: 7674
  publicId:
    type: string
    description: Public identifier for the media (use this in public URLs)
    example: "V1StGXR8_Z5d"
  slug:
    type: string
    description: URL-friendly slug for the media
    example: "bakuman"
  externalIds:
    $ref: "./ExternalId.yaml"
  nameJa:
    type: string
    description: Original Japanese name of the media
    example: "バクマン。"
  nameRomaji:
    type: string
    description: Romaji transliteration of the media name
    example: "Bakuman."
  nameEn:
    type: string
    description: English name of the media
    example: "Bakuman."
  airingFormat:
    type: string
    description: Format of the media release (e.g., TV, OVA, Movie)
    example: "TV"
  airingStatus:
    type: string
    description: Current airing status (FINISHED, RELEASING, NOT_YET_RELEASED, CANCELLED)
    example: "FINISHED"
  genres:
    type: array
    items:
      type: string
    description: List of genres associated with the media
    example: ["Comedy", "Drama", "Romance", "Slice of Life"]
  coverUrl:
    type: string
    format: uri
    description: Full URL to the cover image
    example: "https://cdn.example.com/media/anime/bakuman/cover.webp"
  bannerUrl:
    type: string
    format: uri
    description: Full URL to the banner image
    example: "https://cdn.example.com/media/anime/bakuman/banner.webp"
  startDate:
    type: string
    format: date
    description: Start date of the media (first airing/release)
    example: "2010-10-02"
  endDate:
    type: string
    format: date
    nullable: true
    description: End date of the media (last airing/release)
    example: "2011-04-02"
  category:
    $ref: "./Category.yaml"
  segmentCount:
    type: integer
    description: Total number of subtitle segments available
    example: 0
  episodeCount:
    type: integer
    description: Total number of episodes available
    example: 25
  studio:
    type: string
    nullable: true
    description: Animation studio that produced the media
    example: "J.C.STAFF"
  seasonName:
    type: string
    description: Airing season label for the media
    example: "FALL"
  seasonYear:
    type: integer
    description: Airing year for the media
    example: 2010
  characters:
    type: array
    items:
      $ref: "./MediaCharacter.yaml"
    description: Characters appearing in the media with their voice actors
