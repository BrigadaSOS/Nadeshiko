type: object
required:
  - type
  - mediaId
  - segmentId
properties:
  type:
    type: string
    enum: [SEGMENT]
    description: Report target type
    example: "SEGMENT"
  mediaId:
    type: integer
    description: Media ID this report targets
    example: 42
  episodeNumber:
    type: integer
    description: Episode number containing the segment
    example: 5
  segmentId:
    type: string
    description: Segment public ID or UUID
    example: "abc123def456"
