type: object
description: Word matching result with occurrences across media
required:
  - word
  - isMatch
  - matchCount
  - realMatchCount
  - media
properties:
  word:
    type: string
    description: The word that was searched for
    minLength: 1
    example: "彼女"
  isMatch:
    type: boolean
    description: Indicates whether the word was found in any segment
    example: true
  matchCount:
    type: integer
    description: Number of times this word appears across media matching the current request filters (including any hidden-media exclusion).
    minimum: 0
    example: 1523
  realMatchCount:
    type: integer
    description: Total occurrences across all media, ignoring the hidden-media exclusion filter. Equal to `matchCount` when no media exclusion is in effect.
    minimum: 0
    example: 5231
  media:
    type: array
    description: List of media containing this word
    items:
      $ref: "./WordMatchMedia.yaml"
