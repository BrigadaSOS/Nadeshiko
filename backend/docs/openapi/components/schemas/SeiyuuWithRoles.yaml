type: object
description: Seiyuu details with optional character appearances
required:
  - id
  - externalIds
  - nameJa
  - nameEn
  - imageUrl
  - characters
properties:
  id:
    type: integer
    description: AniList staff ID
    example: 95991
  externalIds:
    $ref: "./ExternalId.yaml"
  nameJa:
    type: string
    description: Japanese name of the voice actor
    example: "阿部敦"
  nameEn:
    type: string
    description: English name of the voice actor
    example: "Atsushi Abe"
  imageUrl:
    type: string
    format: uri
    description: Profile image URL
    example: "https://s4.anilist.co/file/anilistcdn/staff/large/n95991.jpg"
  characters:
    type: array
    description: Characters voiced by this seiyuu with their media appearances
    items:
      allOf:
        - $ref: "./Character.yaml"
        - type: object
          required:
            - media
            - role
          properties:
            media:
              $ref: "./Media.yaml"
            role:
              type: string
              enum: [MAIN, SUPPORTING, BACKGROUND]
              description: Character role in this media
              example: MAIN
