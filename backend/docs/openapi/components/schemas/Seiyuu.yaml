type: object
description: Japanese voice actor (seiyuu)
required:
  - id
  - externalIds
  - nameJa
  - nameEn
  - imageUrl
properties:
  id:
    type: integer
    description: Internal seiyuu ID
    example: 1
  externalIds:
    $ref: "./ExternalId.yaml"
  nameJa:
    type: string
    description: Japanese name of the voice actor
    example: "阿部敦"
  nameEn:
    type: string
    description: English name of the voice actor
    example: "Atsushi Abe"
  imageUrl:
    type: string
    format: uri
    description: Profile image URL
    example: "https://s4.anilist.co/file/anilistcdn/staff/large/n95991.jpg"
