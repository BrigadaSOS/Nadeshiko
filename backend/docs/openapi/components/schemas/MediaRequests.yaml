# Media Request Schemas
# Shared field definitions using YAML anchors

MediaFields: &mediaFields
  externalIds:
    $ref: "./ExternalId.yaml"
  nameJa:
    type: string
    description: Original Japanese name of the media
    example: "バクマン。"
  nameRomaji:
    type: string
    description: Romaji transliteration of the media name
    example: "Bakuman."
  nameEn:
    type: string
    description: English name of the media
    example: "Bakuman."
  airingFormat:
    type: string
    description: Format of the media release (e.g., TV, OVA, Movie)
    example: "TV"
  airingStatus:
    type: string
    description: Current airing status (FINISHED, RELEASING, NOT_YET_RELEASED, CANCELLED)
    example: "FINISHED"
  genres:
    type: array
    items:
      type: string
    description: List of genres associated with the media
    example: ["Comedy", "Drama", "Romance", "Slice of Life"]
  storage:
    type: string
    enum: [LOCAL, R2]
    description: Storage backend for media assets
    example: "R2"
    default: "R2"
  startDate:
    type: string
    format: date
    description: Start date of the media (first airing/release)
    example: "2010-10-02"
  endDate:
    type: string
    format: date
    description: End date of the media (last airing/release)
    example: "2011-04-02"
  category:
    type: string
    enum: [ANIME, JDRAMA]
    description: Media category
    example: "ANIME"
  version:
    type: string
    description: Version of the media-sub-splitter used
    example: "6"
  hashSalt:
    type: string
    description: Hash salt used when generating the hash for the related media assets
    example: "ba0cbe173ed310528f16130273662a60"
  studio:
    type: string
    description: Animation studio that produced the media
    example: "J.C.STAFF"
  seasonName:
    type: string
    description: Airing season label for the media
    example: "FALL"
  seasonYear:
    type: integer
    description: Airing year for the media
    example: 2010
  storageBasePath:
    type: string
    description: Base path for R2/CDN storage (e.g. "media/21459")
    example: "media/21459"
  characters:
    type: array
    items:
      $ref: "./CharacterInput.yaml"
    description: List of characters appearing in the media with their voice actors
    default: []

# Update-only field (segmentCount)
SegmentCountField: &segmentCountField
  segmentCount:
    type: integer
    description: Total number of subtitle segments available
    example: 1234

MediaCreateRequest:
  type: object
  description: Request body for creating a new media entry
  required:
    - nameJa
    - nameRomaji
    - nameEn
    - airingFormat
    - airingStatus
    - genres
    - storage
    - startDate
    - category
    - version
    - hashSalt
    - studio
    - seasonName
    - seasonYear
  properties:
    <<: *mediaFields

MediaUpdateRequest:
  type: object
  description: Request body for updating an existing media entry (all fields optional)
  properties:
    <<: *mediaFields
    <<: *segmentCountField
