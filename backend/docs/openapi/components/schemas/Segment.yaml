type: object
required:
  - id
  - uuid
  - position
  - status
  - startTime
  - endTime
  - ja
  - en
  - es
  - isNsfw
  - episode
  - mediaId
  - storage
  - hashedId
properties:
  id:
    type: integer
    description: Auto-generated segment ID
    example: 12345
  uuid:
    type: string
    description: Unique identifier for the segment
    example: "3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e"
  position:
    type: integer
    description: Position of the segment within the episode
    example: 1133
  status:
    type: string
    enum: [DELETED, ACTIVE, SUSPENDED, VERIFIED, INVALID, TOO_LONG]
    description: Segment status
    example: "ACTIVE"
  startTime:
    type: string
    description: Timestamp in H:MM:SS.ffffff format indicating when the segment starts
    example: "0:33:27.255000"
  endTime:
    type: string
    description: Timestamp in H:MM:SS.ffffff format indicating when the segment ends
    example: "0:33:28.464000"
  ja:
    $ref: "./JapaneseContent.yaml"
  en:
    $ref: "./TranslationContent.yaml"
  es:
    $ref: "./TranslationContent.yaml"
  isNsfw:
    type: boolean
    description: Whether the segment contains NSFW content
    example: false
  imageUrl:
    type: string
    nullable: true
    description: URL to segment screenshot/image (generated from storage + hashedId)
    example: "https://cdn.nadeshiko.co/media/7674/1/0d39e46b14.webp"
  audioUrl:
    type: string
    nullable: true
    description: URL to segment audio file (generated from storage + hashedId)
    example: "https://cdn.nadeshiko.co/media/7674/1/0d39e46b14.mp3"
  videoUrl:
    type: string
    nullable: true
    description: URL to segment video file (generated from storage + hashedId)
    example: "https://cdn.nadeshiko.co/media/7674/1/0d39e46b14.mp4"
  episode:
    type: integer
    description: Episode number this segment belongs to
    example: 1
  mediaId:
    type: integer
    description: Media ID this segment belongs to
    example: 7674
  storage:
    type: string
    enum: [LOCAL, R2]
    description: Storage backend for segment assets
    example: "R2"
  hashedId:
    type: string
    description: Hash identifier for the segment
    example: "0d39e46b14"
  morphemes:
    type: array
    nullable: true
    items:
      $ref: './Morpheme.yaml'
    description: Morphological analysis of the Japanese content
