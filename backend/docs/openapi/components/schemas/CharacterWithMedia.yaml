description: Character with voice actor and all media appearances
allOf:
  - $ref: "./Character.yaml"
  - type: object
    required:
      - seiyuu
      - mediaAppearances
    properties:
      seiyuu:
        $ref: "./Seiyuu.yaml"
      mediaAppearances:
        type: array
        description: All media this character appears in
        items:
          type: object
          required:
            - media
            - role
          properties:
            media:
              $ref: "./Media.yaml"
            role:
              type: string
              enum: [MAIN, SUPPORTING, BACKGROUND]
              description: Character role in this media
              example: MAIN
