type: object
required:
  - type
  - mediaPublicId
  - episodeNumber
properties:
  type:
    type: string
    enum: [EPISODE]
    description: Report target type
    example: "EPISODE"
  mediaPublicId:
    type: string
    description: publicId of the media this report targets
    example: "V1StGXR8_Z5d"
  episodeNumber:
    type: integer
    description: Episode number this report targets
    example: 5
