type: object
required:
  - status
properties:
  status:
    type: string
    enum: [OPEN, PROCESSING, FIXED, DISMISSED]
    description: New status for all matching reports
    example: "DISMISSED"
  adminNotes:
    type: string
    maxLength: 1000
    description: Optional admin notes to set on all matching reports
  filters:
    type: object
    description: Filters to select which reports to update. If omitted, updates all reports.
    properties:
      status:
        type: string
        description: >
          Filter by current report status. Accepts a single value or comma-separated list
          (e.g. "OPEN,PROCESSING").
      source:
        type: string
        enum: [USER, AUTO]
        description: Filter by report source
      targetType:
        type: string
        enum: [SEGMENT, EPISODE, MEDIA]
        description: Filter by target type
      targetMediaId:
        type: integer
        description: Filter by target media ID
      targetEpisodeNumber:
        type: integer
        description: Filter by target episode number
      targetSegmentId:
        type: integer
        description: Filter by target segment ID
      auditRunId:
        type: integer
        description: Filter by audit run ID
      orphaned:
        type: boolean
        description: Only update reports whose target media no longer exists
