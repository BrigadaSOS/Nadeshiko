type: object
required:
  - ids
  - status
properties:
  ids:
    type: array
    items:
      type: integer
    minItems: 1
    maxItems: 100
    description: Report IDs to update
    example: [1, 2, 3]
  status:
    $ref: "../schemas/ReportStatus.yaml"
  adminNotes:
    type: string
    maxLength: 1000
    description: Optional admin notes to set on all selected reports
