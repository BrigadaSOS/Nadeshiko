type: object
description: |
  Search request. All fields are optional — omit `query` for queryless browse (segments matching filters only).
properties:
  query:
    $ref: "../schemas/SearchQuery.yaml"
  take:
    type: integer
    description: Max number of entries per response
    default: 10
    minimum: 1
    maximum: 50
  cursor:
    type: string
    description: Opaque cursor token returned from the previous search page
    maxLength: 500
    example: eyJraW...N119
  sort:
    $ref: "../schemas/SearchSort.yaml"
  filters:
    $ref: "../schemas/SearchFilters.yaml"
  include:
    type: array
    description: Optional resources to expand in the response `includes` block
    items:
      $ref: "../schemas/IncludeExpansion.yaml"
    default: []
