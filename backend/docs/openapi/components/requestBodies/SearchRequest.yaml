type: object
properties:
  query:
    type: object
    description: What to search for (omit for queryless browse)
    properties:
      search:
        type: string
        description: Search expression (supports boolean operators, wildcards, phrase matching)
        example: "(猫 OR 犬) AND 好き"
      exactMatch:
        type: boolean
        description: Whether to use exact phrase matching
        default: false
  limit:
    type: integer
    description: Max amount of entries by response
    default: 10
  cursor:
    type: array
    description: Current page of search
    items:
      type: number
    example: [23.31727, 7]
  sort:
    type: object
    description: Sort configuration
    properties:
      mode:
        type: string
        description: Sort mode
        enum: [ASC, DESC, NONE, TIME_ASC, TIME_DESC, RANDOM]
        default: NONE
      seed:
        type: integer
        description: Non-negative integer seed for deterministic random sorting (only used when mode is RANDOM)
        minimum: 0
        example: 42
  filters:
    $ref: "../schemas/SearchFilters.yaml"
  include:
    type: array
    description: Resources to expand in the response includes block
    items:
      $ref: "../schemas/IncludeExpansion.yaml"
    default: [media]
