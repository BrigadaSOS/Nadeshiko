type: object
required:
  - target
  - reason
properties:
  target:
    $ref: "../schemas/UserReportTarget.yaml"
  reason:
    type: string
    enum:
      - WRONG_TRANSLATION
      - WRONG_TIMING
      - WRONG_AUDIO
      - NSFW_NOT_TAGGED
      - DUPLICATE_SEGMENT
      - WRONG_METADATA
      - MISSING_EPISODES
      - WRONG_COVER_IMAGE
      - INAPPROPRIATE_CONTENT
      - OTHER
    description: Reason for the report
    example: "WRONG_TRANSLATION"
  description:
    type: string
    maxLength: 1000
    description: Optional description with additional details
    example: "The translation doesn't match the spoken Japanese"
