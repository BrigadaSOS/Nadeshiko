type: object
required:
  - media
  - categories
properties:
  media:
    type: array
    items:
      $ref: "../schemas/MediaSearchStats.yaml"
  categories:
    type: array
    items:
      $ref: "../schemas/CategoryCount.yaml"
  includes:
    type: object
    description: Optional related resources requested via `include[]`
    properties:
      media:
        type: object
        additionalProperties:
          $ref: "../schemas/Media.yaml"
        description: Media objects keyed by mediaPublicId. Present only when `include[]=media` is requested.
