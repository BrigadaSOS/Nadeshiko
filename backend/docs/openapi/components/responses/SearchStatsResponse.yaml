type: object
required:
  - media
  - categories
  - includes
properties:
  media:
    type: array
    items:
      $ref: "../schemas/MediaSearchStats.yaml"
  categories:
    type: array
    items:
      $ref: "../schemas/CategoryCount.yaml"
  includes:
    type: object
    required:
      - media
    properties:
      media:
        type: object
        additionalProperties:
          $ref: "../schemas/Media.yaml"
        description: Media objects keyed by mediaId
