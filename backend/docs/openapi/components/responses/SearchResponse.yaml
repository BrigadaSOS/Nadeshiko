type: object
required:
  - segments
  - includes
  - pagination
properties:
  segments:
    type: array
    items:
      $ref: "../schemas/segment/Segment.yaml"
  includes:
    type: object
    required:
      - media
    properties:
      media:
        type: object
        additionalProperties:
          $ref: "../schemas/Media.yaml"
        description: Media objects keyed by mediaId
  pagination:
    $ref: "../schemas/PaginationInfo.yaml"
