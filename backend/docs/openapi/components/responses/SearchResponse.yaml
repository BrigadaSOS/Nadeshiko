type: object
required:
  - segments
  - pagination
properties:
  segments:
    type: array
    items:
      $ref: "../schemas/segment/Segment.yaml"
  includes:
    type: object
    description: Optional related resources requested via `include[]`
    properties:
      media:
        type: object
        additionalProperties:
          $ref: "../schemas/Media.yaml"
        description: Media objects keyed by mediaPublicId. Present only when `include[]=media` is requested.
  pagination:
    $ref: "../schemas/SearchPagination.yaml"
