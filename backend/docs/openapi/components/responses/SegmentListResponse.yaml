description: Paginated segment list response
content:
  application/json:
    schema:
      type: object
      required:
        - segments
        - pagination
      properties:
        segments:
          type: array
          items:
            $ref: "../schemas/segment/Segment.yaml"
          description: Array of segment objects
        pagination:
          $ref: "../schemas/CursorPagination.yaml"
