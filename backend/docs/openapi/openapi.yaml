openapi: 3.1.0
info:
  title: Nadeshiko API
  description: |
    Thank you for using the Nadeshiko API! This API lets you search Japanese dialogue segments across anime and J-Drama, with translations and contextual metadata.

    ### Authentication
    All API requests require an API key passed as a Bearer token. You can register and generate your key on the [developer page](https://nadeshiko.co/user/developer), where you can also check your current usage.

    ### Rate Limit
    Each API key is limited to **150 requests per minute**. Exceeding this limit will return a `429 Too Many Requests` response.

    ### Quota
    Each account has a monthly quota of **5,000 requests**. Once exceeded, further requests will be rejected until the next month.
    To request a quota increase, reach out via the [contact page](https://nadeshiko.co/about).

  version: 2.0.4
  contact:
    name: Nadeshiko Team
    url: https://nadeshiko.co
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html
  x-logo:
    url: ./logo.png
    altText: Nadeshiko
    href: https://nadeshiko.co

servers:
  - description: Production server
    url: https://api.nadeshiko.co

tags:
  - name: Search
    description: |
      Search endpoints for querying Japanese segments across indexed media.

  - name: Admin
    x-internal: true
    description: |
      Administrative endpoints for system management, queue monitoring, and automated review.

  - name: Media
    description: |
      Media CRUD endpoints for managing anime and J-Drama entries, episodes, segments, characters, and seiyuu.

  - name: User
    x-internal: true
    description: |
      User endpoints for account data including quota, preferences, activity history, reports, and data export.

  - name: Collections
    x-internal: true
    description: |
      Collection endpoints for managing saved segment collections.

paths:
  # Search endpoints
  "/v1/search":
    $ref: "./paths/search/v1_search.yaml"
  "/v1/search/stats":
    $ref: "./paths/search/v1_search_stats.yaml"
  "/v1/search/words":
    $ref: "./paths/search/v1_search_words.yaml"
  # Media endpoints
  "/v1/media":
    $ref: "./paths/media/v1_media.yaml"
  "/v1/media/autocomplete":
    $ref: "./paths/media/v1_media_autocomplete.yaml"

  # Segment standalone UUID query (static prefix before {id})
  "/v1/media/segments/{uuid}":
    $ref: "./paths/media/v1_media_segments_uuid.yaml"
  "/v1/media/segments/{uuid}/context":
    $ref: "./paths/media/v1_media_segments_uuid_context.yaml"
  "/v1/media/segments/{uuid}/revisions":
    $ref: "./paths/media/v1_media_segments_uuid_revisions.yaml"

  # Series endpoints (static prefix before {id})
  "/v1/media/series":
    $ref: "./paths/media/v1_media_series.yaml"
  "/v1/media/series/{id}":
    $ref: "./paths/media/v1_media_series_id.yaml"
  "/v1/media/series/{id}/media":
    $ref: "./paths/media/v1_media_series_id_media.yaml"
  "/v1/media/series/{id}/media/{mediaId}":
    $ref: "./paths/media/v1_media_series_id_media_mediaId.yaml"

  # Character endpoints (static prefix before {id})
  "/v1/media/characters/{id}":
    $ref: "./paths/media/v1_media_characters_id.yaml"

  # Seiyuu endpoints (static prefix before {id})
  "/v1/media/seiyuu/{id}":
    $ref: "./paths/media/v1_media_seiyuu_id.yaml"

  # Parameterized media route — MUST come after all static /v1/media/* routes
  "/v1/media/{id}":
    $ref: "./paths/media/v1_media_id.yaml"

  # Episode endpoints (nested under media)
  "/v1/media/{mediaId}/episodes":
    $ref: "./paths/media/v1_media_mediaId_episodes.yaml"
  "/v1/media/{mediaId}/episodes/{episodeNumber}":
    $ref: "./paths/media/v1_media_mediaId_episodes_episodeNumber.yaml"

  # Segment endpoints (nested under episodes)
  "/v1/media/{mediaId}/episodes/{episodeNumber}/segments":
    $ref: "./paths/media/v1_media_mediaId_episodes_episodeNumber_segments.yaml"
  "/v1/media/{mediaId}/episodes/{episodeNumber}/segments/batch":
    $ref: "./paths/media/v1_media_mediaId_episodes_episodeNumber_segments_batch.yaml"
  "/v1/media/{mediaId}/episodes/{episodeNumber}/segments/{id}":
    $ref: "./paths/media/v1_media_mediaId_episodes_episodeNumber_segments_id.yaml"

  # User endpoints
  "/v1/user/quota":
    $ref: "./paths/user/v1_user_quota.yaml"
  "/v1/user/reports":
    $ref: "./paths/user/v1_user_reports.yaml"
  "/v1/user/preferences":
    $ref: "./paths/user/v1_user_preferences.yaml"
  "/v1/user/activity":
    $ref: "./paths/user/v1_user_activity.yaml"
  "/v1/user/activity/heatmap":
    $ref: "./paths/user/v1_user_activity_heatmap.yaml"
  "/v1/user/activity/stats":
    $ref: "./paths/user/v1_user_activity_stats.yaml"
  "/v1/user/activity/date/{date}":
    $ref: "./paths/user/v1_user_activity_date_date.yaml"
  "/v1/user/activity/{id}":
    $ref: "./paths/user/v1_user_activity_id.yaml"
  "/v1/user/export":
    $ref: "./paths/user/v1_user_export.yaml"
  "/v1/user/labs":
    $ref: "./paths/user/v1_user_labs.yaml"
  "/v1/user/labs/{key}":
    $ref: "./paths/user/v1_user_labs_key.yaml"

  # Collection endpoints
  "/v1/collections":
    $ref: "./paths/collections/v1_collections.yaml"
  "/v1/collections/{id}":
    $ref: "./paths/collections/v1_collections_id.yaml"
  "/v1/collections/{id}/segments":
    $ref: "./paths/collections/v1_collections_id_segments.yaml"
  "/v1/collections/{id}/segments/{segmentId}":
    $ref: "./paths/collections/v1_collections_id_segments_segmentId.yaml"
  "/v1/collections/{id}/search":
    $ref: "./paths/collections/v1_collections_id_search.yaml"
  "/v1/collections/{id}/stats":
    $ref: "./paths/collections/v1_collections_id_stats.yaml"

  # Admin endpoints
  "/v1/admin/dashboard":
    $ref: "./paths/admin/v1_admin_dashboard.yaml"
  "/v1/admin/dashboard/overview":
    $ref: "./paths/admin/v1_admin_dashboard_overview.yaml"
  "/v1/admin/dashboard/media":
    $ref: "./paths/admin/v1_admin_dashboard_media.yaml"
  "/v1/admin/dashboard/activity":
    $ref: "./paths/admin/v1_admin_dashboard_activity.yaml"
  "/v1/admin/dashboard/collections":
    $ref: "./paths/admin/v1_admin_dashboard_collections.yaml"
  "/v1/admin/dashboard/api-keys":
    $ref: "./paths/admin/v1_admin_dashboard_api_keys.yaml"
  "/v1/admin/dashboard/system":
    $ref: "./paths/admin/v1_admin_dashboard_system.yaml"
  "/v1/admin/health":
    $ref: "./paths/admin/v1_admin_health.yaml"
  "/v1/admin/reindex":
    $ref: "./paths/admin/v1_admin_reindex.yaml"
  "/v1/admin/queues/stats":
    $ref: "./paths/admin/v1_admin_queues_stats.yaml"
  "/v1/admin/queues/{queueName}":
    $ref: "./paths/admin/v1_admin_queues__queueName_.yaml"
  "/v1/admin/queues/{queueName}/failed":
    $ref: "./paths/admin/v1_admin_queues__queueName__failed.yaml"
  "/v1/admin/queues/{queueName}/retry":
    $ref: "./paths/admin/v1_admin_queues__queueName__retry.yaml"
  "/v1/admin/queues/{queueName}/purge":
    $ref: "./paths/admin/v1_admin_queues__queueName__purge.yaml"
  "/v1/admin/impersonation":
    $ref: "./paths/admin/v1_admin_impersonation.yaml"
  "/v1/admin/reports":
    $ref: "./paths/admin/v1_admin_reports.yaml"
  "/v1/admin/reports/batch":
    $ref: "./paths/admin/v1_admin_reports_batch.yaml"
  "/v1/admin/reports/{id}":
    $ref: "./paths/admin/v1_admin_reports_id.yaml"
  "/v1/admin/media/audits":
    $ref: "./paths/admin/v1_admin_media_audits.yaml"
  "/v1/admin/media/audits/{name}":
    $ref: "./paths/admin/v1_admin_media_audits_name.yaml"
  "/v1/admin/media/audits/{name}/run":
    $ref: "./paths/admin/v1_admin_media_audits_name_run.yaml"
  "/v1/admin/media/audits/runs":
    $ref: "./paths/admin/v1_admin_media_audits_runs.yaml"
  "/v1/admin/media/audits/runs/{id}":
    $ref: "./paths/admin/v1_admin_media_audits_runs_id.yaml"
  "/v1/admin/announcement":
    $ref: "./paths/admin/v1_admin_announcement.yaml"

components:
  securitySchemes:
    ApiKey:
      type: http
      scheme: bearer
      bearerFormat: APIKey
      description: API key authentication via Authorization Bearer header

    SessionCookie:
      type: apiKey
      in: cookie
      name: nadeshiko.session_token
      description: Session authentication via cookie







