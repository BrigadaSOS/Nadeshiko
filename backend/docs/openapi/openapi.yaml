openapi: 3.1.0
info:
  title: Nadeshiko API
  description: |
    Thank you for using the Nadeshiko API! This API lets you search Japanese dialogue segments across anime and J-Drama, with translations and contextual metadata.

    ### Authentication
    All public API requests require an API key passed in the `Authorization` header as `Bearer <api_key>`.
    You can register and generate your key on the [developer page](https://nadeshiko.co/user/developer), where you can also check your current usage.

    ### Request Headers
    The only required application-level request header for the public API is:

    - `Authorization: Bearer <api_key>`

    Public API endpoints do not currently expose custom request ID or rate limit response headers.

    ### Rate Limit
    Each API key is limited to **150 requests per minute**. Exceeding this limit will return a `429 Too Many Requests` response.
    The `429` response body distinguishes between short-term rate limiting and monthly quota exhaustion.

    ### Quota
    Each account has a monthly quota of **5,000 requests**. Once exceeded, further requests will be rejected until the next month.
    To request a quota increase, reach out via the [contact page](https://nadeshiko.co/about).

