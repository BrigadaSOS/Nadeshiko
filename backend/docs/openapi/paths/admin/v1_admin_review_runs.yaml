get:
  tags:
    - Admin
  operationId: adminReviewRunIndex
  summary: List past check runs
  description: |
    Returns past review check runs with summary stats. Supports filtering by check name and cursor pagination.

    **Permissions:** `ADD_MEDIA`
  security:
    - apiKeyHeader: [ADD_MEDIA]
  parameters:
    - name: checkName
      in: query
      schema:
        type: string
      description: Filter by check name
    - name: cursor
      in: query
      schema:
        type: integer
      description: Cursor for pagination
    - name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
      description: Number of results per page
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - runs
              - pagination
            properties:
              runs:
                type: array
                items:
                  $ref: "../../components/schemas/ReviewCheckRun.yaml"
              pagination:
                $ref: "../../components/schemas/CursorPagination.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
