post:
  tags:
    - Admin
  x-internal: true
  operationId: impersonateAdminUser
  summary: Start admin impersonation
  description: |
    Creates an impersonation session for the target user.
    This endpoint is restricted to admin sessions and only available in local environment.
  security:
    - sessionCookie: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - userId
          properties:
            userId:
              type: integer
              minimum: 1
              description: User ID to impersonate
  responses:
    "200":
      description: Impersonation session created
      content:
        application/json:
          schema:
            type: object
            required:
              - message
              - user
            properties:
              message:
                type: string
              user:
                type: object
                required:
                  - id
                  - username
                  - email
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  email:
                    type: string
                    format: email
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  tags:
    - Admin
  x-internal: true
  operationId: clearAdminImpersonation
  summary: Clear admin impersonation
  description: |
    Clears the current impersonation session and related cookies.
    This endpoint is restricted to admin sessions and only available in local environment.
  security:
    - sessionCookie: []
  responses:
    "200":
      description: Impersonation session cleared
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
