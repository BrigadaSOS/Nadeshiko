patch:
  tags:
    - Admin
  x-internal: true
  operationId: updateAdminMediaAudit
  summary: Update a media audit config
  description: |
    Updates the threshold values or enabled status of an audit.

    **Permissions:** `ADD_MEDIA`
  security:
    - sessionCookie: []
  parameters:
    - name: name
      in: path
      required: true
      schema:
        type: string
      description: Audit name identifier
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            threshold:
              type: object
              description: New threshold values
              additionalProperties: true
            enabled:
              type: boolean
              description: Enable or disable this audit
  responses:
    "200":
      description: Audit updated successfully
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/MediaAudit.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedSession.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
