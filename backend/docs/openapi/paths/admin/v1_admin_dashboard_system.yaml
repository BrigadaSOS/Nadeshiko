get:
  tags:
    - Admin
  x-internal: true
  operationId: getAdminDashboardSystem
  summary: Get real-time system health
  description: |
    Returns real-time system health including Elasticsearch and database status,
    queue statistics, and index size.

  security:
    - SessionCookie: [ADMIN]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - status
              - app
              - elasticsearch
              - database
              - queues
            properties:
              status:
                type: string
                enum: [healthy, degraded]
              app:
                type: object
                required:
                  - version
                properties:
                  version:
                    type: string
              elasticsearch:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum: [connected, disconnected]
                  version:
                    type: string
                    nullable: true
                  clusterName:
                    type: string
                    nullable: true
                  clusterStatus:
                    type: string
                    nullable: true
                  indexName:
                    type: string
                    nullable: true
                  documentCount:
                    type: integer
                    nullable: true
                  indexSizeBytes:
                    type: integer
                    nullable: true
              database:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum: [connected, disconnected]
                  version:
                    type: string
                    nullable: true
              queues:
                type: array
                items:
                  type: object
                  required:
                    - queue
                    - stuckCount
                    - failedCount
                  properties:
                    queue:
                      type: string
                    stuckCount:
                      type: integer
                    failedCount:
                      type: integer
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
