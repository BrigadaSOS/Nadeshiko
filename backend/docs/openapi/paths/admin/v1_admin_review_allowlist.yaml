get:
  tags:
    - Admin
  operationId: listAdminReviewAllowlist
  summary: List allowlisted items
  description: |
    Returns all allowlisted items (media/episodes) that are excluded from auto-check runs.

    **Permissions:** `ADD_MEDIA`
  security:
    - apiKeyHeader: [ADD_MEDIA]
  parameters:
    - name: checkName
      in: query
      schema:
        type: string
      description: Filter by check name
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../components/schemas/ReviewAllowlist.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

post:
  tags:
    - Admin
  operationId: createAdminReviewAllowlistEntry
  summary: Add to allowlist
  description: |
    Adds a media or episode to the allowlist for a specific check, excluding it from future auto-check runs.

    **Permissions:** `ADD_MEDIA`
  security:
    - apiKeyHeader: [ADD_MEDIA]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - checkName
            - mediaId
          properties:
            checkName:
              type: string
              description: Check name to allowlist for
            mediaId:
              type: integer
              description: Media ID to allowlist
            episodeNumber:
              type: integer
              description: Episode number (for episode-level checks)
            reason:
              type: string
              description: Reason for allowlisting
  responses:
    "201":
      description: Added to allowlist
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ReviewAllowlist.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "409":
      $ref: "../../components/responses/Conflict.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
