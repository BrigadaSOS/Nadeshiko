post:
  tags:
    - Admin
  x-internal: true
  operationId: triggerReindex
  summary: Reindex segments into Elasticsearch
  description: |
    Reindexes segments from the PostgreSQL database into Elasticsearch.
    Allows filtering by specific media entries and episodes.

    **Behavior:**
    - If no filters provided, reindexes all segments
    - If `media` is provided, reindexes segments from those media entries
    - If a media item includes `episodes`, only those episodes are reindexed for that media

  security:
    - SessionCookie: [ADMIN]
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: "../../components/requestBodies/ReindexRequest.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/ReindexResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
