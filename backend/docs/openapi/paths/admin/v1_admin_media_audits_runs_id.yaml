get:
  tags:
    - Admin
  x-internal: true
  operationId: getAdminMediaAuditRun
  summary: Get audit run details
  description: |
    Returns a specific media audit run record with its linked reports.

  security:
    - SessionCookie: [ADMIN]
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: Run ID
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - run
              - reports
            properties:
              run:
                $ref: "../../components/schemas/MediaAuditRun.yaml"
              reports:
                type: array
                items:
                  $ref: "../../components/schemas/Report.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
