get:
  tags:
    - Admin
  x-internal: true
  operationId: getAdminDashboardCollections
  summary: Get collection statistics
  description: |
    Returns collection statistics by type and visibility, average collection size,
    and top collections by segment count.

  security:
    - SessionCookie: [ADMIN]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - totalCollections
              - byTypeAndVisibility
              - averageSize
              - topCollections
            properties:
              totalCollections:
                type: integer
              byTypeAndVisibility:
                type: array
                items:
                  type: object
                  required:
                    - type
                    - visibility
                    - count
                  properties:
                    type:
                      type: string
                    visibility:
                      type: string
                    count:
                      type: integer
              averageSize:
                type: number
              topCollections:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                    - type
                    - visibility
                    - segmentCount
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    type:
                      type: string
                    visibility:
                      type: string
                    segmentCount:
                      type: integer
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
