get:
  tags:
    - Admin
  x-internal: true
  operationId: listAdminQueueStats
  summary: Get queue statistics
  description: |
    Returns statistics for all ES sync queues including pending and failed job counts.

  security:
    - SessionCookie: [ADMIN]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              required:
                - queue
                - stuckCount
                - failedCount
              properties:
                queue:
                  type: string
                  example: "es-sync-create"
                stuckCount:
                  type: integer
                  description: Number of jobs currently pending/active
                  example: 5
                failedCount:
                  type: integer
                  description: Number of failed jobs
                  example: 2
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
