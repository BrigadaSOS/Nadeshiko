get:
  tags:
    - Admin
  x-internal: true
  operationId: listAdminReports
  summary: List all reports
  description: |
    Returns all reports with filtering and cursor pagination.
    Supports filtering by source (USER/AUTO) to separate user reports from auto-check findings.

    **Permissions:** `ADD_MEDIA`
  security:
    - SessionCookie: [ADMIN]
  parameters:
    - name: cursor
      in: query
      schema:
        type: string
      description: Opaque pagination cursor token
    - name: take
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
      description: Number of results per page
    - name: status
      in: query
      schema:
        type: string
      description: >
        Filter by report status. Accepts a single value or comma-separated list
        (e.g. "PENDING,ACCEPTED"). Valid values: PENDING, CONCERN, ACCEPTED, REJECTED, RESOLVED, IGNORED.
    - name: source
      in: query
      schema:
        type: string
        enum: [USER, AUTO]
      description: Filter by report source
    - name: target.type
      in: query
      schema:
        type: string
        enum: [SEGMENT, EPISODE, MEDIA]
      description: Filter by target type
    - name: target.mediaId
      in: query
      schema:
        type: integer
      description: Filter by target media ID
    - name: target.episodeNumber
      in: query
      schema:
        type: integer
      description: Filter by target episode number
    - name: target.segmentId
      in: query
      schema:
        type: integer
      description: Filter by target segment ID
    - name: auditRunId
      in: query
      schema:
        type: integer
      description: Filter by audit run ID
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/AdminReportListResponse.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedSession.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
