get:
  tags:
    - Admin
  operationId: getAdminReports
  summary: List all reports (admin)
  description: |
    Returns all reports with filtering and aggregation.
    Reports are grouped by target and sorted by report count descending.

    **Requirements:**
    - Required Scopes: `ADD_MEDIA` (admin-level permission)
  security:
    - apiKeyHeader: [ADD_MEDIA]
  parameters:
    - name: cursor
      in: query
      schema:
        type: integer
      description: Cursor for pagination (report ID to start after)
    - name: size
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
      description: Number of results per page
    - name: status
      in: query
      schema:
        type: string
        enum: [PENDING, ACCEPTED, REJECTED, RESOLVED]
      description: Filter by report status
    - name: reportType
      in: query
      schema:
        type: string
        enum: [SEGMENT, MEDIA]
      description: Filter by report type
    - name: targetId
      in: query
      schema:
        type: string
      description: Filter by target ID
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/AdminReportListResponse.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
