get:
  tags:
    - Admin
  operationId: adminReportIndex
  summary: List all reports
  description: |
    Returns all reports with filtering and cursor pagination.
    Supports filtering by source (USER/AUTO) to separate user reports from auto-check findings.

    **Permissions:** `ADD_MEDIA`
  security:
    - apiKeyHeader: [ADD_MEDIA]
  parameters:
    - name: cursor
      in: query
      schema:
        type: integer
      description: Cursor for pagination (report ID to start after)
    - name: size
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
      description: Number of results per page
    - name: status
      in: query
      schema:
        type: string
        enum: [PENDING, CONCERN, ACCEPTED, REJECTED, RESOLVED, IGNORED]
      description: Filter by report status
    - name: source
      in: query
      schema:
        type: string
        enum: [USER, AUTO]
      description: Filter by report source
    - name: targetType
      in: query
      schema:
        type: string
        enum: [SEGMENT, EPISODE, MEDIA]
      description: Filter by target type
    - name: targetMediaId
      in: query
      schema:
        type: integer
      description: Filter by target media ID
    - name: reviewCheckRunId
      in: query
      schema:
        type: integer
      description: Filter by review check run ID
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/AdminReportListResponse.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
