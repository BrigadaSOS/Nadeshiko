delete:
  tags:
    - Admin
  operationId: adminReviewAllowlistDestroy
  summary: Remove from allowlist
  description: |
    Removes an item from the review allowlist, re-enabling auto-checks for that media/episode.

    **Permissions:** `ADD_MEDIA`
  security:
    - apiKeyHeader: [ADD_MEDIA]
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: Allowlist entry ID
  responses:
    "204":
      description: Removed from allowlist
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
