get:
  tags:
    - Admin
  x-internal: true
  operationId: getAdminDashboard
  summary: Admin dashboard statistics
  description: |
    Returns at-a-glance statistics for the admin dashboard including media counts,
    user counts, and system health information.

    **Permissions:** `ADD_MEDIA`
  security:
    - apiKeyHeader: [ADD_MEDIA]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - media
              - users
              - activity
              - system
            properties:
              media:
                type: object
                required:
                  - totalMedia
                  - totalEpisodes
                  - totalSegments
                  - totalCharacters
                  - totalSeiyuu
                properties:
                  totalMedia:
                    type: integer
                  totalEpisodes:
                    type: integer
                  totalSegments:
                    type: integer
                  totalCharacters:
                    type: integer
                  totalSeiyuu:
                    type: integer
              users:
                type: object
                required:
                  - totalUsers
                  - recentlyRegisteredCount
                  - recentlyActiveCount
                properties:
                  totalUsers:
                    type: integer
                  recentlyRegisteredCount:
                    type: integer
                    description: Users registered in the last 30 days
                  recentlyActiveCount:
                    type: integer
                    description: Users active in the last 30 days
              activity:
                type: object
                required:
                  - totalSearches
                  - totalExports
                  - totalPlays
                  - totalCollectionAdds
                  - activeSearchers7d
                  - topQueries7d
                  - dailyActivity30d
                properties:
                  totalSearches:
                    type: integer
                  totalExports:
                    type: integer
                  totalPlays:
                    type: integer
                  totalCollectionAdds:
                    type: integer
                  activeSearchers7d:
                    type: integer
                    description: Unique users who searched in the last 7 days
                  topQueries7d:
                    type: array
                    items:
                      type: object
                      required:
                        - query
                        - count
                      properties:
                        query:
                          type: string
                        count:
                          type: integer
                  dailyActivity30d:
                    type: array
                    items:
                      type: object
                      required:
                        - date
                        - count
                      properties:
                        date:
                          type: string
                        count:
                          type: integer
              system:
                type: object
                required:
                  - status
                  - app
                  - elasticsearch
                  - database
                  - queues
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded]
                  app:
                    type: object
                    required:
                      - version
                    properties:
                      version:
                        type: string
                  elasticsearch:
                    type: object
                    required:
                      - status
                    properties:
                      status:
                        type: string
                        enum: [connected, disconnected]
                      version:
                        type: string
                        nullable: true
                      clusterName:
                        type: string
                        nullable: true
                      clusterStatus:
                        type: string
                        nullable: true
                      indexName:
                        type: string
                        nullable: true
                      documentCount:
                        type: integer
                        nullable: true
                  database:
                    type: object
                    required:
                      - status
                    properties:
                      status:
                        type: string
                        enum: [connected, disconnected]
                      version:
                        type: string
                        nullable: true
                  queues:
                    type: array
                    items:
                      type: object
                      required:
                        - queue
                        - stuckCount
                        - failedCount
                      properties:
                        queue:
                          type: string
                        stuckCount:
                          type: integer
                        failedCount:
                          type: integer
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
