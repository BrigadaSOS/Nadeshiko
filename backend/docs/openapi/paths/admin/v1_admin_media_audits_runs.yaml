get:
  tags:
    - Admin
  x-internal: true
  operationId: listAdminMediaAuditRuns
  summary: List past audit runs
  description: |
    Returns past media audit runs with summary stats. Supports filtering by audit name and cursor pagination.

  security:
    - SessionCookie: [ADMIN]
  parameters:
    - name: auditName
      in: query
      schema:
        type: string
      description: Filter by audit name
    - name: cursor
      in: query
      schema:
        type: string
      description: Opaque pagination cursor token
    - name: take
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
      description: Number of results per page
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - runs
              - pagination
            properties:
              runs:
                type: array
                items:
                  $ref: "../../components/schemas/MediaAuditRun.yaml"
              pagination:
                $ref: "../../components/schemas/OpaqueCursorPagination.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
