get:
  tags:
    - Admin
  x-internal: true
  operationId: getAdminDashboardOverview
  summary: Get dashboard overview statistics
  description: |
    Returns key metrics and daily activity for the admin dashboard overview tab.

  security:
    - SessionCookie: [ADMIN]
  parameters:
    - name: days
      in: query
      required: false
      schema:
        type: string
      description: Number of days for daily activity range (7, 30, or 90)
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - media
              - users
              - activity
            properties:
              media:
                type: object
                required:
                  - totalMedia
                  - totalEpisodes
                  - totalSegments
                  - totalCharacters
                  - totalSeiyuu
                properties:
                  totalMedia:
                    type: integer
                  totalEpisodes:
                    type: integer
                  totalSegments:
                    type: integer
                  totalCharacters:
                    type: integer
                  totalSeiyuu:
                    type: integer
              users:
                type: object
                required:
                  - totalUsers
                  - recentlyRegisteredCount
                  - recentlyActiveCount
                properties:
                  totalUsers:
                    type: integer
                  recentlyRegisteredCount:
                    type: integer
                    description: Users registered in the last 30 days
                  recentlyActiveCount:
                    type: integer
                    description: Users active in the last 30 days
              activity:
                type: object
                required:
                  - totalSearches
                  - totalExports
                  - totalPlays
                  - totalShares
                  - activeSearchers7d
                  - dailyActivity
                properties:
                  totalSearches:
                    type: integer
                  totalExports:
                    type: integer
                  totalPlays:
                    type: integer
                  totalShares:
                    type: integer
                  activeSearchers7d:
                    type: integer
                    description: Unique users who searched in the last 7 days
                  dailyActivity:
                    type: array
                    items:
                      type: object
                      required:
                        - date
                        - count
                      properties:
                        date:
                          type: string
                        count:
                          type: integer
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
