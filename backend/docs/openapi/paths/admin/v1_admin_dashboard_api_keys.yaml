get:
  tags:
    - Admin
  x-internal: true
  operationId: getAdminDashboardApiKeys
  summary: Get API key usage statistics
  description: |
    Returns all API keys with their current quota usage for the current billing period.

  security:
    - SessionCookie: [ADMIN]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - keys
            properties:
              keys:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - isActive
                    - requestCount
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                      nullable: true
                    hint:
                      type: string
                      nullable: true
                    isActive:
                      type: boolean
                    username:
                      type: string
                      nullable: true
                    email:
                      type: string
                      nullable: true
                    requestCount:
                      type: integer
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
