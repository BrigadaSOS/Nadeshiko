get:
  tags:
    - Admin
  x-internal: true
  operationId: getAdminQueue
  summary: Get detailed queue information
  description: |
    Returns live queue stats and queue metadata from PgBoss for a specific queue.

    **Queue names:**
    - `es-sync-create` - Jobs to create new segments in Elasticsearch
    - `es-sync-update` - Jobs to update existing segments
    - `es-sync-delete` - Jobs to delete segments

    **Permissions:** `ADD_MEDIA`
  security:
    - SessionCookie: [ADMIN]
  parameters:
    - name: queueName
      in: path
      required: true
      schema:
        type: string
        enum: [es-sync-create, es-sync-update, es-sync-delete]
      description: The name of the queue
      example: "es-sync-create"
  responses:
    "200":
      description: Queue details retrieved successfully
      content:
        application/json:
          schema:
            type: object
            required:
              - queue
              - stats
              - metadata
            properties:
              queue:
                type: string
                example: "es-sync-create"
              stats:
                type: object
                required: [deferred, queued, active, total]
                properties:
                  deferred:
                    type: integer
                    description: Jobs scheduled for future execution (`start_after > now()`)
                    example: 1
                  queued:
                    type: integer
                    description: Jobs currently queued and waiting to be processed
                    example: 10
                  active:
                    type: integer
                    description: Jobs currently being processed
                    example: 2
                  total:
                    type: integer
                    description: Total jobs currently stored in the queue table
                    example: 13
              metadata:
                type: object
                required:
                  - policy
                  - partition
                  - createdOn
                  - updatedOn
                  - singletonsActive
                  - table
                properties:
                  policy:
                    type: string
                    example: "standard"
                  partition:
                    type: boolean
                    example: false
                  deadLetter:
                    type: string
                    nullable: true
                  warningQueueSize:
                    type: integer
                    nullable: true
                  retryLimit:
                    type: integer
                    nullable: true
                    example: 5
                  retryDelay:
                    type: integer
                    nullable: true
                    description: Initial retry delay in seconds
                    example: 1
                  retryBackoff:
                    type: boolean
                    nullable: true
                    example: true
                  retryDelayMax:
                    type: integer
                    nullable: true
                  expireInSeconds:
                    type: integer
                    nullable: true
                    example: 3600
                  retentionSeconds:
                    type: integer
                    nullable: true
                    example: 86400
                  deleteAfterSeconds:
                    type: integer
                    nullable: true
                  createdOn:
                    type: string
                    format: date-time
                  updatedOn:
                    type: string
                    format: date-time
                  singletonsActive:
                    type: array
                    items:
                      type: string
                  table:
                    type: string
                    example: "job"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedSession.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
