post:
  tags:
    - User
  x-internal: true
  operationId: createUserReport
  summary: Create report
  description: |
    Submits a report for a segment or media entry.

  security:
    - SessionCookie: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/requestBodies/CreateReportRequest.yaml"
  responses:
    "201":
      description: Created
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Report.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
