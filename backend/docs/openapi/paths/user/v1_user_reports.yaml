post:
  tags:
    - User
  x-internal: true
  operationId: createUserReport
  summary: Create a new report
  description: |
    Submit a report for a segment or media entry.

    **Permissions:** Session authentication (cookie-based).
  security:
    - sessionCookie: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/requestBodies/CreateReportRequest.yaml"
  responses:
    "201":
      description: Report created successfully
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Report.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedSession.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
