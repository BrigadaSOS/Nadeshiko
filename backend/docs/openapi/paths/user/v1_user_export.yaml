get:
  tags:
    - User
  operationId: userExportShow
  summary: Export all user data
  description: |
    Returns a full JSON export of all user-related data for GDPR data portability.
    Includes profile, preferences, activity history, lists, and reports.

    **Permissions:** Session authentication (cookie-based).
  security:
    - sessionCookie: []
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - profile
              - preferences
              - activity
              - lists
              - reports
            properties:
              profile:
                type: object
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  email:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
              preferences:
                $ref: "../../components/schemas/UserPreferences.yaml"
              activity:
                type: array
                items:
                  $ref: "../../components/schemas/UserActivity.yaml"
              lists:
                type: array
                items:
                  type: object
              reports:
                type: array
                items:
                  type: object
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
