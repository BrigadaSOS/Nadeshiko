get:
  tags:
    - User
  x-internal: true
  operationId: exportUserData
  summary: Export all user data
  description: |
    Returns a full JSON export of all user-related data for GDPR data portability.
    Includes profile, preferences, activity history, collections, and reports.

    **Permissions:** Session authentication (cookie-based).
  security:
    - sessionCookie: []
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/UserExportResponse.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedSession.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
