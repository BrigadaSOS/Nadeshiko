get:
  tags:
    - User
  operationId: userActivityIndex
  summary: Get user activity history
  description: |
    Returns the authenticated user's activity history with cursor-based pagination.

    **Permissions:** Session authentication (cookie-based).
  security:
    - sessionCookie: []
  parameters:
    - name: cursor
      in: query
      schema:
        type: integer
      description: Cursor for pagination (activity ID to start after)
    - name: size
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
      description: Number of results per page
    - name: activityType
      in: query
      schema:
        $ref: "../../components/schemas/ActivityType.yaml"
      description: Filter by activity type
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - data
              - hasMore
            properties:
              data:
                type: array
                items:
                  $ref: "../../components/schemas/UserActivity.yaml"
              hasMore:
                type: boolean
              cursor:
                type: integer
                nullable: true
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  tags:
    - User
  operationId: userActivityDestroy
  summary: Clear user activity history
  description: |
    Deletes the authenticated user's activity history. Optionally filter by activity type.

    **Permissions:** Session authentication (cookie-based).
  security:
    - sessionCookie: []
  parameters:
    - name: activityType
      in: query
      schema:
        $ref: "../../components/schemas/ActivityType.yaml"
      description: Only clear activities of this type
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - message
              - deletedCount
            properties:
              message:
                type: string
              deletedCount:
                type: integer
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
