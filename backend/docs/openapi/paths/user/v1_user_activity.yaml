get:
  tags:
    - Activity
  operationId: listUserActivity
  summary: List user activity
  description: |
    Returns the authenticated user's activity history with cursor-based pagination.

  security:
    - ApiKey: [READ_ACTIVITY]
  parameters:
    - name: cursor
      in: query
      schema:
        type: string
      description: Opaque cursor token for keyset pagination
    - name: take
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Number of results per page
    - name: activityType
      in: query
      schema:
        $ref: "../../components/schemas/ActivityType.yaml"
      description: Filter by activity type
    - name: date
      in: query
      schema:
        type: string
        format: date
      description: Filter activities to a specific date (YYYY-MM-DD)
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - activities
              - pagination
            properties:
              activities:
                type: array
                items:
                  $ref: "../../components/schemas/UserActivity.yaml"
              pagination:
                $ref: "../../components/schemas/CursorPagination.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

post:
  tags:
    - User
  x-internal: true
  operationId: trackUserActivity
  summary: Track user activity
  description: |
    Records a user activity event (e.g. segment play). Fire-and-forget — always returns 204.

  security:
    - SessionCookie: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/UserActivityRequest.yaml"
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  tags:
    - User
  x-internal: true
  operationId: deleteUserActivity
  summary: Clear user activity
  description: |
    Deletes the authenticated user's activity history. Optionally filter by activity type.

  security:
    - SessionCookie: []
  parameters:
    - name: activityType
      in: query
      schema:
        $ref: "../../components/schemas/ActivityType.yaml"
      description: Only clear activities of this type
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/AffectedCountResponse.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
