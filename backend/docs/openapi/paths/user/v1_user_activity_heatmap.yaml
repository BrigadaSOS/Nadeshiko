get:
  tags:
    - Activity
  operationId: getUserActivityHeatmap
  summary: Get activity heatmap data
  description: |
    Returns daily activity counts for the authenticated user, grouped by date and activity type.
    Each day contains per-type counts that can be summed or filtered client-side.

  security:
    - ApiKey: [READ_ACTIVITY]
  parameters:
    - name: days
      in: query
      schema:
        type: integer
        default: 365
        minimum: 1
        maximum: 730
      description: Number of days to include in the heatmap
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - activityByDay
            properties:
              activityByDay:
                type: object
                additionalProperties:
                  $ref: "../../components/schemas/HeatmapDayCounts.yaml"
                description: Map of YYYY-MM-DD date strings to per-type activity counts
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
