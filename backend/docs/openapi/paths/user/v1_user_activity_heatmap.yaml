get:
  tags:
    - User
  x-internal: true
  operationId: getUserActivityHeatmap
  summary: Get activity heatmap data
  description: |
    Returns daily activity counts for the authenticated user, grouped by date and activity type.
    Each day contains per-type counts that can be summed or filtered client-side.

    **Permissions:** Session authentication (cookie-based).
  security:
    - SessionCookie: []
  parameters:
    - name: days
      in: query
      schema:
        type: integer
        default: 365
        maximum: 730
      description: Number of days to include in the heatmap
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - activityByDay
            properties:
              activityByDay:
                type: object
                additionalProperties:
                  $ref: "../../components/schemas/HeatmapDayCounts.yaml"
                description: Map of YYYY-MM-DD date strings to per-type activity counts
    "401":
      $ref: "../../components/responses/UnauthorizedSession.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
