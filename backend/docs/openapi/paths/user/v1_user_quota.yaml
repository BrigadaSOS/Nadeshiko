get:
  tags:
    - User
  operationId: getUserQuota
  summary: Get current monthly API quota
  description: |
    Returns the API quota usage for the current billing period.
    Accepts both session cookie and API key authentication.

    **Permissions:** Session authentication (cookie-based) or API key (`READ_MEDIA`).
  security:
    - sessionCookie: []
    - apiKeyHeader: [READ_MEDIA]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/UserQuotaResponse.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
