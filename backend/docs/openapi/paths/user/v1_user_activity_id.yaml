delete:
  tags:
    - User
  x-internal: true
  operationId: deleteUserActivityById
  summary: Delete a single activity record
  description: |
    Deletes a single activity record by ID for the authenticated user.

    **Permissions:** Session authentication (cookie-based).
  security:
    - sessionCookie: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: Activity record ID
  responses:
    "204":
      description: Activity deleted
    "401":
      $ref: "../../components/responses/UnauthorizedSession.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
