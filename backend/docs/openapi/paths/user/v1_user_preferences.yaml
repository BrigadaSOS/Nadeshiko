get:
  tags:
    - User
  x-internal: true
  operationId: getUserPreferences
  summary: Get user preferences
  description: |
    Returns the authenticated user's full preferences object.

  security:
    - SessionCookie: []
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/UserPreferences.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

patch:
  tags:
    - User
  x-internal: true
  operationId: updateUserPreferences
  summary: Update user preferences
  description: |
    Deep-merges a partial preferences update into the user's existing preferences.
    Only the provided keys are updated; all other keys are preserved.

  security:
    - SessionCookie: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/UserPreferences.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/UserPreferences.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
