get:
  tags:
    - Activity
  operationId: getUserActivityStats
  summary: Get user activity statistics
  description: |
    Returns aggregate statistics about the authenticated user's activity:
    total searches, exports, plays, list adds, shares, and top media.

  security:
    - ApiKey: [READ_ACTIVITY]
  parameters:
    - name: since
      in: query
      schema:
        type: string
        format: date
      description: Only count activities from this date onward (YYYY-MM-DD)
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/UserActivityStats.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
