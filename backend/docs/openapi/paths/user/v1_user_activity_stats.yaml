get:
  tags:
    - User
  x-internal: true
  operationId: getUserActivityStats
  summary: Get user activity statistics
  description: |
    Returns aggregate statistics about the authenticated user's activity:
    total searches, exports, plays, and top media.

  security:
    - SessionCookie: []
  parameters:
    - name: since
      in: query
      schema:
        type: string
        format: date
      description: Only count activities from this date onward (YYYY-MM-DD)
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - totalSearches
              - totalExports
              - totalPlays
              - totalListAdds
              - totalShares
              - topMedia
            properties:
              totalSearches:
                type: integer
              totalExports:
                type: integer
              totalPlays:
                type: integer
              totalListAdds:
                type: integer
              totalShares:
                type: integer
              topMedia:
                type: array
                items:
                  type: object
                  required:
                    - mediaId
                    - count
                  properties:
                    mediaId:
                      type: integer
                    count:
                      type: integer
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
