delete:
  tags:
    - User
  x-internal: true
  operationId: deleteUserActivityByDate
  summary: Delete all activity for a specific date
  description: |
    Deletes all activity records for the authenticated user on the given date.

  security:
    - SessionCookie: []
  parameters:
    - name: date
      in: path
      required: true
      schema:
        type: string
        format: date
      description: Date in YYYY-MM-DD format
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/AffectedCountResponse.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
