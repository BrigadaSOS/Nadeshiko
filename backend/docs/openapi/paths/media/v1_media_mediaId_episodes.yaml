get:
  operationId: listEpisodes
  x-order: 30
  tags:
    - Media
  summary: List episodes for a media
  description: |
    Returns a paginated list of episodes for a specific media.

  security:
    - ApiKey: [READ_MEDIA]
  parameters:
    - name: mediaPublicId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{12}$'
      description: Media public ID
      example: V1StGXR8_Z5d
    - name: take
      in: query
      required: false
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 100
      description: Maximum number of episodes to return
    - name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque pagination cursor token
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/EpisodeListResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

post:
  operationId: createEpisode
  x-internal: true
  tags:
    - Media
  summary: Create episode
  description: |
    Creates a new episode for a specific media.

  security:
    - ApiKey: [ADD_MEDIA]
  parameters:
    - name: mediaPublicId
      in: path
      required: true
      schema:
        type: string
      description: Media public ID
      example: V1StGXR8_Z5d
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/EpisodeCreateRequest.yaml"
  responses:
    "201":
      description: Created
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Episode.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "409":
      $ref: "../../components/responses/Conflict.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
