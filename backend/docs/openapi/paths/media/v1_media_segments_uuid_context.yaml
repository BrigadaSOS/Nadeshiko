get:
  tags:
    - Media
  operationId: getSegmentContext
  summary: Get surrounding context for a segment
  description: |
    Retrieves segments surrounding a specific segment within an episode.
    Returns segments both before and after the target, providing dialogue context for how a sentence is used.

    **Permissions:** `UPDATE_MEDIA` (API key) or admin session

  security:
    - ApiKey: [UPDATE_MEDIA]
    - SessionCookie: [ADMIN]
  parameters:
    - name: uuid
      in: path
      required: true
      schema:
        type: string
      description: Segment UUID
      example: "3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e"
    - name: take
      in: query
      schema:
        type: integer
        default: 3
        minimum: 1
        maximum: 30
      description: Number of segments to return before and after the target
    - name: contentRating
      in: query
      schema:
        type: array
        items:
          $ref: "../../components/schemas/ContentRating.yaml"
      description: Content ratings to include (omit for all ratings)
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/SegmentContextResponse.yaml"
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Error400.yaml"
          examples:
            ValidationFailed:
              $ref: "../../components/examples/ValidationFailed.yaml"
            InvalidJson:
              $ref: "../../components/examples/InvalidJson.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Error404.yaml"
          examples:
            NotFound:
              $ref: "../../components/examples/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
