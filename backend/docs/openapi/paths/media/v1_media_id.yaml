get:
  tags:
    - Media
  operationId: mediaShow
  summary: Get single media
  description: |
    Returns a single media entry by its ID with full metadata.

    **Permissions:** `READ_MEDIA`

  security:
    - apiKeyHeader: [READ_MEDIA]
  parameters:
    - name: id
      in: path
      required: true
      description: Media ID
      schema:
        type: integer
        example: 7674
    - name: include
      in: query
      description: Resources to expand in the media response (`media.characters` implies `media`)
      schema:
        type: array
        items:
          $ref: "../../components/schemas/MediaIncludeExpansion.yaml"
        default: [media]
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/MediaResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

patch:
  tags:
    - Media
  operationId: mediaUpdate
  x-internal: true
  summary: Update media
  description: |
    Updates an existing media entry. Only provided fields will be updated.

    **Permissions:** `UPDATE_MEDIA`

  security:
    - apiKeyHeader: [UPDATE_MEDIA]
  parameters:
    - name: id
      in: path
      required: true
      description: Media ID
      schema:
        type: integer
        example: 7674
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/MediaUpdateRequest.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/MediaResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  tags:
    - Media
  operationId: mediaDestroy
  x-internal: true
  summary: Delete media (soft delete)
  description: |
    Soft-deletes a media entry by setting the `deletedAt` timestamp. The media remains in the database but is excluded from query results.

    **Permissions:** `REMOVE_MEDIA`

  security:
    - apiKeyHeader: [REMOVE_MEDIA]
  parameters:
    - name: id
      in: path
      required: true
      description: Media ID
      schema:
        type: integer
        example: 7674
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
