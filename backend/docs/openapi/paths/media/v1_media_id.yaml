get:
  tags:
    - Media
  operationId: getMedia
  summary: Get single media
  description: |
    Returns a single media entry by its ID with full metadata.

  security:
    - ApiKey: [READ_MEDIA]
  parameters:
    - name: id
      in: path
      required: true
      description: Media public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
    - name: include
      in: query
      description: Resources to expand in the media response
      schema:
        type: array
        items:
          $ref: "../../components/schemas/MediaIncludeExpansion.yaml"
        default: []
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/MediaResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

patch:
  tags:
    - Media
  operationId: updateMedia
  x-internal: true
  summary: Update media
  description: |
    Updates an existing media entry. Only provided fields will be updated.

  security:
    - ApiKey: [UPDATE_MEDIA]
  parameters:
    - name: id
      in: path
      required: true
      description: Media public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/MediaUpdateRequest.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/MediaResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  tags:
    - Media
  operationId: deleteMedia
  x-internal: true
  summary: Delete media
  description: |
    Soft-deletes a media entry by setting the `deletedAt` timestamp. The media remains in the database but is excluded from query results.

  security:
    - ApiKey: [REMOVE_MEDIA]
  parameters:
    - name: id
      in: path
      required: true
      description: Media public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
