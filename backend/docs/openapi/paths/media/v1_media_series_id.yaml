get:
  tags:
    - Media
  operationId: getSeries
  summary: Get series details
  description: |
    Returns a series with all media entries sorted by position.

  security:
    - ApiKey: [READ_MEDIA]
  parameters:
    - name: id
      in: path
      required: true
      description: Series public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
    - name: include
      in: query
      description: Resources to expand in the series response
      schema:
        type: array
        items:
          $ref: "../../components/schemas/MediaIncludeExpansion.yaml"
        default: []
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/SeriesWithMedia.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

patch:
  tags:
    - Media
  operationId: updateSeries
  x-internal: true
  summary: Update series metadata
  description: |
    Updates series localized names.

  security:
    - ApiKey: [UPDATE_MEDIA]
  parameters:
    - name: id
      in: path
      required: true
      description: Series public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            nameJa:
              type: string
              description: Updated Japanese name
              example: "更新バクマン。シリーズ"
            nameRomaji:
              type: string
              description: Updated Romaji name
              example: "Updated Bakuman. Series"
            nameEn:
              type: string
              description: Updated English name
              example: "Updated Bakuman Series"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Series.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  tags:
    - Media
  operationId: deleteSeries
  x-internal: true
  summary: Delete series
  description: |
    Deletes a series and all its media associations.

  security:
    - ApiKey: [REMOVE_MEDIA]
  parameters:
    - name: id
      in: path
      required: true
      description: Series public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
