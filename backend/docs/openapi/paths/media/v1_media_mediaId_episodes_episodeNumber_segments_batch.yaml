post:
  tags:
    - Media
  operationId: createSegmentsBatch
  x-internal: true
  summary: Batch create segments
  description: |
    Creates multiple segments for a specific episode in a single request.
    Duplicate segments are silently skipped.

  security:
    - ApiKey: [ADD_MEDIA]
  parameters:
    - name: mediaPublicId
      in: path
      required: true
      schema:
        type: string
      description: publicId of the media
      example: "V1StGXR8_Z5d"
    - name: episodeNumber
      in: path
      required: true
      schema:
        type: integer
      description: Episode number
      example: 1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/segment/SegmentRequests.yaml#/SegmentBatchCreateRequest"
  responses:
    "201":
      $ref: "../../components/responses/SegmentBatchCreateResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
