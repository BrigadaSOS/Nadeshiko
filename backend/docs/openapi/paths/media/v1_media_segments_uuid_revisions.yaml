get:
  operationId: listSegmentRevisions
  x-internal: true
  tags:
    - Media
  summary: List segment revision history
  description: |
    Returns the revision history for a segment identified by UUID, ordered by most recent first.

    **Permissions:** `UPDATE_MEDIA` (API key) or admin session

  security:
    - ApiKey: [UPDATE_MEDIA]
    - SessionCookie: [ADMIN]
  parameters:
    - name: uuid
      in: path
      required: true
      schema:
        type: string
      description: Segment UUID
      example: "3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e"
  responses:
    "200":
      $ref: "../../components/responses/SegmentRevisionListResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
