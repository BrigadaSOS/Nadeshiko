get:
  tags:
    - Media
  operationId: autocompleteMedia
  x-internal: true
  summary: Autocomplete media by name
  description: |
    Returns a short list of media matching a name prefix or substring.
    Results are ranked by exact match, then prefix match, then contains match,
    and further sorted by name length.

  security:
    - ApiKey: [READ_MEDIA]
  parameters:
    - name: query
      in: query
      required: true
      description: Search term to match against media names (English, Japanese, romaji)
      schema:
        type: string
        minLength: 1
        pattern: '.*\S.*'
        example: steins
    - name: take
      in: query
      description: Maximum number of results to return
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 25
    - name: category
      in: query
      description: Filter by media category
      schema:
        type: string
        enum: [ANIME, JDRAMA]
        example: ANIME
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/MediaAutocompleteResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
