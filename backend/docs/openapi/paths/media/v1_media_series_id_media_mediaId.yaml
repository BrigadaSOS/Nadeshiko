patch:
  tags:
    - Media
  operationId: updateSeriesMedia
  x-internal: true
  summary: Update media position in series
  description: |
    Updates the position of a media entry in a series.

  security:
    - ApiKey: [UPDATE_MEDIA]
  parameters:
    - name: id
      in: path
      required: true
      description: Series public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
    - name: mediaId
      in: path
      required: true
      description: Media public ID
      schema:
        type: string
        example: "abc123def456"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - position
          properties:
            position:
              type: integer
              description: New position in the series (1-indexed)
              example: 2
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  tags:
    - Media
  operationId: removeMediaFromSeries
  x-internal: true
  summary: Remove media from series
  description: |
    Removes a media entry from a series.

  security:
    - ApiKey: [REMOVE_MEDIA]
  parameters:
    - name: id
      in: path
      required: true
      description: Series public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
    - name: mediaId
      in: path
      required: true
      description: Media public ID
      schema:
        type: string
        example: "abc123def456"
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
