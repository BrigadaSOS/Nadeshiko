post:
  tags:
    - Media
  operationId: addMediaToSeries
  x-internal: true
  summary: Add media to series
  description: |
    Adds a media entry to a series at a specific position.

    **Permissions:** `UPDATE_MEDIA`

  security:
    - ApiKey: [ADD_MEDIA]
    - SessionCookie: []
  parameters:
    - name: id
      in: path
      required: true
      description: Series public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - mediaId
            - position
          properties:
            mediaId:
              type: string
              description: Media public ID to add
              example: "abc123def456"
            position:
              type: integer
              description: Position in the series (1-indexed)
              example: 1
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
