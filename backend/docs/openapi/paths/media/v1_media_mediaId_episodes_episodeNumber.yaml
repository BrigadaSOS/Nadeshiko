get:
  operationId: getEpisode
  tags:
    - Media
  summary: Get single episode
  description: |
    Returns a specific episode by media ID and episode number.

  security:
    - ApiKey: [READ_MEDIA]
  parameters:
    - name: mediaId
      in: path
      required: true
      schema:
        type: string
      description: Public ID of the media
      example: "V1StGXR8_Z5d"
    - name: episodeNumber
      in: path
      required: true
      schema:
        type: integer
      description: Episode number
      example: 1
  responses:
    "200":
      $ref: "../../components/responses/EpisodeResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

patch:
  tags:
    - Media
  operationId: updateEpisode
  x-internal: true
  summary: Update episode
  description: |
    Updates an existing episode. Only provided fields will be updated.

  security:
    - ApiKey: [UPDATE_MEDIA]
  parameters:
    - name: mediaId
      in: path
      required: true
      schema:
        type: string
      description: Public ID of the media
      example: "V1StGXR8_Z5d"
    - name: episodeNumber
      in: path
      required: true
      schema:
        type: integer
      description: Episode number
      example: 1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/EpisodeUpdateRequest.yaml"
  responses:
    "200":
      $ref: "../../components/responses/EpisodeResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  tags:
    - Media
  operationId: deleteEpisode
  x-internal: true
  summary: Delete episode
  description: |
    Soft-deletes an episode. Segments are not cascade deleted — this only hides the episode from results.

  security:
    - ApiKey: [REMOVE_MEDIA]
  parameters:
    - name: mediaId
      in: path
      required: true
      schema:
        type: string
      description: Public ID of the media
      example: "V1StGXR8_Z5d"
    - name: episodeNumber
      in: path
      required: true
      schema:
        type: integer
      description: Episode number
      example: 1
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
