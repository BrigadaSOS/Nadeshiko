get:
  operationId: getSegment
  tags:
    - Media
  summary: Get single segment
  description: |
    Returns a specific segment by its ID within the media/episode hierarchy.

    **Permissions:** `READ_MEDIA`

  security:
    - ApiKey: [READ_MEDIA]
    - SessionCookie: []
  parameters:
    - name: mediaId
      in: path
      required: true
      schema:
        type: integer
      description: ID of the media
      example: 7674
    - name: episodeNumber
      in: path
      required: true
      schema:
        type: integer
      description: Episode number
      example: 1
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: Segment ID
      example: 12345
  responses:
    "200":
      $ref: "../../components/responses/SegmentResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

patch:
  operationId: updateSegment
  x-internal: true
  tags:
    - Media
  summary: Update segment
  description: |
    Updates an existing segment. Only provided fields will be updated.

    **Permissions:** `UPDATE_MEDIA`

  security:
    - ApiKey: [UPDATE_MEDIA]
    - SessionCookie: []
  parameters:
    - name: mediaId
      in: path
      required: true
      schema:
        type: integer
      description: ID of the media
      example: 7674
    - name: episodeNumber
      in: path
      required: true
      schema:
        type: integer
      description: Episode number
      example: 1
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: Segment ID
      example: 12345
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/segment/SegmentRequests.yaml#/SegmentUpdateRequest"
  responses:
    "200":
      $ref: "../../components/responses/SegmentInternalResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  tags:
    - Media
  operationId: deleteSegment
  x-internal: true
  summary: Delete segment
  description: |
    Soft-deletes a segment by setting its status to DELETED.

    **Permissions:** `REMOVE_MEDIA`

  security:
    - ApiKey: [REMOVE_MEDIA]
    - SessionCookie: []
  parameters:
    - name: mediaId
      in: path
      required: true
      schema:
        type: integer
      description: ID of the media
      example: 7674
    - name: episodeNumber
      in: path
      required: true
      schema:
        type: integer
      description: Episode number
      example: 1
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: Segment ID
      example: 12345
  responses:
    "204":
      description: Segment successfully deleted
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
