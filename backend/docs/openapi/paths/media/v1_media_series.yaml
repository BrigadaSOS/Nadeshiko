get:
  tags:
    - Media
  operationId: listSeries
  summary: List all series
  description: |
    Returns a paginated list of media series groupings.

  security:
    - ApiKey: [READ_MEDIA]
  parameters:
    - name: take
      in: query
      description: Number of results per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    - name: cursor
      in: query
      description: Opaque pagination cursor token
      schema:
        type: string
    - name: query
      in: query
      description: Case-insensitive search across English, Japanese, and Romaji names
      schema:
        type: string
        example: bakuman
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/SeriesListResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

post:
  tags:
    - Media
  operationId: createSeries
  x-internal: true
  summary: Create series
  description: |
    Creates a new media series grouping.

  security:
    - ApiKey: [ADD_MEDIA]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - nameJa
            - nameRomaji
            - nameEn
          properties:
            nameJa:
              type: string
              description: Japanese name of the series
              example: "バクマン。シリーズ"
            nameRomaji:
              type: string
              description: Romaji name of the series
              example: "Bakuman. Series"
            nameEn:
              type: string
              description: English name of the series
              example: "Bakuman Series"
  responses:
    "201":
      description: Created
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Series.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
