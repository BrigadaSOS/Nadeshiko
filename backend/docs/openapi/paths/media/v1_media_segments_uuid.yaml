get:
  tags:
    - Media
  operationId: getSegmentByUuid
  summary: Get segment by UUID or publicId
  description: |
    Returns a specific segment by its UUID or publicId. A shortcut alternative to the nested `/media/{mediaId}/episodes/{episodeNumber}/segments/{id}` path.

    Pass `include[]=ratingAnalysis` and/or `include[]=posAnalysis` to receive raw analysis fields alongside the standard segment data.

    **Permissions:** `UPDATE_MEDIA` (API key) or admin session

  security:
    - ApiKey: [UPDATE_MEDIA]
    - SessionCookie: [ADMIN]
  parameters:
    - name: uuid
      in: path
      required: true
      schema:
        type: string
      description: Segment UUID or publicId
      example: "3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e"
    - name: include
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum: [ratingAnalysis, posAnalysis, hashedId, storageBasePath, storage]
      style: form
      explode: true
      description: Additional internal fields to include in the response
  responses:
    "200":
      $ref: "../../components/responses/SegmentInternalResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

patch:
  operationId: updateSegmentByUuid
  x-internal: true
  tags:
    - Media
  summary: Update segment by UUID or publicId
  description: |
    Updates an existing segment identified by its UUID or publicId. Performs the lookup internally,
    then applies the update. Only provided fields will be updated.

    **Permissions:** `UPDATE_MEDIA`

  security:
    - ApiKey: [UPDATE_MEDIA]
    - SessionCookie: [ADMIN]
  parameters:
    - name: uuid
      in: path
      required: true
      schema:
        type: string
      description: Segment UUID or publicId
      example: "3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/segment/SegmentRequests.yaml#/SegmentUpdateRequest"
  responses:
    "200":
      $ref: "../../components/responses/SegmentInternalResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
