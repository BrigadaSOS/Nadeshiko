get:
  tags:
    - Media
  operationId: listMedia
  summary: List all media
  description: |
    Returns a paginated list of media with full metadata, including cover/banner images, episode counts, and genres.
    Supports filtering by category and text search.

    **Permissions:** `READ_MEDIA`

  security:
    - ApiKey: [READ_MEDIA]
    - SessionCookie: []
  parameters:
    - name: take
      in: query
      description: Number of results per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 40
    - name: cursor
      in: query
      description: Opaque pagination cursor token
      schema:
        type: string
    - name: category
      in: query
      description: Filter by media category
      schema:
        type: string
        enum: [ANIME, JDRAMA]
        example: ANIME
    - name: query
      in: query
      description: Search query for filtering media by name
      schema:
        type: string
        example: steins
    - name: include
      in: query
      description: Resources to expand in the media response
      schema:
        type: array
        items:
          $ref: "../../components/schemas/MediaIncludeExpansion.yaml"
        default: []
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/MediaListResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

post:
  tags:
    - Media
  operationId: createMedia
  x-internal: true
  summary: Create new media
  description: |
    Creates a new media entry in the database.

    **Permissions:** `ADD_MEDIA`

  security:
    - ApiKey: [ADD_MEDIA]
    - SessionCookie: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/MediaCreateRequest.yaml"
  responses:
    "201":
      description: Created
      content:
        application/json:
          schema:
            $ref: "../../components/responses/MediaResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "409":
      $ref: "../../components/responses/Conflict.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
