get:
  tags:
    - Media
  operationId: listMedia
  x-order: 10
  summary: List all media
  description: |
    Returns a paginated list of media with full metadata, including cover/banner images, episode counts, and genres.
    Supports filtering by category and text search.

  security:
    - ApiKey: [READ_MEDIA]
  parameters:
    - name: take
      in: query
      description: Number of results per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 40
    - name: cursor
      in: query
      description: Opaque pagination cursor token
      schema:
        type: string
    - name: category
      in: query
      description: Filter by media category
      schema:
        type: string
        enum: [ANIME, JDRAMA]
        example: ANIME
    - name: query
      in: query
      description: Search term to match against media names (English, Japanese, romaji)
      schema:
        type: string
        example: steins
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/MediaListResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

post:
  tags:
    - Media
  operationId: createMedia
  x-internal: true
  summary: Create media
  description: |
    Creates a new media entry in the database.

  security:
    - ApiKey: [ADD_MEDIA]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/requestBodies/MediaCreateRequest.yaml"
  responses:
    "201":
      description: Created
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Media.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "409":
      $ref: "../../components/responses/Conflict.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
