get:
  tags:
    - Collections
  operationId: collectionIndex
  summary: List user's collections
  description: |
    Returns all collections for the authenticated user. Can filter by visibility.

  security:
    - sessionCookie: []
  parameters:
    - name: visibility
      in: query
      description: Filter by visibility
      schema:
        type: string
        enum: [public, private]
        example: private
    - name: cursor
      in: query
      description: Cursor offset for pagination
      schema:
        type: integer
        minimum: 0
        example: 0
    - name: page
      in: query
      description: Page number (1-indexed)
      deprecated: true
      schema:
        type: integer
        default: 1
        minimum: 1
        example: 1
    - name: limit
      in: query
      description: Items per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
        example: 20
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/collection/CollectionListResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

post:
  tags:
    - Collections
  operationId: collectionCreate
  summary: Create collection
  description: |
    Creates a new segment collection for the authenticated user.

  security:
    - sessionCookie: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/collection/CollectionRequests.yaml"
  responses:
    "201":
      description: Created
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/collection/Collection.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
