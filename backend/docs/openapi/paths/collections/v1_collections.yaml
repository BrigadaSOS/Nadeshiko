get:
  tags:
    - Collections
  x-order: 10
  operationId: listCollections
  summary: List collections
  description: |
    Returns the authenticated user's collections. Can be filtered by visibility.

  security:
    - ApiKey: [READ_COLLECTIONS]
  parameters:
    - name: visibility
      in: query
      description: Filter by visibility
      schema:
        $ref: "../../components/schemas/CollectionVisibility.yaml"
    - name: cursor
      in: query
      description: Opaque pagination cursor token
      schema:
        type: string
        example: eyJraW5kIjoib2Zmc2V0Iiwic2tpcCI6MjB9
    - name: take
      in: query
      description: Items per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
        example: 20
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/collection/CollectionListResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

post:
  tags:
    - Collections
  x-order: 40
  operationId: createCollection
  summary: Create collection
  description: |
    Creates a new segment collection for the authenticated user.

  security:
    - ApiKey: [CREATE_COLLECTIONS]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/collection/CollectionRequests.yaml#/CollectionCreateRequest"
  responses:
    "201":
      description: Created
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/collection/Collection.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
