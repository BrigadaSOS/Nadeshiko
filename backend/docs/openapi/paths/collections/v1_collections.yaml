get:
  x-internal: true
  tags:
    - Collections
  operationId: listCollections
  summary: List user's collections
  description: |
    Returns all collections for the authenticated user. Can filter by visibility.

  security:
    - SessionCookie: []
  parameters:
    - name: visibility
      in: query
      description: Filter by visibility
      schema:
        type: string
        enum: [public, private]
        example: private
    - name: cursor
      in: query
      description: Opaque pagination cursor token
      schema:
        type: string
        example: eyJraW5kIjoib2Zmc2V0Iiwic2tpcCI6MjB9
    - name: take
      in: query
      description: Items per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
        example: 20
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/collection/CollectionListResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

post:
  x-internal: true
  tags:
    - Collections
  operationId: createCollection
  summary: Create collection
  description: |
    Creates a new segment collection for the authenticated user.

  security:
    - SessionCookie: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/collection/CollectionRequests.yaml"
  responses:
    "201":
      description: Created
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/collection/Collection.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
