patch:
  x-internal: true
  tags:
    - Collections
  operationId: updateCollectionSegment
  summary: Update segment in collection
  description: |
    Updates the note or position of a segment in a collection. Requires collection ownership.

  security:
    - SessionCookie: []
  parameters:
    - name: collectionPublicId
      in: path
      required: true
      description: Collection public ID
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{12}$'
        example: "V1StGXR8_Z5d"
    - name: segmentPublicId
      in: path
      required: true
      description: Segment public ID
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{12}$'
        example: V1StGXR8_Z5d
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/collection/CollectionRequests.yaml#/UpdateCollectionSegmentRequest"
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  tags:
    - Collections
  x-order: 70
  operationId: removeSegmentFromCollection
  summary: Remove segment from collection
  description: |
    Removes a segment from a collection. Requires collection ownership.

  security:
    - ApiKey: [DELETE_COLLECTIONS]
  parameters:
    - name: collectionPublicId
      in: path
      required: true
      description: Collection public ID
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{12}$'
        example: "V1StGXR8_Z5d"
    - name: segmentPublicId
      in: path
      required: true
      description: Segment public ID
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{12}$'
        example: V1StGXR8_Z5d
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
