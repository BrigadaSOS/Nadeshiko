patch:
  x-internal: true
  tags:
    - Collections
  operationId: updateCollectionSegment
  summary: Update segment in collection
  description: |
    Updates the note or position of a segment in a collection. Requires collection ownership.

  security:
    - SessionCookie: []
  parameters:
    - name: id
      in: path
      required: true
      description: Collection public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
    - name: segmentId
      in: path
      required: true
      description: Segment ID
      schema:
        type: integer
        example: 456
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            position:
              type: integer
              description: New position in the collection
              example: 2
            note:
              type: string
              nullable: true
              maxLength: 500
              description: Updated annotation
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedSession.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  x-internal: true
  tags:
    - Collections
  operationId: removeSegmentFromCollection
  summary: Remove segment from collection
  description: |
    Removes a segment from a collection. Requires collection ownership.

  security:
    - SessionCookie: []
  parameters:
    - name: id
      in: path
      required: true
      description: Collection public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
    - name: segmentId
      in: path
      required: true
      description: Segment ID
      schema:
        type: integer
        example: 456
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedSession.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
