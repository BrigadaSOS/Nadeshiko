get:
  tags:
    - Collections
  operationId: searchCollectionSegments
  summary: Search collection segments
  description: |
    Returns collection segments in search-response format with pagination.
    Reshapes the collection data: extracts segment results, includes media, computes pagination.

  security:
    - sessionCookie: []
  parameters:
    - name: id
      in: path
      required: true
      description: Collection ID
      schema:
        type: integer
        example: 123
    - name: cursor
      in: query
      description: Cursor offset for pagination
      schema:
        type: integer
        minimum: 0
        example: 0
    - name: limit
      in: query
      description: Items per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
        example: 20
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/SearchResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
