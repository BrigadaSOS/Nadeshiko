post:
  tags:
    - Collections
  x-order: 30
  operationId: searchCollectionSegments
  summary: Search segments in a collection
  description: |
    Searches within a collection.

    All search semantics, query parsing, sorting, filters, pagination, and `include`
    expansions behave the same as `/v1/search`, with one additional constraint:
    results are limited to segments already present in the target collection.

  security:
    - ApiKey: [READ_COLLECTIONS]
  parameters:
    - name: collectionPublicId
      in: path
      required: true
      description: Collection public ID
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{12}$'
        example: "V1StGXR8_Z5d"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/requestBodies/SearchRequest.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/SearchResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
