get:
  x-internal: true
  tags:
    - Collections
  operationId: getCollection
  summary: Get collection details
  description: |
    Returns a collection with paginated segments and their search result data.

  security:
    - sessionCookie: []
  parameters:
    - name: id
      in: path
      required: true
      description: Collection ID
      schema:
        type: integer
        example: 123
    - name: cursor
      in: query
      description: Opaque pagination cursor token for paginated segments
      schema:
        type: string
        example: eyJraW5kIjoib2Zmc2V0Iiwic2tpcCI6MjB9
    - name: take
      in: query
      description: Items per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
        example: 20
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/collection/CollectionWithSegments.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedSession.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

patch:
  x-internal: true
  tags:
    - Collections
  operationId: updateCollection
  summary: Update collection metadata
  description: |
    Updates collection name or visibility. Requires collection ownership.

  security:
    - sessionCookie: []
  parameters:
    - name: id
      in: path
      required: true
      description: Collection ID
      schema:
        type: integer
        example: 123
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name:
              type: string
              example: "Updated Collection Name"
            visibility:
              type: string
              enum: [PUBLIC, PRIVATE]
              example: PUBLIC
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/collection/Collection.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedSession.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  x-internal: true
  tags:
    - Collections
  operationId: deleteCollection
  summary: Delete collection
  description: |
    Deletes a collection and all its segment entries. Requires collection ownership.

  security:
    - sessionCookie: []
  parameters:
    - name: id
      in: path
      required: true
      description: Collection ID
      schema:
        type: integer
        example: 123
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedSession.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
