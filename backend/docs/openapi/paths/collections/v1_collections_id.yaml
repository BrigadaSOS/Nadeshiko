get:
  tags:
    - Collections
  x-order: 20
  operationId: getCollection
  summary: Get collection details
  description: |
    Returns collection metadata only.
    To query segments inside the collection, use
    `POST /v1/collections/{collectionPublicId}/search`.
    To add or remove saved segments, use the `/segments` endpoints.

  security:
    - ApiKey: [READ_COLLECTIONS]
  parameters:
    - name: collectionPublicId
      in: path
      required: true
      description: Collection public ID
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{12}$'
        example: "V1StGXR8_Z5d"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/collection/Collection.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

patch:
  x-internal: true
  tags:
    - Collections
  operationId: updateCollection
  summary: Update collection metadata
  description: |
    Updates collection name or visibility. Requires collection ownership.

  security:
    - SessionCookie: []
  parameters:
    - name: collectionPublicId
      in: path
      required: true
      description: Collection public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/collection/CollectionRequests.yaml#/CollectionUpdateRequest"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/collection/Collection.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  tags:
    - Collections
  x-order: 50
  operationId: deleteCollection
  summary: Delete collection
  description: |
    Deletes a collection and all its segment entries. Requires collection ownership.

  security:
    - ApiKey: [DELETE_COLLECTIONS]
  parameters:
    - name: collectionPublicId
      in: path
      required: true
      description: Collection public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
