post:
  tags:
    - Collections
  x-order: 60
  operationId: addSegmentToCollection
  summary: Add segment to collection
  description: |
    Adds a segment to a collection. Requires collection ownership.

  security:
    - ApiKey: [UPDATE_COLLECTIONS]
  parameters:
    - name: collectionPublicId
      in: path
      required: true
      description: Collection public ID
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{12}$'
        example: "V1StGXR8_Z5d"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/collection/CollectionRequests.yaml#/AddSegmentToCollectionRequest"
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
