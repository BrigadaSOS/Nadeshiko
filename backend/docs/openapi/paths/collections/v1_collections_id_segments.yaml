post:
  x-internal: true
  tags:
    - Collections
  operationId: addSegmentToCollection
  summary: Add segment to collection
  description: |
    Adds a segment to a collection. Requires collection ownership.

  security:
    - SessionCookie: []
  parameters:
    - name: id
      in: path
      required: true
      description: Collection public ID
      schema:
        type: string
        example: "V1StGXR8_Z5d"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - segmentId
          properties:
            segmentId:
              type: string
              description: Public ID or UUID of the segment to add
              example: "abc123def456"
            note:
              type: string
              maxLength: 500
              description: Optional annotation
  responses:
    "204":
      description: No Content
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
