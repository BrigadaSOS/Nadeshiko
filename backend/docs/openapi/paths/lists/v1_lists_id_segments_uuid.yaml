patch:
  tags:
    - Lists
  operationId: listUpdateSegment
  summary: Update segment in list
  description: |
    Updates the note or position of a segment in a list. Requires list ownership or admin.

  security:
    - apiKeyHeader: [UPDATE_LISTS]
    - sessionCookie: []
  parameters:
    - name: id
      in: path
      required: true
      description: List ID
      schema:
        type: integer
        example: 123
    - name: uuid
      in: path
      required: true
      description: Segment UUID
      schema:
        type: string
        example: "3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            position:
              type: integer
              description: New position in the list
              example: 2
            note:
              type: string
              nullable: true
              maxLength: 500
              description: Updated annotation
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Segment updated"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

delete:
  tags:
    - Lists
  operationId: listRemoveSegment
  summary: Remove segment from list
  description: |
    Removes a segment from a list. Requires list ownership or admin.

  security:
    - apiKeyHeader: [UPDATE_LISTS]
    - sessionCookie: []
  parameters:
    - name: id
      in: path
      required: true
      description: List ID
      schema:
        type: integer
        example: 123
    - name: uuid
      in: path
      required: true
      description: Segment UUID
      schema:
        type: string
        example: "3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Segment removed from list"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
