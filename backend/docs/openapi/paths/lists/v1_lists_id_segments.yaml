get:
  tags:
    - Lists
  operationId: listGetSegments
  summary: Get segments in list
  description: |
    Returns paginated segments in a segment list with full search result data.

    **Permissions:** `READ_LISTS`

  security:
    - apiKeyHeader: [READ_LISTS]
    - sessionCookie: []
  parameters:
    - name: id
      in: path
      required: true
      description: List ID
      schema:
        type: integer
        example: 123
    - name: page
      in: query
      description: Page number (1-indexed)
      schema:
        type: integer
        default: 1
        example: 1
    - name: limit
      in: query
      description: Items per page
      schema:
        type: integer
        default: 20
        example: 20
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ListWithSegments.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"

post:
  tags:
    - Lists
  operationId: listAddSegment
  summary: Add segment to list
  description: |
    Adds a segment to a segment list. Requires list ownership or admin.

    **Permissions:** `UPDATE_LISTS`

  security:
    - apiKeyHeader: [UPDATE_LISTS]
    - sessionCookie: []
  parameters:
    - name: id
      in: path
      required: true
      description: List ID
      schema:
        type: integer
        example: 123
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - segmentUuid
          properties:
            segmentUuid:
              type: string
              description: UUID of the segment to add
              example: "3fd94cef-a3e1-31ae-bc8d-e743f03e9c7e"
            note:
              type: string
              maxLength: 500
              description: Optional annotation
  responses:
    "201":
      description: Created
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Segment added to list"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "409":
      $ref: "../../components/responses/Conflict.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
