post:
  tags:
    - Stats
  x-internal: true
  operationId: triggerCoveredWordsUpdate
  summary: Trigger word coverage update
  description: |
    Re-checks word coverage by querying Elasticsearch for all words in the frequency table.
    Can optionally only check currently uncovered words (faster for incremental updates after adding new media).

  security:
    - SessionCookie: [ADMIN]

  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            maxRank:
              type: integer
              default: 999999
              description: Maximum frequency rank to check (defaults to all words)
            onlyUncovered:
              type: boolean
              default: false
              description: Only check words that currently have zero matches (faster for incremental updates)

  responses:
    "200":
      description: Coverage update result
      content:
        application/json:
          schema:
            type: object
            required:
              - wordsChecked
              - newlyCovered
              - totalCovered
              - percentage
            properties:
              wordsChecked:
                type: integer
              newlyCovered:
                type: integer
              totalCovered:
                type: integer
              percentage:
                type: number
                format: float
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Error500.yaml"
