post:
  tags:
    - Stats
  x-internal: true
  operationId: triggerCoveredWordsUpdate
  summary: Trigger word coverage update
  description: |
    Re-checks word coverage by querying Elasticsearch for all words in the frequency table.
    Can optionally only check currently uncovered words (faster for incremental updates after adding new media).

  security:
    - SessionCookie: [ADMIN]

  requestBody:
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/CoveredWordsUpdateRequest.yaml"

  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/CoveredWordsUpdateResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
