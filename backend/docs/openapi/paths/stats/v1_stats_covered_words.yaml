get:
  tags:
    - Stats
  x-internal: true
  operationId: getCoveredWords
  summary: List words with coverage information
  description: |
    Returns a paginated list of words from the frequency list within a given
    tier, with optional filtering by coverage status.

  security:
    - ApiKey: [READ_MEDIA]

  parameters:
    - name: tier
      in: query
      required: true
      description: Frequency tier (max rank) to query
      schema:
        type: integer
        minimum: 1
    - name: minRank
      in: query
      description: Minimum rank (exclusive). Use to query a slice, e.g. minRank=1000&tier=2000 for ranks 1001-2000.
      schema:
        type: integer
        default: 0
        minimum: 0
    - name: filter
      in: query
      description: Filter by coverage status
      schema:
        type: string
        enum: [ALL, COVERED, UNCOVERED]
        default: ALL
    - name: cursor
      in: query
      description: Opaque pagination cursor returned from the previous page
      schema:
        type: string
    - name: take
      in: query
      description: Number of results per page
      schema:
        type: integer
        default: 200
        minimum: 1
        maximum: 1000

  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/CoveredWordsResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
