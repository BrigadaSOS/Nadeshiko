get:
  tags:
    - Stats
  operationId: getStatsOverview
  summary: Get corpus statistics overview
  description: |
    Returns a comprehensive overview of corpus statistics including headline numbers,
    word frequency coverage tiers, and translation availability. This is the primary
    data source for the public /stats page.

  security:
    - ApiKey: [READ_MEDIA]

  responses:
    "200":
      description: Corpus statistics overview
      content:
        application/json:
          schema:
            type: object
            required:
              - totalSegments
              - totalEpisodes
              - totalMedia
              - totalFrequencyWords
              - dialogueHours
              - tiers
              - lastUpdated
              - translations
            properties:
              totalSegments:
                type: integer
                description: Total number of active segments in the corpus
                example: 1200000
              totalEpisodes:
                type: integer
                description: Total number of episodes
                example: 8500
              totalMedia:
                type: integer
                description: Total number of media entries
                example: 350
              totalFrequencyWords:
                type: integer
                description: Total number of words in the frequency list
                example: 215900
              dialogueHours:
                type: number
                format: float
                description: Total hours of Japanese dialogue (subtitle coverage time)
                example: 2450.5
              tiers:
                type: array
                items:
                  $ref: "../../components/schemas/WordCoverageTier.yaml"
              lastUpdated:
                type: string
                format: date-time
                nullable: true
                description: When the word coverage data was last updated
              translations:
                type: object
                required:
                  - total
                  - enHuman
                  - enMachine
                  - esHuman
                  - esMachine
                properties:
                  total:
                    type: integer
                    description: Total active segments
                    example: 1200000
                  enHuman:
                    type: integer
                    description: Segments with human English translations
                    example: 800000
                  enMachine:
                    type: integer
                    description: Segments with machine English translations
                    example: 350000
                  esHuman:
                    type: integer
                    description: Segments with human Spanish translations
                    example: 200000
                  esMachine:
                    type: integer
                    description: Segments with machine Spanish translations
                    example: 400000
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Error500.yaml"
