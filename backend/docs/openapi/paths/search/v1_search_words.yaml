post:
  tags:
    - Search
  operationId: searchWords
  x-order: 30
  summary: Search by multiple words
  description: |
    Searches for multiple words simultaneously and aggregates matches per media.

    Unlike the main search endpoint, this returns a per-word summary of matches across media rather than individual segments. Filters apply the same way as `/v1/search`.

  security:
    - ApiKey: [READ_MEDIA]

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/requestBodies/SearchMultipleRequest.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/SearchMultipleResponse.yaml"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
