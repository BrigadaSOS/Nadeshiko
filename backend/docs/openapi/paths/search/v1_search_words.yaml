post:
  tags:
    - Search
  operationId: searchWords
  summary: Search by multiple words
  description: |
    Searches for multiple words simultaneously and aggregates results by media.

    Unlike the main search endpoint, this returns a summary of matches per media rather than individual segments.

  security:
    - ApiKey: [READ_MEDIA]

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/requestBodies/SearchMultipleRequest.yaml"
        example:
          words: ["彼女", "私"]
          exactMatch: false
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/SearchMultipleResponse.yaml"
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Error400.yaml"
          examples:
            ValidationFailed:
              $ref: "../../components/examples/ValidationFailed.yaml"
            InvalidJson:
              $ref: "../../components/examples/InvalidJson.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
