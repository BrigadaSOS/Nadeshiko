post:
  tags:
    - Search
  operationId: getSearchStats
  summary: Get search statistics
  description: |
    Returns statistics for search filters and category tabs without fetching segment rows.

    This endpoint is optimized for UI filter panels:
    - `media` powers the media dropdown on the right side.
    - `categories` powers category tabs below the search bar.

    The stats are scoped by query and category filters, but are not narrowed by a selected media/episode.

    **Requirements**
    - API Key with `READ_MEDIA` permission

  requestBody:
    content:
      application/json:
        schema:
          $ref: "../../components/requestBodies/SearchStatsRequest.yaml"
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../components/responses/SearchStatsResponse.yaml"
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Error.yaml"
          examples:
            ValidationFailed:
              $ref: "../../components/examples/ValidationFailed.yaml"
            InvalidJson:
              $ref: "../../components/examples/InvalidJson.yaml"
    "401":
      $ref: "../../components/responses/UnauthorizedApiKey.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/TooManyRequests.yaml"
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
