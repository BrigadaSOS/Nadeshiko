<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{subject}}</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.5;
        color: #1a1a1a;
        margin: 0;
        padding: 32px 16px;
        background-color: #f0f1f3;
      }
      .wrapper {
        max-width: 552px;
        margin: 0 auto;
      }
      .card {
        background-color: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .card-header {
        background-color: #ef5552;
        padding: 20px 32px;
      }
      .card-header table {
        border-collapse: collapse;
      }
      .card-header img {
        width: 32px;
        height: 32px;
        border-radius: 7px;
        display: block;
      }
      .card-header-title {
        font-size: 18px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.01em;
        padding-left: 14px;
      }
      .card-body {
        padding: 28px 32px 24px;
      }
      .card-title {
        font-size: 20px;
        font-weight: 700;
        color: #111827;
        margin: 0 0 12px;
        letter-spacing: -0.02em;
      }
      .card-text {
        font-size: 15px;
        color: #4b5563;
        margin: 0 0 16px;
      }
      .announcement-body {
        margin: 16px 0;
        padding: 16px 20px;
        background-color: #f9f9f9;
        border-radius: 8px;
        border-left: 4px solid #ef5552;
        font-size: 15px;
        color: #4b5563;
      }
      .hint-text {
        font-size: 13px;
        color: #9ca3af;
        margin: 16px 0 0;
      }
      .card-footer {
        background-color: #f9fafb;
        border-top: 1px solid #f0f0f0;
        padding: 14px 32px;
        font-size: 12px;
        color: #9ca3af;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <div class="card-header">
          <table role="presentation"><tr>
            <td style="vertical-align: middle;"><img src="{{logoUrl}}" alt="Nadeshiko" /></td>
            <td style="vertical-align: middle;" class="card-header-title">Nadeshiko</td>
          </tr></table>
        </div>

        <div class="card-body">
          <p class="card-text">Hi <strong>{{username}}</strong>,</p>
          <p class="card-title">{{subject}}</p>
          <div class="announcement-body">{{message}}</div>
          <p class="hint-text">If you have any questions, reach us at <a href="mailto:support@nadeshiko.co" style="color: #ef5552; text-decoration: none;">support@nadeshiko.co</a>.</p>
        </div>

        <div class="card-footer">
          &copy; {{year}} Nadeshiko
        </div>
      </div>
    </div>
  </body>
</html>
