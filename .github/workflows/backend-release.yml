name: Backend Release

on:
  push:
    tags:
      - 'backend-v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nadeshiko-prod
          aws-region: eu-north-1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend dependencies
        run: cd backend && bun install --frozen-lockfile

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#backend-v}"
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver tag: ${RELEASE_TAG}"
            exit 1
          fi
          bun run release:check-version "${VERSION}" --backend

      - name: Generate OpenAPI spec
        run: |
          cd backend
          bun run docs:bundle
          test -f docs/generated/openapi.yaml

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          files: backend/docs/generated/openapi.yaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/brigadasos/nadeshiko-backend-prod:${{ github.sha }}
            ghcr.io/brigadasos/nadeshiko-backend-prod:latest
          labels: |
            service=nadeshiko-backend-prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Install Kamal from fork
        run: |
          git clone --depth 1 https://github.com/davafons/kamal.git /tmp/kamal
          cd /tmp/kamal
          gem build kamal.gemspec
          gem install kamal-*.gem

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Prepare secrets for CI
        run: |
          sed -i 's/$(gh auth token)/$GITHUB_TOKEN/' backend/.kamal/secrets.prod
          sed -i 's/--account nadeshiko-prod //' backend/.kamal/secrets.prod

      - name: Deploy backend to prod
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh-keyscan -H $(grep -oP '(?<=ssh )[\w.-]+' backend/config/deploy.prod.yml || true) >> ~/.ssh/known_hosts 2>/dev/null || true
          cd backend
          kamal deploy -d prod --skip-push

  dispatch-sdk-ts:
    needs: release
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Dispatch TypeScript SDK release
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          gh api repos/BrigadaSOS/nadeshiko-sdk-ts/dispatches \
            -f event_type='backend_release' \
            -f client_payload[release_channel]="stable" \
            -f client_payload[backend_sha]="${GITHUB_SHA}"

  dispatch-sdk-python:
    needs: release
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Dispatch Python SDK release
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          gh api repos/BrigadaSOS/nadeshiko-sdk-python/dispatches \
            -f event_type='backend_release' \
            -f client_payload[release_channel]="stable" \
            -f client_payload[backend_sha]="${GITHUB_SHA}"
