name: Backend Release

on:
  push:
    tags:
      - 'backend-v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend dependencies
        run: cd backend && bun install --frozen-lockfile

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#backend-v}"
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver tag: ${RELEASE_TAG}"
            exit 1
          fi
          bun run release:check-version "${VERSION}" --backend

      - name: Generate OpenAPI spec
        run: |
          cd backend
          bun run docs:bundle
          test -f docs/generated/openapi.yaml

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          files: backend/docs/generated/openapi.yaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/brigadasos/nadeshiko-backend-prod:${{ github.sha }}
            ghcr.io/brigadasos/nadeshiko-backend-prod:latest
          labels: |
            service=nadeshiko-backend-prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Kamal
        run: gem install kamal

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy backend to prod
        env:
          KAMAL_SECRETS: ${{ secrets.KAMAL_SECRETS_PROD }}
        run: |
          set -euo pipefail

          ssh-keyscan -H $(grep -oP '(?<=ssh )[\w.-]+' backend/config/deploy.prod.yml || true) >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "${KAMAL_SECRETS}" > backend/.kamal/secrets.prod
          cd backend
          kamal deploy -d prod --skip-push

      - name: Dispatch SDK release
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "SDK_REPO_DISPATCH_TOKEN is required."
            exit 1
          fi

          VERSION="${RELEASE_TAG#backend-v}"
          SPEC_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/openapi.yaml"

          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/BrigadaSOS/nadeshiko-sdk-ts/dispatches \
            -d "{\"event_type\":\"backend_release\",\"client_payload\":{\"version\":\"${VERSION}\",\"release_tag\":\"${RELEASE_TAG}\",\"prerelease\":false,\"spec_url\":\"${SPEC_URL}\",\"backend_sha\":\"${{ github.sha }}\",\"backend_repo\":\"${{ github.repository }}\"}}"
