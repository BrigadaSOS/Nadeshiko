name: "[Prod] Release"

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release-backend:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nadeshiko-prod
          aws-region: eu-north-1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend dependencies
        run: cd backend && bun install --frozen-lockfile

      - name: Get latest release tag
        id: get-tag
        run: |
          set -euo pipefail
          RELEASE_TAG=$(git describe --tags --abbrev=0)
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          VERSION="${RELEASE_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ steps.get-tag.outputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver tag: ${RELEASE_TAG}"
            exit 1
          fi
          bun run release:check-version "${VERSION}"

      - name: Generate OpenAPI specs
        run: |
          cd backend
          bun run docs:bundle
          test -f docs/generated/openapi.yaml
          redocly bundle public -o ./docs/generated/openapi-public.yaml --remove-unused-components
          test -f docs/generated/openapi-public.yaml

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get-tag.outputs.tag }}
          name: ${{ steps.get-tag.outputs.tag }}
          prerelease: false
          generate_release_notes: true
          files: backend/docs/generated/openapi-public.yaml

      - name: Fetch build secrets from AWS SSM
        run: |
          SENTRY_AUTH_TOKEN=$(aws ssm get-parameter --name "/nadeshiko/prod/SENTRY_AUTH_TOKEN" --with-decryption --query 'Parameter.Value' --output text)
          echo "::add-mask::${SENTRY_AUTH_TOKEN}"
          echo "SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/brigadasos/nadeshiko-backend-prod:${{ github.sha }}
            ghcr.io/brigadasos/nadeshiko-backend-prod:latest
          labels: |
            service=nadeshiko-backend-prod
          secrets: |
            SENTRY_AUTH_TOKEN=${{ env.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: nadeshiko

      - name: Configure SSH over Tailscale
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<'EOF'
          Host nadeshiko
            ProxyCommand tailscale nc %h %p
          EOF
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/config

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Install Kamal from fork
        run: |
          git clone --depth 1 https://github.com/davafons/kamal.git /tmp/kamal
          cd /tmp/kamal
          gem build kamal.gemspec
          gem install kamal-*.gem


      - name: Prepare secrets for CI
        run: |
          sed -i 's/$(gh auth token)/$GITHUB_TOKEN/' backend/.kamal/secrets.prod
          sed -i 's/--account nadeshiko-prod //' backend/.kamal/secrets.prod

      - name: Deploy backend to prod
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh-keyscan -H nadeshiko >> ~/.ssh/known_hosts 2>/dev/null || true
          cd backend
          kamal deploy -d prod --skip-push

  release-frontend:
    needs: release-backend
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nadeshiko-prod
          aws-region: eu-north-1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/brigadasos/nadeshiko-frontend-prod:${{ github.sha }}
            ghcr.io/brigadasos/nadeshiko-frontend-prod:latest
          labels: |
            service=nadeshiko-frontend-prod
          build-args: |
            NUXT_PUBLIC_ENVIRONMENT=prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: nadeshiko

      - name: Configure SSH over Tailscale
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<'EOF'
          Host nadeshiko
            ProxyCommand tailscale nc %h %p
          EOF
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/config

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Install Kamal from fork
        run: |
          git clone --depth 1 https://github.com/davafons/kamal.git /tmp/kamal
          cd /tmp/kamal
          gem build kamal.gemspec
          gem install kamal-*.gem


      - name: Prepare secrets for CI
        run: |
          sed -i 's/$(gh auth token)/$GITHUB_TOKEN/' frontend/.kamal/secrets.prod
          sed -i 's/--account nadeshiko-prod //' frontend/.kamal/secrets.prod

      - name: Deploy frontend to prod
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh-keyscan -H nadeshiko >> ~/.ssh/known_hosts 2>/dev/null || true
          cd frontend
          kamal deploy -d prod --skip-push

  e2e:
    needs: release-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nadeshiko-prod
          aws-region: eu-north-1

      - name: Fetch E2E secrets from AWS SSM
        run: |
          E2E_USER_PASSWORD=$(aws ssm get-parameter --name "/nadeshiko/prod/E2E_USER_PASSWORD" --with-decryption --query 'Parameter.Value' --output text)
          echo "::add-mask::${E2E_USER_PASSWORD}"
          echo "E2E_USER_PASSWORD=${E2E_USER_PASSWORD}" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          cd frontend
          npm install @playwright/test
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          cd frontend
          npx playwright test --config=e2e/playwright.config.ts
        env:
          E2E_BASE_URL: https://nadeshiko.co

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-prod
          path: frontend/playwright-report/
          retention-days: 14

  dispatch-sdk-ts:
    needs: release-backend
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Dispatch TypeScript SDK release
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          gh api repos/BrigadaSOS/nadeshiko-sdk-ts/dispatches \
            -f event_type='backend_release' \
            -f client_payload[release_channel]="stable" \
            -f client_payload[backend_sha]="${GITHUB_SHA}"

  dispatch-sdk-python:
    needs: release-backend
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Dispatch Python SDK release
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          gh api repos/BrigadaSOS/nadeshiko-sdk-python/dispatches \
            -f event_type='backend_release' \
            -f client_payload[release_channel]="stable" \
            -f client_payload[backend_sha]="${GITHUB_SHA}"
