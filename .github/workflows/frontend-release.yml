name: Frontend Release

on:
  push:
    tags:
      - 'frontend-v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#frontend-v}"
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver tag: ${RELEASE_TAG}"
            exit 1
          fi
          bun run release:check-version "${VERSION}" --frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/brigadasos/nadeshiko-frontend-prod:${{ github.sha }}
            ghcr.io/brigadasos/nadeshiko-frontend-prod:latest
          labels: |
            service=nadeshiko-frontend-prod
          build-args: |
            NUXT_PUBLIC_ENVIRONMENT=prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Kamal
        run: gem install kamal

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy frontend to prod
        env:
          KAMAL_SECRETS: ${{ secrets.KAMAL_SECRETS_FRONTEND_PROD }}
        run: |
          set -euo pipefail

          ssh-keyscan -H $(grep -oP '(?<=ssh )[\w.-]+' frontend/config/deploy.prod.yml || true) >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "${KAMAL_SECRETS}" > frontend/.kamal/secrets.prod
          cd frontend
          kamal deploy -d prod --skip-push

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
