name: Backend Check

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'backend/**'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

  openapi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint OpenAPI spec
        run: bunx @redocly/cli lint

      - name: Bundle OpenAPI spec
        run: bun run docs:bundle

      - name: Validate bundled spec
        run: bunx @redocly/cli lint docs/generated/openapi.yaml --skip-rule no-unused-components

      - name: Check codegen is up to date
        run: |
          bun run generate:all
          if ! git diff --exit-code generated/; then
            echo "::error::Generated code is out of date. Run 'bun run generate:all' and commit the result."
            exit 1
          fi

      - name: Extract base branch OpenAPI spec
        if: github.base_ref == 'main'
        run: |
          git fetch origin main --depth=1
          git show origin/main:backend/docs/generated/openapi.yaml > /tmp/openapi-base.yaml

      - name: Check for breaking API changes
        if: github.base_ref == 'main'
        uses: oasdiff/oasdiff-action/breaking@main
        with:
          base: /tmp/openapi-base.yaml
          revision: backend/docs/generated/openapi.yaml
          fail-on: ERR
