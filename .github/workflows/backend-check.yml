name: Backend Check

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'backend/**'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

  test:
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nadeshiko_test
          POSTGRES_USER: nadeshiko
          POSTGRES_PASSWORD: nadeshiko
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: nadeshiko
      POSTGRES_PASSWORD: nadeshiko
      POSTGRES_DB: nadeshiko_test
      BASE_URL: http://localhost:3000
      LOG_LEVEL: silent
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run db:migrate

      - name: Run tests
        run: bun test --coverage

  openapi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint OpenAPI spec
        run: bun run lint:openapi

      - name: Regenerate API artifacts
        run: |
          bun run generate:api
          bun run generate:bruno
          bun run lint:openapi:bundled

      - name: Check OpenAPI artifacts are up to date
        run: |
          if ! git diff --exit-code -- generated docs/generated/openapi.yaml ":(literal)docs/bruno/[Generated] API"; then
            echo "::error::OpenAPI artifacts are out of date. Run 'bun run generate:api && bun run generate:bruno && bun run lint:openapi:bundled' and commit results."
            exit 1
          fi

      - name: Extract base branch OpenAPI spec
        if: github.base_ref == 'main'
        run: |
          git fetch origin main --depth=1
          git show origin/main:backend/docs/generated/openapi.yaml > /tmp/openapi-base.yaml

      - name: Check for breaking API changes
        if: github.base_ref == 'main'
        uses: oasdiff/oasdiff-action/breaking@main
        with:
          base: /tmp/openapi-base.yaml
          revision: backend/docs/generated/openapi.yaml
          fail-on: ERR
