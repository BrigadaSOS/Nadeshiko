name: "[Dev] Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      openapi: ${{ steps.filter.outputs.openapi }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            openapi:
              - 'backend/docs/openapi/**'

  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nadeshiko-dev
          aws-region: eu-north-1

      - name: Fetch build secrets from AWS SSM
        run: |
          SENTRY_AUTH_TOKEN=$(aws ssm get-parameter --name "/nadeshiko/dev/SENTRY_AUTH_TOKEN" --with-decryption --query 'Parameter.Value' --output text)
          echo "::add-mask::${SENTRY_AUTH_TOKEN}"
          echo "SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/brigadasos/nadeshiko-backend-dev:${{ github.sha }}
            ghcr.io/brigadasos/nadeshiko-backend-dev:latest
          labels: |
            service=nadeshiko-backend-dev
          secrets: |
            SENTRY_AUTH_TOKEN=${{ env.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: nadeshiko

      - name: Configure SSH over Tailscale
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<'EOF'
          Host nadeshiko
            ProxyCommand tailscale nc %h %p
          EOF
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/config

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Install Kamal from fork
        run: |
          git clone --depth 1 https://github.com/davafons/kamal.git /tmp/kamal
          cd /tmp/kamal
          gem build kamal.gemspec
          gem install kamal-*.gem

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Prepare secrets for CI
        run: |
          sed -i 's/$(gh auth token)/$GITHUB_TOKEN/' backend/.kamal/secrets.dev
          sed -i 's/--account nadeshiko-dev //' backend/.kamal/secrets.dev

      - name: Deploy backend to dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh-keyscan -H nadeshiko >> ~/.ssh/known_hosts 2>/dev/null || true
          cd backend
          kamal deploy -d dev --skip-push

  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nadeshiko-dev
          aws-region: eu-north-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/brigadasos/nadeshiko-frontend-dev:${{ github.sha }}
            ghcr.io/brigadasos/nadeshiko-frontend-dev:latest
          labels: |
            service=nadeshiko-frontend-dev
          build-args: |
            NUXT_PUBLIC_ENVIRONMENT=dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: nadeshiko

      - name: Configure SSH over Tailscale
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<'EOF'
          Host nadeshiko
            ProxyCommand tailscale nc %h %p
          EOF
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/config

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Install Kamal from fork
        run: |
          git clone --depth 1 https://github.com/davafons/kamal.git /tmp/kamal
          cd /tmp/kamal
          gem build kamal.gemspec
          gem install kamal-*.gem

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Prepare secrets for CI
        run: |
          sed -i 's/$(gh auth token)/$GITHUB_TOKEN/' frontend/.kamal/secrets.dev
          sed -i 's/--account nadeshiko-dev //' frontend/.kamal/secrets.dev

      - name: Deploy frontend to dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh-keyscan -H nadeshiko >> ~/.ssh/known_hosts 2>/dev/null || true
          cd frontend
          kamal deploy -d dev --skip-push

  e2e:
    needs: [deploy-backend, deploy-frontend]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') && (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped') && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nadeshiko-dev
          aws-region: eu-north-1

      - name: Fetch E2E secrets from AWS SSM
        run: |
          E2E_USER_PASSWORD=$(aws ssm get-parameter --name "/nadeshiko/dev/E2E_USER_PASSWORD" --with-decryption --query 'Parameter.Value' --output text)
          echo "::add-mask::${E2E_USER_PASSWORD}"
          echo "E2E_USER_PASSWORD=${E2E_USER_PASSWORD}" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          cd frontend
          npm install @playwright/test
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          cd frontend
          npx playwright test --config=e2e/playwright.config.ts
        env:
          E2E_BASE_URL: https://dev.nadeshiko.co

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-dev
          path: frontend/playwright-report/
          retention-days: 14

  dispatch-sdk-ts:
    needs: changes
    if: needs.changes.outputs.openapi == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend dependencies
        run: cd backend && bun install --frozen-lockfile

      - name: Generate OpenAPI spec
        run: |
          cd backend
          bun run docs:bundle
          test -f docs/generated/openapi.yaml

      - name: Dispatch TypeScript SDK internal release
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          gh api repos/BrigadaSOS/nadeshiko-sdk-ts/dispatches \
            -f event_type='backend_release' \
            -f client_payload[release_channel]="internal" \
            -f client_payload[backend_sha]="${GITHUB_SHA}"

  dispatch-sdk-python:
    needs: changes
    if: needs.changes.outputs.openapi == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend dependencies
        run: cd backend && bun install --frozen-lockfile

      - name: Generate OpenAPI spec
        run: |
          cd backend
          bun run docs:bundle
          test -f docs/generated/openapi.yaml

      - name: Dispatch Python SDK internal release
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          gh api repos/BrigadaSOS/nadeshiko-sdk-python/dispatches \
            -f event_type='backend_release' \
            -f client_payload[release_channel]="internal" \
            -f client_payload[backend_sha]="${GITHUB_SHA}"
