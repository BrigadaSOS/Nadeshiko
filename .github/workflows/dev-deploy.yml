name: Dev Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      openapi: ${{ steps.filter.outputs.openapi }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            openapi:
              - 'backend/docs/openapi/**'

  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nadeshiko-dev
          aws-region: eu-north-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/brigadasos/nadeshiko-backend-dev:${{ github.sha }}
            ghcr.io/brigadasos/nadeshiko-backend-dev:latest
          labels: |
            service=nadeshiko-backend-dev
          secrets: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Install Kamal from fork
        run: |
          git clone --depth 1 https://github.com/davafons/kamal.git /tmp/kamal
          cd /tmp/kamal
          gem build kamal.gemspec
          gem install kamal-*.gem

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Prepare secrets for CI
        run: |
          sed -i 's/$(gh auth token)/$GITHUB_TOKEN/' backend/.kamal/secrets.dev
          sed -i 's/--account nadeshiko-dev //' backend/.kamal/secrets.dev

      - name: Deploy backend to dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh-keyscan -H $(grep -oP '(?<=ssh )[\w.-]+' backend/config/deploy.dev.yml || true) >> ~/.ssh/known_hosts 2>/dev/null || true
          cd backend
          kamal deploy -d dev --skip-push

  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-nadeshiko-dev
          aws-region: eu-north-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/brigadasos/nadeshiko-frontend-dev:${{ github.sha }}
            ghcr.io/brigadasos/nadeshiko-frontend-dev:latest
          labels: |
            service=nadeshiko-frontend-dev
          build-args: |
            NUXT_PUBLIC_ENVIRONMENT=dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Install Kamal from fork
        run: |
          git clone --depth 1 https://github.com/davafons/kamal.git /tmp/kamal
          cd /tmp/kamal
          gem build kamal.gemspec
          gem install kamal-*.gem

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Prepare secrets for CI
        run: |
          sed -i 's/$(gh auth token)/$GITHUB_TOKEN/' frontend/.kamal/secrets.dev
          sed -i 's/--account nadeshiko-dev //' frontend/.kamal/secrets.dev

      - name: Deploy frontend to dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh-keyscan -H $(grep -oP '(?<=ssh )[\w.-]+' frontend/config/deploy.dev.yml || true) >> ~/.ssh/known_hosts 2>/dev/null || true
          cd frontend
          kamal deploy -d dev --skip-push

  dispatch-sdk-ts:
    needs: changes
    if: needs.changes.outputs.openapi == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend dependencies
        run: cd backend && bun install --frozen-lockfile

      - name: Generate OpenAPI spec
        run: |
          cd backend
          bun run docs:bundle
          test -f docs/generated/openapi.yaml

      - name: Dispatch TypeScript SDK dev release
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          gh api repos/BrigadaSOS/nadeshiko-sdk-ts/dispatches \
            -f event_type='backend_release' \
            -f client_payload[release_channel]="dev" \
            -f client_payload[backend_sha]="${GITHUB_SHA}"

  dispatch-sdk-python:
    needs: changes
    if: needs.changes.outputs.openapi == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend dependencies
        run: cd backend && bun install --frozen-lockfile

      - name: Generate OpenAPI spec
        run: |
          cd backend
          bun run docs:bundle
          test -f docs/generated/openapi.yaml

      - name: Dispatch Python SDK dev release
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          gh api repos/BrigadaSOS/nadeshiko-sdk-python/dispatches \
            -f event_type='backend_release' \
            -f client_payload[release_channel]="dev" \
            -f client_payload[backend_sha]="${GITHUB_SHA}"
