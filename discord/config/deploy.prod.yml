image: brigadasos/nadeshiko-discord-prod
service: nadeshiko-discord-prod

servers:
  web:
    options:
      # Memory limit: 512MB RAM + 256MB swap
      # Discord bot is lightweight, just API polling
      memory: 512m
      memory-swap: 768m

volumes:
  - nadeshiko-discord-data:/app/data

env:
  secret:
    - DISCORD_BOT_TOKEN
    - DISCORD_API_KEY_MASTER
  clear:
    NADESHIKO_API_URL: "https://api.nadeshiko.co"
    NADESHIKO_FRONTEND_URL: "https://nadeshiko.co"
    NODE_ENV: "production"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4328"
    OTEL_SERVICE_NAME: "nadeshiko-discord"
