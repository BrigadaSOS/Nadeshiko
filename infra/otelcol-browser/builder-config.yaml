dist:
  name: otelcol-browser
  description: Browser telemetry collector with geo header injection and source map symbolicator
  output_path: ./build
  cgo_enabled: true

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.143.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.143.0
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.143.0
  - gomod: github.com/honeycombio/opentelemetry-collector-symbolicator/sourcemapprocessor v1.0.3
  - gomod: github.com/davafons/headerinjector v0.0.0
    path: ./headerinjector

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.143.0

extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension v0.143.0
